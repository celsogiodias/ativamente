<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>ATIVAMENTE+ CLINIC</title>
<link href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap' rel='stylesheet'>
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css'>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { display: flex; height: 100vh; background: #f5f5f5; }
#loginPage {
  display: flex; align-items: center; justify-content: center; width: 100%; height: 100vh; background: linear-gradient(135deg, #2E7D32, #1B5E20);
}
#loginBox {
  background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); width: 400px;
}
#loginBox h1 { color: #2E7D32; margin-bottom: 5px; font-weight: 600; }
#loginBox p { color: #666; margin-bottom: 20px; }
#loginBox input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
#loginBox button { width: 100%; padding: 12px; background: #2E7D32; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
#loginBox button:hover { background: #1B5E20; }
#loginError { color: red; margin-top: 10px; font-size: 14px; }
.sidebar {
  width: 260px; background: #2E7D32; color: white; display: flex; flex-direction: column; padding: 20px; height: 100vh; position: fixed; left: 0; top: 0;
}
.sidebar h2 { margin-bottom: 30px; font-weight: 600; font-size: 20px; }
.sidebar a { color: white; text-decoration: none; padding: 12px 15px; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: 0.2s; }
.sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.15); }
.main { margin-left: 260px; flex: 1; padding: 30px; overflow-y: auto; width: calc(100% - 260px); }
.page { display: none; }
.page.active { display: block; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.kpi-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.kpi-card i { font-size: 28px; color: #2E7D32; margin-bottom: 10px; }
.kpi-card h3 { font-size: 14px; color: #666; font-weight: 400; }
.kpi-card p { font-size: 28px; font-weight: 600; color: #333; }
.calendar { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.calendar-header button { background: none; border: 1px solid #ddd; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
.calendar-grid div { padding: 10px; border-radius: 8px; }
.calendar-grid .header { font-weight: 600; color: #666; }
.calendar-grid .day { cursor: pointer; }
.calendar-grid .day:hover { background: #e8f5e9; }
.calendar-grid .today { background: #2E7D32; color: white; }
.tab-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn { padding: 8px 16px; border: 1px solid #2E7D32; background: white; color: #2E7D32; border-radius: 20px; cursor: pointer; font-size: 13px; }
.tab-btn.active { background: #2E7D32; color: white; }
.tab-content { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.tab-content.active { display: block; }
.financeiro-chart { max-width: 500px; margin: 0 auto; }
.invite-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
.invite-card button { margin-top: 10px; padding: 8px 20px; background: #2E7D32; color: white; border: none; border-radius: 8px; cursor: pointer; }
.config-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
.evolucao-area { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.evolucao-area textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.evolucao-area button { margin-top: 10px; padding: 8px 20px; background: #2E7D32; color: white; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div id='loginPage'>
  <div id='loginBox'>
    <h1>ATIVAMENTE+ CLINIC</h1>
    <p>Faça login para continuar</p>
    <input type='email' id='loginEmail' placeholder='E-mail' value='admin@ativamente.com'>
    <input type='password' id='loginPassword' placeholder='Senha' value='admin'>
    <button onclick='login()'>Entrar</button>
    <div id='loginError'></div>
  </div>
</div>
<div id='app' style='display:none;'>
  <div class='sidebar'>
    <h2><i class='fas fa-clinic-medical'></i> ATIVAMENTE+</h2>
    <a href='#' class='active' onclick='showPage("dashboard", this)'><i class='fas fa-tachometer-alt'></i> Dashboard</a>
    <a href='#' onclick='showPage("agenda", this)'><i class='fas fa-calendar-alt'></i> Agenda</a>
    <a href='#' onclick='showPage("pacientes", this)'><i class='fas fa-users'></i> Pacientes</a>
    <a href='#' onclick='showPage("profissionais", this)'><i class='fas fa-user-md'></i> Profissionais</a>
    <a href='#' onclick='showPage("financeiro", this)'><i class='fas fa-dollar-sign'></i> Financeiro</a>
    <a href='#' onclick='showPage("convites", this)'><i class='fas fa-envelope'></i> Convites</a>
    <a href='#' onclick='showPage("configuracoes", this)'><i class='fas fa-cog'></i> Configurações</a>
    <a href='#' onclick='showPage("evolucao", this)'><i class='fas fa-brain'></i> Evolução IA</a>
  </div>
  <div class='main'>
    <div id='page-dashboard' class='page active'>
      <h1>Dashboard</h1>
      <div class='kpi-grid' id='kpiGrid'></div>
    </div>
    <div id='page-agenda' class='page'>
      <h1>Agenda</h1>
      <div class='calendar' id='calendar'></div>
    </div>
    <div id='page-pacientes' class='page'>
      <h1>Pacientes</h1>
      <div class='tab-group' id='pacientesTabs'></div>
      <div id='pacientesContent'></div>
    </div>
    <div id='page-profissionais' class='page'>
      <h1>Profissionais</h1>
      <div id='profissionaisList'></div>
    </div>
    <div id='page-financeiro' class='page'>
      <h1>Financeiro</h1>
      <div class='financeiro-chart'><canvas id='financeiroChart'></canvas></div>
    </div>
    <div id='page-convites' class='page'>
      <h1>Convites</h1>
      <div id='convitesList'></div>
    </div>
    <div id='page-configuracoes' class='page'>
      <h1>Configurações</h1>
      <div class='config-section'>
        <h3>Backup de Dados</h3>
        <button onclick='backupData()'>Baixar Backup</button>
        <button onclick='restoreData()'>Restaurar Backup</button>
        <input type='file' id='restoreInput' accept='.json' style='display:none;'>
      </div>
    </div>
    <div id='page-evolucao' class='page'>
      <h1>Evolução IA</h1>
      <div class='evolucao-area'>
        <textarea id='evolucaoInput' placeholder='Digite o texto do paciente...'></textarea>
        <button onclick='analisarEvolucao()'>Analisar</button>
        <div id='evolucaoResult'></div>
      </div>
    </div>
  </div>
</div>
<script>
// ========== INIT USERS ==========
let users = [];
function initUsers() {
  try {
    const stored = localStorage.getItem('ativamente_users');
    if (stored && Array.isArray(JSON.parse(stored))) {
      users = JSON.parse(stored);
    } else {
      users = [
        { email: 'admin@ativamente.com', password: 'admin', role: 'admin' },
        { email: 'medico@ativamente.com', password: '123456', role: 'medico' },
        { email: 'recepcionista@ativamente.com', password: '123456', role: 'recepcionista' }
      ];
      localStorage.setItem('ativamente_users', JSON.stringify(users));
    }
  } catch (e) {
    users = [
      { email: 'admin@ativamente.com', password: 'admin', role: 'admin' },
      { email: 'medico@ativamente.com', password: '123456', role: 'medico' },
      { email: 'recepcionista@ativamente.com', password: '123456', role: 'recepcionista' }
    ];
    localStorage.setItem('ativamente_users', JSON.stringify(users));
  }
}
initUsers();

// ========== LOGIN ==========
function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const user = users.find(function(u) { return u.email === email && u.password === password; });
  if (user) {
    sessionStorage.setItem('loggedUser', JSON.stringify(user));
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadDashboard();
    loadAgenda();
    loadPacientes();
    loadProfissionais();
    loadFinanceiro();
    loadConvites();
  } else {
    document.getElementById('loginError').textContent = 'E-mail ou senha inválidos.';
  }
}

// Check if already logged in
const loggedUser = sessionStorage.getItem('loggedUser');
if (loggedUser) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadDashboard();
  loadAgenda();
  loadPacientes();
  loadProfissionais();
  loadFinanceiro();
  loadConvites();
}

// ========== PAGE NAV ==========
function showPage(pageId, element) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + pageId).classList.add('active');
  document.querySelectorAll('.sidebar a').forEach(function(a) { a.classList.remove('active'); });
  if (element) element.classList.add('active');
  if (pageId === 'dashboard') loadDashboard();
  if (pageId === 'agenda') loadAgenda();
  if (pageId === 'pacientes') loadPacientes();
  if (pageId === 'profissionais') loadProfissionais();
  if (pageId === 'financeiro') loadFinanceiro();
  if (pageId === 'convites') loadConvites();
}

// ========== DASHBOARD ==========
function loadDashboard() {
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = '';
  const kpis = [
    { icon: 'fa-user', label: 'Pacientes Ativos', value: 128 },
    { icon: 'fa-calendar-check', label: 'Consultas Hoje', value: 15 },
    { icon: 'fa-dollar-sign', label: 'Faturamento Mês', value: 'R$ 45.200' },
    { icon: 'fa-user-md', label: 'Profissionais', value: 12 }
  ];
  kpis.forEach(function(kpi) {
    grid.innerHTML += '<div class="kpi-card"><i class="fas ' + kpi.icon + '"></i><h3>' + kpi.label + '</h3><p>' + kpi.value + '</p></div>';
  });
}

// ========== AGENDA ==========
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function loadAgenda() {
  const calendar = document.getElementById('calendar');
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();
  calendar.innerHTML = '<div class="calendar-header"><button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button><h3>' + monthNames[currentMonth] + ' ' + currentYear + '</h3><button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button></div>';
  let grid = '<div class="calendar-grid">';
  const dayHeaders = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  dayHeaders.forEach(function(d) { grid += '<div class="header">' + d + '</div>'; });
  for (let i = 0; i < firstDay; i++) {
    grid += '<div></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    let classes = 'day';
    if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) classes += ' today';
    grid += '<div class="' + classes + '" onclick="alert(\'Agendamento em ' + d + '/' + (currentMonth+1) + '/' + currentYear + '\')">' + d + '</div>';
  }
  grid += '</div>';
  calendar.innerHTML += grid;
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  loadAgenda();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  loadAgenda();
}

// ========== PACIENTES ==========
const pacientesTabs = ['Identificação','Anamnese','Exames','Diagnóstico','Prescrição','Evolução','Atestados','Documentos','Histórico'];
const pacientesData = [
  { nome: 'Maria Silva', idade: 35, tel: '(11) 99999-9999' },
  { nome: 'João Santos', idade: 42, tel: '(21) 88888-8888' }
];

function loadPacientes() {
  const tabGroup = document.getElementById('pacientesTabs');
  tabGroup.innerHTML = '';
  pacientesTabs.forEach(function(tab, idx) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = tab;
    btn.onclick = function() { switchPacienteTab(idx, btn); };
    tabGroup.appendChild(btn);
  });
  switchPacienteTab(0, document.querySelector('#pacientesTabs .tab-btn'));
}

function switchPacienteTab(index, btn) {
  document.querySelectorAll('#pacientesTabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  const content = document.getElementById('pacientesContent');
  content.innerHTML = '<h3>' + pacientesTabs[index] + '</h3>';
  if (index === 0) {
    let html = '<ul>';
    pacientesData.forEach(function(p) { html += '<li><strong>' + p.nome + '</strong> - ' + p.idade + ' anos - Tel: ' + p.tel + '</li>'; });
    html += '</ul>';
    content.innerHTML += html;
  } else {
    content.innerHTML += '<p>Conteúdo da aba ' + pacientesTabs[index] + ' em desenvolvimento.</p>';
  }
}

// ========== PROFISSIONAIS ==========
const profissionais = [
  { nome: 'Dr. Carlos', categoria: 'Saúde', especialidade: 'Cardiologia' },
  { nome: 'Eng. Paulo', categoria: 'Técnico', especialidade: 'Equipamentos' },
  { nome: 'Ana', categoria: 'Administrativo', especialidade: 'Gestão' }
];

function loadProfissionais() {
  const list = document.getElementById('profissionaisList');
  list.innerHTML = '';
  const categorias = ['Saúde', 'Técnico', 'Administrativo'];
  categorias.forEach(function(cat) {
    const filtrados = profissionais.filter(function(p) { return p.categoria === cat; });
    list.innerHTML += '<h3>' + cat + '</h3>';
    filtrados.forEach(function(p) {
      list.innerHTML += '<div class="kpi-card" style="margin-bottom:10px;"><i class="fas fa-user-md"></i> <strong>' + p.nome + '</strong> - ' + p.especialidade + '</div>';
    });
  });
}

// ========== FINANCEIRO ==========
let financeiroChartInstance = null;

function loadFinanceiro() {
  const ctx = document.getElementById('financeiroChart').getContext('2d');
  if (financeiroChartInstance) financeiroChartInstance.destroy();
  financeiroChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
      datasets: [{
        label: 'Faturamento (R$)',
        data: [12000, 15000, 18000, 22000, 20000, 25000, 28000, 30000, 27000, 32000, 35000, 45000],
        backgroundColor: '#2E7D32'
      }]
    },
    options: { responsive: true, maintainAspectRatio: true }
  });
}

// ========== CONVITES ==========
function loadConvites() {
  const list = document.getElementById('convitesList');
  list.innerHTML = '';
  const opcoes = [
    { titulo: 'Paciente', descricao: 'Enviar convite para paciente acessar o portal.' },
    { titulo: 'Profissional', descricao: 'Convidar novo profissional para a equipe.' },
    { titulo: 'Administrativo', descricao: 'Convidar membro administrativo.' }
  ];
  opcoes.forEach(function(op) {
    list.innerHTML += '<div class="invite-card"><h3>' + op.titulo + '</h3><p>' + op.descricao + '</p><button onclick="alert(\'Convite de ' + op.titulo + ' enviado!\')">Enviar Convite</button></div>';
  });
}

// ========== CONFIGURAÇÕES ==========
function backupData() {
  const data = {
    users: users,
    pacientes: pacientesData,
    profissionais: profissionais
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'backup_ativamente_' + new Date().toLocaleDateString('pt-BR').replace(/\//g, '-') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function restoreData() {
  document.getElementById('restoreInput').click();
}

document.getElementById('restoreInput').addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.users && Array.isArray(data.users)) {
        users = data.users;
        localStorage.setItem('ativamente_users', JSON.stringify(users));
      }
      alert('Backup restaurado com sucesso!');
    } catch (err) {
      alert('Erro ao restaurar backup: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
});

// ========== EVOLUÇÃO IA ==========
function analisarEvolucao() {
  const texto = document.getElementById('evolucaoInput').value;
  const palavras = texto.split(/\s+/).filter(function(p) { return p.length > 0; });
  const resultado = 'Quantidade de palavras: ' + palavras.length + '. ';
  if (palavras.length < 50) {
    resultado += 'Texto curto, considere detalhar mais a evolução.';
  } else if (palavras.length < 150) {
    resultado += 'Texto médio, pode ser suficiente.';
  } else {
    resultado += 'Texto longo e detalhado, ótimo para análise.';
  }
  document.getElementById('evolucaoResult').innerHTML = resultado;
}
</script>
</body>
</html>
