<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacientes - Clínica</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Poppins, sans-serif; }
    body { background: #f0f2f5; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #00204A; color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .sidebar h2 { font-weight: 600; font-size: 1.2rem; margin-bottom: 10px; color: #FF6B35; }
    .sidebar .tab-item { padding: 10px 15px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
    .sidebar .tab-item:hover, .sidebar .tab-item.active { background: #FF6B35; color: #00204A; font-weight: 600; }
    .main { flex: 1; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .top-bar h1 { font-weight: 600; color: #00204A; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: 0.2s; }
    .btn-primary { background: #FF6B35; color: white; }
    .btn-primary:hover { background: #e55a2b; }
    .btn-secondary { background: #008080; color: white; }
    .btn-secondary:hover { background: #006666; }
    .btn-danger { background: #d32f2f; color: white; }
    .btn-danger:hover { background: #b71c1c; }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #00204A; color: white; font-weight: 500; }
    tr:hover { background: #f5f5f5; }
    .action-btns { display: flex; gap: 5px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 20px; color: #00204A; font-weight: 600; }
    .modal label { display: block; margin-bottom: 5px; font-weight: 500; color: #333; }
    .modal input, .modal textarea, .modal select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .modal input:focus, .modal textarea:focus { border-color: #FF6B35; outline: none; }
    .modal .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
    .drawer-overlay.active { display: block; }
    .drawer { position: fixed; top: 0; right: -600px; width: 600px; height: 100%; background: white; box-shadow: -4px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; overflow-y: auto; padding: 20px; }
    .drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #FF6B35; padding-bottom: 10px; }
    .drawer-header h2 { color: #00204A; font-weight: 600; }
    .drawer-tabs { display: flex; gap: 15px; border-bottom: 2px solid #eee; margin-bottom: 20px; }
    .drawer-tab { padding: 10px 15px; cursor: pointer; color: #555; font-weight: 500; border-bottom: 3px solid transparent; transition: 0.2s; }
    .drawer-tab.active { color: #FF6B35; border-bottom-color: #FF6B35; }
    .drawer-content { }
    .sub-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
    .sub-tab { padding: 5px 12px; cursor: pointer; border-radius: 4px; background: #eee; transition: 0.2s; }
    .sub-tab.active { background: #008080; color: white; }
    .graph-container { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .analysis-text { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #FF6B35; margin-top: 10px; }
    @media (max-width: 768px) { .drawer { width: 100%; right: -100%; } .modal { width: 95%; } }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Clínica</h2>
    <div class="tab-item" onclick="switchMainTab('pacientes')">Pacientes</div>
    <!-- Other tabs as placeholders -->
    <div class="tab-item">Financeiro</div>
    <div class="tab-item">Profissionais</div>
    <div class="tab-item">Agenda</div>
  </div>

  <div class="main" id="mainContent">
    <div class="top-bar">
      <h1>Pacientes</h1>
      <button class="btn btn-primary" onclick="openModal('paciente', null)">+ Novo Paciente</button>
    </div>
    <table id="pacientesTable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Documento</th>
          <th>Data Nasc</th>
          <th>Telefone</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="pacientesBody">
      </tbody>
    </table>
  </div>

  <!-- Modal Paciente -->
  <div class="modal-overlay" id="modalPaciente">
    <div class="modal">
      <h3 id="modalPacienteTitle">Novo Paciente</h3>
      <form id="formPaciente">
        <input type="hidden" id="pacienteId">
        <label>Nome *</label>
        <input type="text" id="pacNome" required>
        <label>Documento</label>
        <input type="text" id="pacDoc">
        <label>Data de Nascimento</label>
        <input type="date" id="pacDataNasc">
        <label>Telefone</label>
        <input type="tel" id="pacTel">
        <hr>
        <h4 style="margin-bottom:10px;color:#00204A;">Responsável (se menor)</h4>
        <label>Nome do Responsável</label>
        <input type="text" id="pacRespNome">
        <label>Documento do Responsável</label>
        <input type="text" id="pacRespDoc">
        <label>Data Nasc do Responsável</label>
        <input type="date" id="pacRespDataNasc">
        <label>Telefone do Responsável</label>
        <input type="tel" id="pacRespTel">
        <div class="btn-group">
          <button type="button" class="btn btn-secondary" onclick="closeModal('modalPaciente')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h2 id="drawerPacienteNome">Paciente</h2>
      <button class="btn btn-danger btn-sm" onclick="closeDrawer()">X</button>
    </div>
    <div class="drawer-tabs" id="drawerTabs">
      <div class="drawer-tab active" onclick="switchDrawerTab(this, 'dados')">Dados</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'prontuarios')">Prontuários</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'evolucao')">Evolução</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'declaracao')">Declaração</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'atestado')">Atestado</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'relatorio')">Relatório</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'laudo')">Laudo</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'parecer')">Parecer</div>
      <div class="drawer-tab" onclick="switchDrawerTab(this, 'outros')">Outros</div>
    </div>
    <div class="drawer-content" id="drawerContent">
    </div>
  </div>

  <!-- Generic modal for CRUD within drawer -->
  <div class="modal-overlay" id="modalGenerico">
    <div class="modal">
      <h3 id="modalGenericoTitle"></h3>
      <form id="formGenerico">
        <div id="modalGenericoFields"></div>
        <div class="btn-group">
          <button type="button" class="btn btn-secondary" onclick="closeModal('modalGenerico')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ========== INITIALIZATION ==========
    let pacientes = JSON.parse(localStorage.getItem('pacientes')) || [];
    let currentPacienteId = null;
    let currentDrawerTab = 'dados';
    let editingGenericoId = null;
    let editingGenericoType = null;

    // ========== LOCAL STORAGE HELPERS ==========
    function savePacientes() {
      localStorage.setItem('pacientes', JSON.stringify(pacientes));
    }

    function loadPacientes() {
      renderPacientes();
    }

    // ========== RENDER MAIN TABLE ==========
    function renderPacientes() {
      const tbody = document.getElementById('pacientesBody');
      tbody.innerHTML = '';
      pacientes.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.nome}</td>
          <td>${p.documento || '-'}</td>
          <td>${p.dataNasc || '-'}</td>
          <td>${p.telefone || '-'}</td>
          <td class="action-btns">
            <button class="btn btn-secondary btn-sm" onclick="openDrawer('${p.id}')">Visualizar</button>
            <button class="btn btn-sm" style="background:#FF6B35;color:white;" onclick="openModal('paciente', '${p.id}')">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="excluirPaciente('${p.id}')">Excluir</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ========== MODAL PACIENTE ==========
    function openModal(type, id) {
      const overlay = document.getElementById('modalPaciente');
      if (type === 'paciente') {
        document.getElementById('modalPacienteTitle').textContent = id ? 'Editar Paciente' : 'Novo Paciente';
        if (id) {
          const p = pacientes.find(x => x.id === id);
          if (p) {
            document.getElementById('pacienteId').value = p.id;
            document.getElementById('pacNome').value = p.nome;
            document.getElementById('pacDoc').value = p.documento || '';
            document.getElementById('pacDataNasc').value = p.dataNasc || '';
            document.getElementById('pacTel').value = p.telefone || '';
            document.getElementById('pacRespNome').value = p.respNome || '';
            document.getElementById('pacRespDoc').value = p.respDoc || '';
            document.getElementById('pacRespDataNasc').value = p.respDataNasc || '';
            document.getElementById('pacRespTel').value = p.respTel || '';
          }
        } else {
          document.getElementById('pacienteId').value = '';
          document.getElementById('formPaciente').reset();
        }
        overlay.classList.add('active');
      }
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    document.getElementById('formPaciente').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('pacienteId').value;
      const nome = document.getElementById('pacNome').value.trim();
      if (!nome) { alert('Nome é obrigatório!'); return; }
      const paciente = {
        id: id || 'p_' + Date.now(),
        nome,
        documento: document.getElementById('pacDoc').value.trim(),
        dataNasc: document.getElementById('pacDataNasc').value,
        telefone: document.getElementById('pacTel').value.trim(),
        respNome: document.getElementById('pacRespNome').value.trim(),
        respDoc: document.getElementById('pacRespDoc').value.trim(),
        respDataNasc: document.getElementById('pacRespDataNasc').value,
        respTel: document.getElementById('pacRespTel').value.trim(),
        prontuarios: [],
        evolucao: [],
        declaracoes: [],
        atestados: [],
        relatoriosPsico: [],
        relatoriosMulti: [],
        laudos: [],
        pareceres: [],
        outrosDocs: []
      };
      if (id) {
        const index = pacientes.findIndex(x => x.id === id);
        if (index !== -1) {
          // preserve subarrays
          paciente.prontuarios = pacientes[index].prontuarios || [];
          paciente.evolucao = pacientes[index].evolucao || [];
          paciente.declaracoes = pacientes[index].declaracoes || [];
          paciente.atestados = pacientes[index].atestados || [];
          paciente.relatoriosPsico = pacientes[index].relatoriosPsico || [];
          paciente.relatoriosMulti = pacientes[index].relatoriosMulti || [];
          paciente.laudos = pacientes[index].laudos || [];
          paciente.pareceres = pacientes[index].pareceres || [];
          paciente.outrosDocs = pacientes[index].outrosDocs || [];
          pacientes[index] = paciente;
        }
      } else {
        pacientes.push(paciente);
      }
      savePacientes();
      renderPacientes();
      closeModal('modalPaciente');
    });

    function excluirPaciente(id) {
      if (!confirm('Tem certeza que deseja excluir este paciente?')) return;
      pacientes = pacientes.filter(p => p.id !== id);
      savePacientes();
      renderPacientes();
    }

    // ========== DRAWER ==========
    function openDrawer(pacienteId) {
      currentPacienteId = pacienteId;
      const p = pacientes.find(x => x.id === pacienteId);
      if (!p) return;
      document.getElementById('drawerPacienteNome').textContent = p.nome;
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('active');
      switchDrawerTab(document.querySelector('.drawer-tab.active') || document.querySelector('.drawer-tab'), 'dados');
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('active');
      currentPacienteId = null;
    }

    function switchDrawerTab(el, tabName) {
      document.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentDrawerTab = tabName;
      renderDrawerContent(tabName);
    }

    function renderDrawerContent(tabName) {
      const container = document.getElementById('drawerContent');
      container.innerHTML = '';
      const p = pacientes.find(x => x.id === currentPacienteId);
      if (!p) return;
      switch(tabName) {
        case 'dados':
          container.innerHTML = `
            <h3>Dados do Paciente</h3>
            <p><strong>Nome:</strong> ${p.nome}</p>
            <p><strong>Documento:</strong> ${p.documento || '-'}</p>
            <p><strong>Data Nasc:</strong> ${p.dataNasc || '-'}</p>
            <p><strong>Telefone:</strong> ${p.telefone || '-'}</p>
            <hr>
            <h4>Responsável</h4>
            <p><strong>Nome:</strong> ${p.respNome || '-'}</p>
            <p><strong>Documento:</strong> ${p.respDoc || '-'}</p>
            <p><strong>Data Nasc:</strong> ${p.respDataNasc || '-'}</p>
            <p><strong>Telefone:</strong> ${p.respTel || '-'}</p>
          `;
          break;
        case 'prontuarios':
          renderCrudTab(container, p, 'prontuarios', ['data', 'profissional', 'anotacao'], { data: 'date', profissional: 'text', anotacao: 'textarea' });
          break;
        case 'evolucao':
          renderEvolucao(container, p);
          break;
        case 'declaracao':
          renderCrudTab(container, p, 'declaracoes', ['data', 'tipo', 'descricao'], { data: 'date', tipo: 'text', descricao: 'text' });
          break;
        case 'atestado':
          renderCrudTab(container, p, 'atestados', ['data', 'validade', 'motivo'], { data: 'date', validade: 'date', motivo: 'text' });
          break;
        case 'relatorio':
          renderRelatorio(container, p);
          break;
        case 'laudo':
          renderCrudTab(container, p, 'laudos', ['data', 'conteudo'], { data: 'date', conteudo: 'textarea' });
          break;
        case 'parecer':
          renderCrudTab(container, p, 'pareceres', ['data', 'profissional', 'conteudo'], { data: 'date', profissional: 'text', conteudo: 'textarea' });
          break;
        case 'outros':
          renderCrudTab(container, p, 'outrosDocs', ['data', 'tipo', 'descricao'], { data: 'date', tipo: 'text', descricao: 'textarea' });
          break;
      }
    }

    // ========== GENERIC CRUD RENDER ==========
    function renderCrudTab(container, paciente, fieldName, fields, fieldTypes) {
      const items = paciente[fieldName] || [];
      let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;"><h3>${capitalize(fieldName)}</h3><button class="btn btn-primary btn-sm" onclick="openGenericoModal('${fieldName}', null)">+ Novo</button></div>`;
      if (items.length === 0) {
        html += '<p style="color:#888;">Nenhum registro encontrado.</p>';
      } else {
        html += '<table><thead><tr>';
        fields.forEach(f => html += `<th>${capitalize(f)}</th>`);
        html += '<th>Ações</th></tr></thead><tbody>';
        items.forEach((item, idx) => {
          html += '<tr>';
          fields.forEach(f => html += `<td>${item[f] || '-'}</td>`);
          html += `<td class="action-btns">
            <button class="btn btn-secondary btn-sm" onclick="openGenericoModal('${fieldName}', ${idx})">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="excluirGenerico('${fieldName}', ${idx})">Excluir</button>
          </td></tr>`;
        });
        html += '</tbody></table>';
      }
      container.innerHTML = html;
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    // ========== GENERIC MODAL FOR CRUD ==========
    function openGenericoModal(fieldName, idx) {
      const p = pacientes.find(x => x.id === currentPacienteId);
      if (!p) return;
      const items = p[fieldName] || [];
      let item = idx !== null ? items[idx] : {};
      editingGenericoId = idx;
      editingGenericoType = fieldName;
      // Build fields based on fieldName
      let fieldsConfig = getFieldsConfig(fieldName);
      const overlay = document.getElementById('modalGenerico');
      document.getElementById('modalGenericoTitle').textContent = idx !== null ? 'Editar' : 'Novo';
      const fieldsDiv = document.getElementById('modalGenericoFields');
      fieldsDiv.innerHTML = '';
      fieldsConfig.forEach(fc => {
        const label = document.createElement('label');
        label.textContent = capitalize(fc.name) + (fc.required ? ' *' : '');
        fieldsDiv.appendChild(label);
        let input;
        if (fc.type === 'textarea') {
          input = document.createElement('textarea');
          input.rows = 3;
        } else {
          input = document.createElement('input');
          input.type = fc.type || 'text';
        }
        input.id = 'gen_' + fc.name;
        input.required = fc.required || false;
        input.value = item[fc.name] || '';
        fieldsDiv.appendChild(input);
      });
      overlay.classList.add('active');
    }

    function getFieldsConfig(fieldName) {
      const configs = {
        prontuarios: [
          { name: 'data', type: 'date', required: true },
          { name: 'profissional', type: 'text', required: true },
          { name: 'anotacao', type: 'textarea', required: true }
        ],
        declaracoes: [
          { name: 'data', type: 'date', required: true },
          { name: 'tipo', type: 'text', required: true },
          { name: 'descricao', type: 'text', required: true }
        ],
        atestados: [
          { name: 'data', type: 'date', required: true },
          { name: 'validade', type: 'date', required: true },
          { name: 'motivo', type: 'text', required: true }
        ],
        laudos: [
          { name: 'data', type: 'date', required: true },
          { name: 'conteudo', type: 'textarea', required: true }
        ],
        pareceres: [
          { name: 'data', type: 'date', required: true },
          { name: 'profissional', type: 'text', required: true },
          { name: 'conteudo', type: 'textarea', required: true }
        ],
        outrosDocs: [
          { name: 'data', type: 'date', required: true },
          { name: 'tipo', type: 'text', required: true },
          { name: 'descricao', type: 'textarea', required: true }
        ]
      };
      return configs[fieldName] || [];
    }

    document.getElementById('formGenerico').addEventListener('submit', function(e) {
      e.preventDefault();
      const p = pacientes.find(x => x.id === currentPacienteId);
      if (!p) return;
      const fieldName = editingGenericoType;
      const items = p[fieldName] || [];
      const fieldsConfig = getFieldsConfig(fieldName);
      const newItem = {};
      fieldsConfig.forEach(fc => {
        const val = document.getElementById('gen_' + fc.name).value.trim();
        if (fc.required && !val) {
          alert('Preencha todos os campos obrigatórios!');
          return;
        }
        newItem[fc.name] = val;
      });
      if (editingGenericoId !== null) {
        items[editingGenericoId] = newItem;
      } else {
        items.push(newItem);
      }
      p[fieldName] = items;
      savePacientes();
      renderDrawerContent(currentDrawerTab);
      closeModal('modalGenerico');
    });

    function excluirGenerico(fieldName, idx) {
      if (!confirm('Excluir este registro?')) return;
      const p = pacientes.find(x => x.id === currentPacienteId);
      if (!p) return;
      p[fieldName].splice(idx, 1);
      savePacientes();
      renderDrawerContent(currentDrawerTab);
    }

    // ========== EVOLUÇÃO TAB ==========
    function renderEvolucao(container, paciente) {
      const evolucao = paciente.evolucao || [];
      let html = `<h3>Evolução - Análise IA</h3>`;
      // Add chart container
      html += `<div class="graph-container"><canvas id="evolucaoChart"></canvas></div>`;
      // IA analysis
      const scores = evolucao.map(e => parseInt(e.score) || 0);
      const trend = scores.length > 1 ? (scores[scores.length-1] > scores[0] ? 'progressão' : 'regressão') : 'neutro';
      html += `<div class="analysis-text"><strong>Análise Automática:</strong> O paciente apresenta uma tendência de <strong>${trend}</strong> nos últimos registros. Score médio: ${scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : 'N/A'}.</div>`;
      container.innerHTML = html;
      // Draw chart if data exists
      if (evolucao.length) {
        setTimeout(() => {
          const ctx = document.getElementById('evolucaoChart');
          if (!ctx) return;
          const labels = evolucao.map(e => e.data || '');
          const data = scores;
          new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [{
                label: 'Evolução',
                data: data,
                borderColor: '#008080',
                backgroundColor: 'rgba(0,128,128,0.1)',
                tension: 0.3,
                fill: true
              }]
            },
            options: {
              scales: { y: { min: 0, max: 100 } },
              plugins: { legend: { display: false } }
            }
          });
        }, 100);
      } else {
        container.innerHTML += '<p style="color:#888;">Nenhum dado de evolução. Adicione registros no prontuário.</p>';
      }
    }

    // ========== RELATÓRIO SUBTABS ==========
    let subTabAtivo = 'psico';
    function renderRelatorio(container, paciente) {
      let html = `<h3>Relatório</h3>`;
      html += `<div class="sub-tabs"><div class="sub-tab ${subTabAtivo==='psico'?'active':''}" onclick="switchSubTab('psico')">Psicológico</div><div class="sub-tab ${subTabAtivo==='multi'?'active':''}" onclick="switchSubTab('multi')">Multiprofissional</div></div>`;
      container.innerHTML = html;
      if (subTabAtivo === 'psico') {
        renderCrudTab(container, paciente, 'relatoriosPsico', ['data', 'conteudo'], { data: 'date', conteudo: 'textarea' });
      } else {
        renderCrudTab(container, paciente, 'relatoriosMulti', ['data', 'profissional', 'conteudo'], { data: 'date', profissional: 'text', conteudo: 'textarea' });
      }
    }

    function switchSubTab(tab) {
      subTabAtivo = tab;
      renderDrawerContent('relatorio');
    }

    // ========== INIT ==========
    loadPacientes();

    // Placeholder to prevent errors
    function switchMainTab(tab) { /* Not implemented */ }
  </script>
