<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativamente+ Clinic</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: #f4f6f9; }
.login-container {
  display: flex; justify-content: center; align-items: center; height: 100vh;
  background: linear-gradient(135deg, #00204A 0%, #008080 100%);
}
.login-card {
  background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  width: 360px; text-align: center;
}
.login-card h1 { color: #00204A; margin-bottom: 8px; }
.login-card .subtitle { color: #666; margin-bottom: 24px; }
.login-card select, .login-card input {
  width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;
}
.login-card button {
  width: 100%; padding: 14px; background: #FF6B35; color: #fff; border: none; border-radius: 8px;
  font-size: 18px; cursor: pointer; margin-top: 16px; transition: 0.3s;
}
.login-card button:hover { background: #e55a2b; }
.error-msg { color: red; margin-top: 8px; }
.app { display: none; }
.sidebar {
  position: fixed; left: 0; top: 0; width: 250px; height: 100%; background: #00204A;
  color: #fff; padding: 20px; overflow-y: auto; transition: 0.3s;
}
.sidebar .logo { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: #FF6B35; }
.sidebar .logo span { color: #fff; }
.sidebar .user-info { margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; }
.sidebar .user-info p { margin: 4px 0; }
.sidebar button.logout { width: 100%; padding: 10px; background: #FF6B35; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 16px; }
.sidebar .nav-item { padding: 12px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.sidebar .nav-item:hover { background: rgba(255,255,255,0.2); }
.sidebar .nav-item.active { background: #FF6B35; }
.main-content { margin-left: 250px; padding: 20px; }
.header {
  background: #fff; padding: 16px 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
.header h2 { color: #00204A; }
.cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px;
}
.card {
  background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center;
}
.card h3 { color: #666; font-size: 14px; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: bold; color: #00204A; }
.card .value.positive { color: #008080; }
.card .value.negative { color: #FF6B35; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 10px 20px; background: #e0e4ea; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.tab:hover { background: #c8cdd6; }
.tab.active { background: #00204A; color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; margin-bottom: 4px; color: #333; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px;
}
.btn { padding: 10px 20px; background: #FF6B35; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #e55a2b; }
.btn-teal { background: #008080; }
.btn-teal:hover { background: #006666; }
.list-item { background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.financial-chart { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
canvas { max-width: 100%; max-height: 300px; }
@media (max-width: 768px) {
  .sidebar { width: 100%; height: auto; position: relative; padding: 10px; }
  .main-content { margin-left: 0; }
}
</style>
</head>
<body>
<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h1>Ativamente+ Clinic</h1>
    <p class="subtitle">Acesso Restrito</p>
    <select id="userSelect">
      <option value="admin">Admin</option>
      <option value="psicologo">Psicólogo</option>
      <option value="fisioterapeuta">Fisioterapeuta</option>
      <option value="secretaria">Secretaria</option>
    </select>
    <input type="password" id="passwordInput" placeholder="Senha" />
    <button onclick="login()">Entrar</button>
    <p class="error-msg" id="loginError"></p>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">A+ <span>Ativamente+</span></div>
    <div class="user-info" id="userInfo"></div>
    <div class="nav-item active" onclick="showSection('dashboard')">Dashboard Financeiro</div>
    <div class="nav-item" onclick="showSection('pacientes')">Pacientes</div>
    <div id="extraNav"></div>
    <button class="logout" onclick="logout()">Sair</button>
  </div>
  <div class="main-content">
    <div class="header"><h2 id="sectionTitle">Dashboard Financeiro</h2></div>
    <div id="contentArea"></div>
  </div>
</div>

<script>
// Mock data
const users = {
  admin: { password: '1234', role: 'admin', name: 'Admin' },
  psicologo: { password: '1234', role: 'psicologo', name: 'Dr. Carlos (Psicólogo)' },
  fisioterapeuta: { password: '1234', role: 'fisioterapeuta', name: 'Dr. Ana (Fisioterapeuta)' },
  secretaria: { password: '1234', role: 'secretaria', name: 'Maria (Secretária)' }
};

const pacientes = [
  { id: 1, nome: 'João Silva', tipo: 'psicologico', responsavel: '', 
    prontuarios: [
      { data: '2024-10-01', profissional: 'Dr. Carlos', anotacao: 'Paciente relatou ansiedade.' },
      { data: '2024-10-15', profissional: 'Dr. Carlos', anotacao: 'Melhora com terapia cognitiva.' }
    ],
    documentos: [
      { tipo: 'Declaração', data: '2024-09-20', conteudo: 'Declaração de comparecimento.' },
      { tipo: 'Relatório', data: '2024-10-10', conteudo: 'Relatório trimestral.' }
    ],
    analiseIA: 'Paciente apresenta evolução positiva, tendência de redução de sintomas ansiosos. Recomenda-se continuar terapia.'
  },
  { id: 2, nome: 'Maria Santos', tipo: 'fisioterapeutico', responsavel: '',
    prontuarios: [
      { data: '2024-09-05', profissional: 'Dr. Ana', anotacao: 'Paciente com dor lombar crônica.' },
      { data: '2024-10-20', profissional: 'Dr. Ana', anotacao: 'Melhora com exercícios.' }
    ],
    documentos: [
      { tipo: 'Atestado', data: '2024-10-01', conteudo: 'Atestado de comparecimento.' }
    ],
    analiseIA: 'Recuperação dentro do esperado, continuar fisioterapia.'
  },
  { id: 3, nome: 'Pedro Alves', tipo: 'psicologico', responsavel: 'Mãe: Teresa Alves',
    prontuarios: [
      { data: '2024-08-12', profissional: 'Dr. Carlos', anotacao: 'Primeira consulta, queixa de insônia.' }
    ],
    documentos: [],
    analiseIA: 'Início de tratamento, monitorar evolução.'
  }
];

let currentUser = null;
let currentSection = 'dashboard';
let currentPaciente = null;
let currentTab = 0;
let financialData = {
  receitas: [5000, 6000, 4500, 7000, 8000, 7500],
  despesas: [3000, 3500, 2800, 4000, 4500, 4200],
  meses: ['Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out']
};

function login() {
  const username = document.getElementById('userSelect').value;
  const password = document.getElementById('passwordInput').value;
  const user = users[username];
  if (user && user.password === password) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('userInfo').innerHTML = `<p><strong>${user.name}</strong></p><p>Perfil: ${user.role}</p>`;
    showSection('dashboard');
  } else {
    document.getElementById('loginError').textContent = 'Usuário ou senha inválidos.';
  }
}

function logout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').textContent = '';
}

function showSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  if (section === 'dashboard') {
    document.getElementById('sectionTitle').textContent = 'Dashboard Financeiro';
    renderDashboard();
  } else if (section === 'pacientes') {
    document.getElementById('sectionTitle').textContent = 'Pacientes';
    renderPacientes();
  }
}

function renderDashboard() {
  const area = document.getElementById('contentArea');
  let html = `
    <div class="cards">
      <div class="card"><h3>Total Receitas (6 meses)</h3><div class="value positive">R$ ${financialData.receitas.reduce((a,b)=>a+b,0).toFixed(2)}</div></div>
      <div class="card"><h3>Total Despesas (6 meses)</h3><div class="value negative">R$ ${financialData.despesas.reduce((a,b)=>a+b,0).toFixed(2)}</div></div>
      <div class="card"><h3>Saldo</h3><div class="value ${(financialData.receitas.reduce((a,b)=>a+b,0) - financialData.despesas.reduce((a,b)=>a+b,0)) >= 0 ? 'positive' : 'negative'}">R$ ${(financialData.receitas.reduce((a,b)=>a+b,0) - financialData.despesas.reduce((a,b)=>a+b,0)).toFixed(2)}</div></div>
    </div>
    <div class="financial-chart">
      <canvas id="paretoChart"></canvas>
    </div>
    <div style="margin-top: 20px;">
      <h3>Adicionar Lançamento</h3>
      <div class="form-group">
        <label>Tipo</label>
        <select id="tipoLanc"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
      </div>
      <div class="form-group">
        <label>Valor</label>
        <input type="number" id="valorLanc" step="0.01" />
      </div>
      <div class="form-group">
        <label>Mês (índice 0-5)</label>
        <input type="number" id="mesLanc" min="0" max="5" />
      </div>
      <button class="btn" onclick="addLancamento()">Adicionar</button>
    </div>
  `;
  area.innerHTML = html;
  drawChart();
}

function drawChart() {
  const ctx = document.getElementById('paretoChart').getContext('2d');
  const meses = financialData.meses;
  const receitas = financialData.receitas;
  const despesas = financialData.despesas;
  const width = ctx.canvas.width;
  const height = ctx.canvas.height;
  ctx.clearRect(0, 0, width, height);
  const barWidth = width / (meses.length * 2 + 2);
  const maxVal = Math.max(...receitas, ...despesas) * 1.2;
  // Draw bars
  for (let i = 0; i < meses.length; i++) {
    const x1 = i * (barWidth * 2) + barWidth;
    const y1 = height - (receitas[i] / maxVal) * height * 0.8;
    ctx.fillStyle = '#008080';
    ctx.fillRect(x1, y1, barWidth, (receitas[i] / maxVal) * height * 0.8);
    const x2 = x1 + barWidth;
    const y2 = height - (despesas[i] / maxVal) * height * 0.8;
    ctx.fillStyle = '#FF6B35';
    ctx.fillRect(x2, y2, barWidth, (despesas[i] / maxVal) * height * 0.8);
    ctx.fillStyle = '#00204A';
    ctx.fillText(meses[i], x1, height - 5);
  }
  ctx.fillStyle = '#008080';
  ctx.fillRect(10, 10, 10, 10);
  ctx.fillStyle = '#000';
  ctx.fillText('Receitas', 25, 20);
  ctx.fillStyle = '#FF6B35';
  ctx.fillRect(10, 30, 10, 10);
  ctx.fillStyle = '#000';
  ctx.fillText('Despesas', 25, 40);
}

function addLancamento() {
  const tipo = document.getElementById('tipoLanc').value;
  const valor = parseFloat(document.getElementById('valorLanc').value);
  const mes = parseInt(document.getElementById('mesLanc').value);
  if (!isNaN(valor) && mes >= 0 && mes < 6) {
    if (tipo === 'receita') {
      financialData.receitas[mes] += valor;
    } else {
      financialData.despesas[mes] += valor;
    }
    renderDashboard();
  } else {
    alert('Valor ou mês inválido.');
  }
}

function renderPacientes() {
  const area = document.getElementById('contentArea');
  let filteredPacientes = pacientes;
  if (currentUser.role === 'psicologo') {
    filteredPacientes = pacientes.filter(p => p.tipo === 'psicologico');
  } else if (currentUser.role === 'fisioterapeuta') {
    filteredPacientes = pacientes.filter(p => p.tipo === 'fisioterapeutico');
  } else if (currentUser.role === 'secretaria') {
    filteredPacientes = []; // secretaria sees no patients (only agendamentos, not implemented)
  }
  let html = `<div class="cards">`;
  filteredPacientes.forEach(p => {
    html += `<div class="card" onclick="selectPaciente(${p.id})" style="cursor:pointer;"><h3>${p.nome}</h3><p>Tipo: ${p.tipo}</p></div>`;
  });
  html += `</div>`;
  if (filteredPacientes.length === 0) html += '<p>Nenhum paciente disponível.</p>';
  area.innerHTML = html;
}

function selectPaciente(id) {
  currentPaciente = pacientes.find(p => p.id === id);
  if (!currentPaciente) return;
  // Check if user can view this patient
  if (currentUser.role === 'psicologo' && currentPaciente.tipo !== 'psicologico') {
    alert('Acesso negado: este paciente não é psicológico.');
    return;
  }
  if (currentUser.role === 'fisioterapeuta' && currentPaciente.tipo !== 'fisioterapeutico') {
    alert('Acesso negado: este paciente não é fisioterapêutico.');
    return;
  }
  if (currentUser.role === 'secretaria') {
    alert('Acesso negado: secretaria não pode acessar pacientes.');
    return;
  }
  document.getElementById('sectionTitle').textContent = `Paciente: ${currentPaciente.nome}`;
  renderPacienteDetail();
}

function renderPacienteDetail() {
  const area = document.getElementById('contentArea');
  let tabsHtml = '';
  let tabsContent = '';
  // Determine which tabs to show based on role
  const showTab1 = true; // Dados do paciente always for allowed users
  const showTab2 = (currentUser.role === 'admin' || currentUser.role === 'psicologo'); // Prontuários: admin/psicologo
  const showTab3 = (currentUser.role === 'admin' || currentUser.role === 'psicologo'); // Documentos: admin/psicologo
  const showTab4 = (currentUser.role === 'admin' || currentUser.role === 'psicologo'); // Análise IA: admin/psicologo
  const showTab5 = (currentUser.role === 'admin' || (currentUser.role !== 'secretaria' && currentUser.role !== 'psicologo')); // Multidisciplinar: admin e outros profissionais
  
  if (showTab1) {
    tabsHtml += `<div class="tab ${currentTab === 0 ? 'active' : ''}" onclick="selectTab(0)">Dados do Paciente</div>`;
    tabsContent += `<div class="tab-content ${currentTab === 0 ? 'active' : ''}" id="tab0">
      <p><strong>Nome:</strong> ${currentPaciente.nome}</p>
      <p><strong>Tipo:</strong> ${currentPaciente.tipo}</p>
      <p><strong>Responsável:</strong> ${currentPaciente.responsavel || 'N/A'}</p>
    </div>`;
  }
  if (showTab2) {
    tabsHtml += `<div class="tab ${currentTab === 1 ? 'active' : ''}" onclick="selectTab(1)">Prontuários</div>`;
    let prontHtml = currentPaciente.prontuarios.map(p => 
      `<div class="list-item"><strong>${p.data}</strong> - ${p.profissional}: ${p.anotacao}</div>`
    ).join('');
    tabsContent += `<div class="tab-content ${currentTab === 1 ? 'active' : ''}" id="tab1">
      <h3>Timeline de Prontuários</h3>
      ${prontHtml || '<p>Nenhum prontuário.</p>'}
      <div style="margin-top:12px;">
        <h4>Nova Anotação</h4>
        <input type="date" id="novaData" /><br/>
        <textarea id="novaAnotacao" rows="3" style="width:100%;"></textarea><br/>
        <button class="btn btn-teal" onclick="addProntuario()">Adicionar</button>
      </div>
    </div>`;
  }
  if (showTab3) {
    tabsHtml += `<div class="tab ${currentTab === 2 ? 'active' : ''}" onclick="selectTab(2)">Documentos</div>`;
    let docHtml = currentPaciente.documentos.map(d => 
      `<div class="list-item"><strong>${d.tipo}</strong> (${d.data}): ${d.conteudo}</div>`
    ).join('');
    tabsContent += `<div class="tab-content ${currentTab === 2 ? 'active' : ''}" id="tab2">
      <h3>Documentos</h3>
      ${docHtml || '<p>Nenhum documento.</p>'}
      <div style="margin-top:12px;">
        <h4>Novo Documento</h4>
        <select id="tipoDoc"><option>Declaração</option><option>Atestado</option><option>Relatório</option><option>Laudo</option><option>Parecer</option></select>
        <input type="date" id="dataDoc" /><br/>
        <textarea id="conteudoDoc" rows="3" style="width:100%;" placeholder="Conteúdo"></textarea><br/>
        <button class="btn btn-teal" onclick="addDocumento()">Adicionar</button>
      </div>
    </div>`;
  }
  if (showTab4) {
    tabsHtml += `<div class="tab ${currentTab === 3 ? 'active' : ''}" onclick="selectTab(3)">Análise IA</div>`;
    tabsContent += `<div class="tab-content ${currentTab === 3 ? 'active' : ''}" id="tab3">
      <h3>Análise de IA</h3>
      <p>${currentPaciente.analiseIA || 'Nenhuma análise disponível.'}</p>
    </div>`;
  }
  if (showTab5) {
    tabsHtml += `<div class="tab ${currentTab === 4 ? 'active' : ''}" onclick="selectTab(4)">Multidisciplinar</div>`;
    tabsContent += `<div class="tab-content ${currentTab === 4 ? 'active' : ''}" id="tab4">
      <h3>Atendimentos Multidisciplinares</h3>
      <p>Aba destinada a profissionais que atendem o paciente.</p>
    </div>`;
  }
  
  area.innerHTML = `
    <div class="tabs">${tabsHtml}</div>
    ${tabsContent}
    <button class="btn" onclick="showSection('pacientes')" style="margin-top:12px;">Voltar</button>
  `;
  currentTab = 0; // reset
}

function selectTab(index) {
  currentTab = index;
  renderPacienteDetail();
}

function addProntuario() {
  const data = document.getElementById('novaData').value;
  const anotacao = document.getElementById('novaAnotacao').value;
  if (data && anotacao) {
    currentPaciente.prontuarios.push({
      data: data,
      profissional: currentUser.name,
      anotacao: anotacao
    });
    renderPacienteDetail();
  } else {
    alert('Preencha data e anotação.');
  }
}

function addDocumento() {
  const tipo = document.getElementById('tipoDoc').value;
  const data = document.getElementById('dataDoc').value;
  const conteudo = document.getElementById('conteudoDoc').value;
  if (tipo && data && conteudo) {
    currentPaciente.documentos.push({ tipo, data, conteudo });
    renderPacienteDetail();
  } else {
    alert('Preencha todos os campos.');
  }
}

// Initialize
window.addEventListener('load', function() {
  // Nothing extra
});
</script>
</body>
</html>
