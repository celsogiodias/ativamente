<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativamente+ Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #f4f7fc; color: #1a2847; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
.login-container { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a2847, #00bcd4); padding: 20px; }
.login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 400px; width: 100%; text-align: center; }
.login-card img { width: 200px; margin-bottom: 20px; object-fit: contain; }
.login-card h2 { font-weight: 600; margin-bottom: 20px; }
.input-group { position: relative; margin-bottom: 20px; }
.input-group input { width: 100%; padding: 14px 40px 14px 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; transition: 0.3s; }
.input-group input:focus { border-color: #00bcd4; box-shadow: 0 0 0 3px rgba(0,188,212,0.2); outline: none; }
.input-group i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #1a2847; }
.btn { padding: 14px 24px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 10px; }
.btn-primary { background: #ff6b35; color: white; }
.btn-primary:hover { background: #e55a2b; }
.btn-secondary { background: #00bcd4; color: white; }
.btn-secondary:hover { background: #0097a7; }
.btn-outline { background: transparent; border: 2px solid #1a2847; color: #1a2847; }
.btn-outline:hover { background: #1a2847; color: white; }
.sidebar { width: 260px; background: #1a2847; color: white; min-height: 100vh; padding: 20px; position: fixed; top: 0; left: 0; overflow-y: auto; transition: 0.3s; z-index: 1000; }
.sidebar img { width: 160px; margin-bottom: 30px; object-fit: contain; }
.sidebar a { display: block; padding: 12px 15px; color: white; text-decoration: none; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
.sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); }
.sidebar a i { margin-right: 10px; width: 20px; text-align: center; }
.main-content { margin-left: 260px; padding: 30px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.kpi-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
.kpi-card h3 { font-size: 14px; color: #666; margin-bottom: 10px; }
.kpi-card .value { font-size: 28px; font-weight: 700; }
.kpi-card .edit-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; color: #1a2847; }
.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
.chart-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.chart-card h3 { margin-bottom: 15px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
.modal-content { background: white; padding: 30px; border-radius: 16px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal-content h2 { margin-bottom: 20px; }
.modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 16px; }
.modal-content input:focus, .modal-content select:focus { border-color: #00bcd4; box-shadow: 0 0 0 3px rgba(0,188,212,0.2); outline: none; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.toast { position: fixed; bottom: 30px; right: 30px; background: #1a2847; color: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none; z-index: 3000; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.calendar-day { padding: 10px; background: #f4f7fc; border-radius: 8px; cursor: pointer; text-align: center; }
.calendar-day.today { background: #00bcd4; color: white; }
.calendar-day.confirmado { border-left: 4px solid green; }
.calendar-day.agendado { border-left: 4px solid #888; }
.calendar-day.cancelado { border-left: 4px solid red; }
@media (max-width: 768px) {
  .sidebar { width: 100%; height: auto; position: relative; }
  .main-content { margin-left: 0; }
  .login-card { margin-top: 20px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// Dados iniciais
const defaultData = {
  pacientes: [
    { id: 1, nome: 'João Silva', documento: '123.456.789-00', dataNasc: '1980-05-10', telefone: '(11) 99999-0001', responsavel: '', prontuarios: [], documentos: [] },
    { id: 2, nome: 'Maria Souza', documento: '987.654.321-00', dataNasc: '1992-08-20', telefone: '(11) 99999-0002', responsavel: 'Carlos Souza', prontuarios: [], documentos: [] }
  ],
  profissionais: [
    { id: 1, nome: 'Dr. Pedro', profissao: 'Psicólogo', categoria: 'Saúde', registro: 'CRP-12345', dataNasc: '1975-03-15', telefone: '(11) 99999-0003' },
    { id: 2, nome: 'Ana', profissao: 'Secretária', categoria: 'Administrativo', registro: '', dataNasc: '1990-07-22', telefone: '(11) 99999-0004' }
  ],
  agendamentos: [
    { id: 1, pacienteId: 1, profissionalId: 1, data: '2025-06-01', hora: '09:00', status: 'confirmado', descricao: '' },
    { id: 2, pacienteId: 2, profissionalId: 1, data: '2025-06-02', hora: '14:00', status: 'agendado', descricao: '' }
  ],
  financeiro: { receitas: [{ id: 1, descricao: 'Consultas', valor: 5000, data: '2025-05-01' }], despesas: [{ id: 1, descricao: 'Aluguel', valor: 2000, data: '2025-05-05' }] },
  convites: [],
  usuarios: [
    { email: 'admin@ativamente.com', senha: 'admin123', perfil: 'admin', nome: 'Administrador' },
    { email: 'prof@ativamente.com', senha: 'prof123', perfil: 'profissional', nome: 'Dr. Pedro' },
    { email: 'sec@ativamente.com', senha: 'sec123', perfil: 'secretaria', nome: 'Ana' }
  ]
};

if (!localStorage.getItem('dados')) {
  localStorage.setItem('dados', JSON.stringify(defaultData));
}

let dados = JSON.parse(localStorage.getItem('dados'));
let sessao = JSON.parse(sessionStorage.getItem('sessao') || 'null');

function salvar() {
  localStorage.setItem('dados', JSON.stringify(dados));
}

function getProximoId(arr) {
  if (arr.length === 0) return 1;
  return Math.max(...arr.map(i => i.id)) + 1;
}

// Gráficos
let charts = {};

function criarGrafico(id, tipo, labels, dados, cores, titulo) {
  if (charts[id]) {
    charts[id].destroy();
    delete charts[id];
  }
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: tipo,
    data: {
      labels: labels,
      datasets: [{
        label: titulo,
        data: dados,
        backgroundColor: cores || 'rgba(0,188,212,0.6)',
        borderColor: '#00bcd4',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } }
    }
  });
}

function atualizarDashboard() {
  const pacientes = dados.pacientes.length;
  const agendamentos = dados.agendamentos.length;
  const receitas = dados.financeiro.receitas.reduce((s, r) => s + r.valor, 0);
  const profissionais = dados.profissionais.length;
  const saude = dados.profissionais.filter(p => p.categoria === 'Saúde').length;
  const tecnico = dados.profissionais.filter(p => p.categoria === 'Técnico').length;
  const admin = dados.profissionais.filter(p => p.categoria === 'Administrativo').length;
  document.getElementById('kpi-pacientes').innerHTML = `<h3>Pacientes</h3><div class="value">${pacientes}</div>`;
  document.getElementById('kpi-agendamentos').innerHTML = `<h3>Agendamentos</h3><div class="value">${agendamentos}</div>`;
  document.getElementById('kpi-receitas').innerHTML = `<h3>Receitas (Mês)</h3><div class="value">R$ ${receitas.toFixed(2)}</div>`;
  document.getElementById('kpi-profissionais').innerHTML = `<h3>Profissionais</h3><div class="value">${profissionais} (S:${saude} T:${tecnico} A:${admin})</div>`;
  // Gráficos
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun'];
  criarGrafico('chartLine', 'line', meses, [10,20,15,30,25,40], 'rgba(255,107,53,0.6)', 'Pacientes por mês');
  criarGrafico('chartBar', 'bar', meses, [5,10,7,12,8,15], 'rgba(0,188,212,0.6)', 'Agendamentos por mês');
  criarGrafico('chartPareto', 'bar', ['Categoria A','Categoria B','Categoria C'], [30,20,10], ['#ff6b35','#00bcd4','#1a2847'], 'Distribuição');
}

// Renderização
function renderizar(tela) {
  const app = document.getElementById('app');
  if (!sessao) {
    app.innerHTML = telaLogin();
    return;
  }
  const perfil = sessao.perfil;
  const menus = {
    admin: ['Dashboard','Agenda','Pacientes','Profissionais','Financeiro','Convites'],
    profissional: ['Pacientes'],
    secretaria: ['Agenda','Pacientes','Profissionais','Financeiro']
  };
  const permissoes = menus[perfil] || [];
  app.innerHTML = `
    <div class="sidebar">
      <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/celsogiodias%40gmail.com/png/Ativamente%2B-Clinic.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260527%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260527T010358Z&X-Amz-Expires=3600&X-Amz-Signature=70534bc813f4fe040a42cce7f0ebfe20d0f05171eaebd5c9ed0ce12e04c682de&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Logo">
      ${permissoes.map(m => `<a href="#" onclick="navegar('${m}')" class="${tela === m ? 'active' : ''}"><i class="fas fa-${iconeMenu(m)}"></i> ${m}</a>`).join('')}
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </div>
    <div class="main-content" id="mainContent">
      ${conteudoTela(tela)}
    </div>
  `;
}

function iconeMenu(m) {
  const map = {Dashboard:'tachometer-alt', Agenda:'calendar-check', Pacientes:'user-injured', Profissionais:'user-md', Financeiro:'dollar-sign', Convites:'envelope'};
  return map[m] || 'circle';
}

function navegar(tela) {
  renderizar(tela);
}

function logout() {
  sessionStorage.removeItem('sessao');
  sessao = null;
  renderizar('');
}

// Telas
function telaLogin() {
  const params = new URLSearchParams(window.location.search);
  const isRegistro = params.get('screen') === 'registro';
  if (isRegistro) {
    return telaRegistro();
  }
  return `
    <div class="login-container">
      <div class="login-card">
        <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/celsogiodias%40gmail.com/png/Ativamente%2B-Clinic.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260527%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260527T010358Z&X-Amz-Expires=3600&X-Amz-Signature=70534bc813f4fe040a42cce7f0ebfe20d0f05171eaebd5c9ed0ce12e04c682de&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Logo">
        <h2>Login</h2>
        <div class="input-group">
          <input type="email" id="email" placeholder="Email" value="admin@ativamente.com">
        </div>
        <div class="input-group">
          <input type="password" id="senha" placeholder="Senha" value="admin123">
          <i class="fas fa-eye" onclick="toggleSenha()"></i>
        </div>
        <button class="btn btn-primary" onclick="login()">Entrar</button>
        <button class="btn btn-outline" onclick="recuperarSenha()">Recuperar Senha</button>
        <p style="margin-top:10px; font-size:14px;">Não tem conta? <a href="?screen=registro&token=TOKEN" style="color:#00bcd4;">Registrar</a></p>
      </div>
    </div>
  `;
}

function telaRegistro() {
  return `
    <div class="login-container">
      <div class="login-card">
        <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/celsogiodias%40gmail.com/png/Ativamente%2B-Clinic.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260527%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260527T010358Z&X-Amz-Expires=3600&X-Amz-Signature=70534bc813f4fe040a42cce7f0ebfe20d0f05171eaebd5c9ed0ce12e04c682de&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Logo">
        <h2>Registro</h2>
        <div class="input-group">
          <input type="email" id="regEmail" placeholder="Email">
        </div>
        <div class="input-group">
          <input type="password" id="regSenha" placeholder="Senha">
        </div>
        <div class="input-group">
          <input type="text" id="regNome" placeholder="Nome">
        </div>
        <button class="btn btn-primary" onclick="registrar()">Registrar</button>
        <button class="btn btn-outline" onclick="window.location.search=''">Voltar</button>
      </div>
    </div>
  `;
}

function login() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const usuario = dados.usuarios.find(u => u.email === email && u.senha === senha);
  if (usuario) {
    sessao = { email: usuario.email, nome: usuario.nome, perfil: usuario.perfil };
    sessionStorage.setItem('sessao', JSON.stringify(sessao));
    renderizar('Dashboard');
  } else {
    alert('Credenciais inválidas.');
  }
}

function toggleSenha() {
  const senha = document.getElementById('senha');
  senha.type = senha.type === 'password' ? 'text' : 'password';
}

function recuperarSenha() {
  alert('Link de recuperação enviado para o email (simulação).');
}

function registrar() {
  const email = document.getElementById('regEmail').value;
  const senha = document.getElementById('regSenha').value;
  const nome = document.getElementById('regNome').value;
  if (!email || !senha || !nome) { alert('Preencha todos os campos.'); return; }
  if (dados.usuarios.find(u => u.email === email)) { alert('Email já registrado.'); return; }
  dados.usuarios.push({ email, senha, perfil: 'secretaria', nome });
  salvar();
  alert('Registrado com sucesso! Faça login.');
  window.location.search = '';
}

function conteudoTela(tela) {
  switch(tela) {
    case 'Dashboard': return telaDashboard();
    case 'Agenda': return telaAgenda();
    case 'Pacientes': return telaPacientes();
    case 'Profissionais': return telaProfissionais();
    case 'Financeiro': return telaFinanceiro();
    case 'Convites': return telaConvites();
    default: return '<h2>Bem-vindo</h2><p>Selecione uma opção no menu.</p>';
  }
}

function telaDashboard() {
  return `
    <h2>Dashboard</h2>
    <div class="kpi-grid">
      <div class="kpi-card" id="kpi-pacientes"><button class="edit-btn" onclick="editarKPI('Pacientes')"><i class="fas fa-edit"></i></button></div>
      <div class="kpi-card" id="kpi-agendamentos"><button class="edit-btn" onclick="editarKPI('Agendamentos')"><i class="fas fa-edit"></i></button></div>
      <div class="kpi-card" id="kpi-receitas"><button class="edit-btn" onclick="editarKPI('Receitas')"><i class="fas fa-edit"></i></button></div>
      <div class="kpi-card" id="kpi-profissionais"><button class="edit-btn" onclick="editarKPI('Profissionais')"><i class="fas fa-edit"></i></button></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><h3>Pacientes por mês</h3><canvas id="chartLine" height="200"></canvas></div>
      <div class="chart-card"><h3>Agendamentos por mês</h3><canvas id="chartBar" height="200"></canvas></div>
      <div class="chart-card"><h3>Distribuição</h3><canvas id="chartPareto" height="200"></canvas></div>
    </div>
  `;
}

function editarKPI(label) {
  const valor = prompt(`Novo valor para ${label}:`);
  if (valor !== null) {
    // Apenas simulação
    alert('KPI atualizado (simulação).');
  }
}

function telaAgenda() {
  const profissionais = dados.profissionais;
  const pacientes = dados.pacientes;
  return `
    <h2>Agenda</h2>
    <div style="margin-bottom:20px">
      <select id="filtroProf" onchange="renderizar('Agenda')">
        <option value="">Todos</option>
        ${profissionais.map(p => `<option value="${p.id}">${p.nome}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="abrirModalAgenda()" style="width:auto; margin-left:10px;">Novo Agendamento</button>
    </div>
    <div class="calendar" id="calendarGrid"></div>
  `;
}

function abrirModalAgenda(editId) {
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.display = 'flex';
  const edit = editId ? dados.agendamentos.find(a => a.id === editId) : null;
  modal.innerHTML = `
    <div class="modal-content">
      <h2>${edit ? 'Editar' : 'Novo'} Agendamento</h2>
      <select id="agPaciente">
        <option value="">Selecione Paciente</option>
        ${dados.pacientes.map(p => `<option value="${p.id}" ${edit && edit.pacienteId === p.id ? 'selected' : ''}>${p.nome}</option>`).join('')}
      </select>
      <select id="agProfissional">
        <option value="">Selecione Profissional</option>
        ${dados.profissionais.map(p => `<option value="${p.id}" ${edit && edit.profissionalId === p.id ? 'selected' : ''}>${p.nome}</option>`).join('')}
      </select>
      <input type="date" id="agData" value="${edit ? edit.data : ''}">
      <input type="time" id="agHora" value="${edit ? edit.hora : ''}">
      <select id="agStatus">
        <option value="agendado" ${edit && edit.status === 'agendado' ? 'selected' : ''}>Agendado</option>
        <option value="confirmado" ${edit && edit.status === 'confirmado' ? 'selected' : ''}>Confirmado</option>
        <option value="cancelado" ${edit && edit.status === 'cancelado' ? 'selected' : ''}>Cancelado</option>
      </select>
      <textarea id="agDescricao" placeholder="Descrição">${edit ? edit.descricao || '' : ''}</textarea>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="salvarAgenda(${editId || ''})">Salvar</button>
        <button class="btn btn-outline" onclick="fecharModal(this)">Cancelar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function salvarAgenda(id) {
  const pacienteId = parseInt(document.getElementById('agPaciente').value);
  const profissionalId = parseInt(document.getElementById('agProfissional').value);
  const data = document.getElementById('agData').value;
  const hora = document.getElementById('agHora').value;
  const status = document.getElementById('agStatus').value;
  const descricao = document.getElementById('agDescricao').value;
  if (!pacienteId || !profissionalId || !data || !hora) { alert('Preencha paciente e profissional obrigatórios.'); return; }
  if (id) {
    const idx = dados.agendamentos.findIndex(a => a.id === id);
    if (idx >= 0) {
      dados.agendamentos[idx] = { id, pacienteId, profissionalId, data, hora, status, descricao };
    }
  } else {
    dados.agendamentos.push({ id: getProximoId(dados.agendamentos), pacienteId, profissionalId, data, hora, status, descricao });
  }
  salvar();
  fecharModal(document.querySelector('.modal'));
  renderizar('Agenda');
}

function telaPacientes() {
  return `
    <h2>Pacientes</h2>
    <button class="btn btn-primary" onclick="abrirModalPaciente()" style="width:auto; margin-bottom:20px;">Novo Paciente</button>
    <div id="listaPacientes">
      ${dados.pacientes.map(p => `
        <div class="kpi-card" style="cursor:pointer; margin-bottom:10px;" onclick="abrirAccordionPaciente(${p.id})">
          <h3>${p.nome}</h3>
          <p>${p.documento} | ${p.telefone}</p>
        </div>
      `).join('')}
    </div>
  `;
}

function abrirModalPaciente(editId) {
  const edit = editId ? dados.pacientes.find(p => p.id === editId) : null;
  const modal = document.createElement('div');
  modal.className = 'modal'; modal.style.display = 'flex';
  modal.innerHTML = `
    <div class="modal-content">
      <h2>${edit ? 'Editar' : 'Novo'} Paciente</h2>
      <input type="text" id="pacNome" placeholder="Nome" value="${edit ? edit.nome : ''}">
      <input type="text" id="pacDocumento" placeholder="Documento" value="${edit ? edit.documento : ''}">
      <input type="date" id="pacDataNasc" value="${edit ? edit.dataNasc : ''}">
      <input type="text" id="pacTelefone" placeholder="Telefone" value="${edit ? edit.telefone : ''}">
      <input type="text" id="pacResponsavel" placeholder="Responsável" value="${edit ? edit.responsavel : ''}">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="salvarPaciente(${editId || ''})">Salvar</button>
        <button class="btn btn-outline" onclick="fecharModal(this)">Cancelar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function salvarPaciente(id) {
  const nome = document.getElementById('pacNome').value;
  const documento = document.getElementById('pacDocumento').value;
  const dataNasc = document.getElementById('pacDataNasc').value;
  const telefone = document.getElementById('pacTelefone').value;
  const responsavel = document.getElementById('pacResponsavel').value;
  if (!nome) { alert('Nome é obrigatório.'); return; }
  if (id) {
    const idx = dados.pacientes.findIndex(p => p.id === id);
    if (idx >= 0) {
      dados.pacientes[idx] = { ...dados.pacientes[idx], nome, documento, dataNasc, telefone, responsavel };
    }
  } else {
    dados.pacientes.push({ id: getProximoId(dados.pacientes), nome, documento, dataNasc, telefone, responsavel, prontuarios: [], documentos: [] });
  }
  salvar();
  fecharModal(document.querySelector('.modal'));
  renderizar('Pacientes');
}

function abrirAccordionPaciente(id) {
  const paciente = dados.pacientes.find(p => p.id === id);
  if (!paciente) return;
  const modal = document.createElement('div');
  modal.className = 'modal'; modal.style.display = 'flex';
  const abas = ['Dados','Prontuários','Evolução IA','Declaração','Atestado','Relatório','Multiprofissional','Laudo','Parecer'];
  modal.innerHTML = `
    <div class="modal-content" style="max-width:800px;">
      <h2>${paciente.nome}</h2>
      <div style="margin-bottom:15px;">
        ${abas.map((aba, idx) => `<button class="btn btn-outline" onclick="mostrarAbaPaciente(${id}, ${idx})" style="margin:2px; width:auto;">${aba}</button>`).join('')}
      </div>
      <div id="conteudoAbaPaciente">
        ${conteudoAbaPaciente(id, 0)}
      </div>
      <div class="modal-actions" style="margin-top:15px;">
        <button class="btn btn-outline" onclick="editarPaciente(${id})">Editar</button>
        <button class="btn btn-primary" onclick="fecharModal(this)">Fechar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function mostrarAbaPaciente(id, idx) {
  const div = document.getElementById('conteudoAbaPaciente');
  div.innerHTML = conteudoAbaPaciente(id, idx);
}

function conteudoAbaPaciente(id, idx) {
  const paciente = dados.pacientes.find(p => p.id === id);
  if (!paciente) return '';
  switch(idx) {
    case 0:
      return `<p><strong>Documento:</strong> ${paciente.documento}</p><p><strong>Data Nasc:</strong> ${paciente.dataNasc}</p><p><strong>Telefone:</strong> ${paciente.telefone}</p><p><strong>Responsável:</strong> ${paciente.responsavel || 'N/A'}</p>`;
    case 1:
      return `
        <h3>Prontuários</h3>
        <button class="btn btn-secondary" onclick="adicionarProntuario(${id})" style="width:auto; margin-bottom:10px;">Adicionar</button>
        <div id="listaProntuarios">
          ${paciente.prontuarios.map((pr, i) => `
            <div style="border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:8px;">
              <strong>${pr.data}</strong> - ${pr.texto.substring(0,50)}...
              <button onclick="editarProntuario(${id}, ${i})">Editar</button>
              <button onclick="excluirProntuario(${id}, ${i})">Excluir</button>
              <button onclick="imprimirProntuario(${id}, ${i})">Imprimir</button>
            </div>
          `).join('')}
        </div>
      `;
    case 2:
      return `
        <h3>Evolução IA</h3>
        <button class="btn btn-secondary" onclick="gerarEvolucaoIA(${id})" style="width:auto;">Analisar</button>
        <div id="evolucaoIA"></div>
      `;
    case 3: case 4: case 5: case 6: case 7: case 8:
      return `<p>Funcionalidade de ${['Declaração','Atestado','Relatório','Multiprofissional','Laudo','Parecer'][idx-3]} em desenvolvimento.</p>`;
    default: return '';
  }
}

function adicionarProntuario(id) {
  const data = prompt('Data (AAAA-MM-DD):');
  const texto = prompt('Texto do prontuário:');
  if (data && texto) {
    const paciente = dados.pacientes.find(p => p.id === id);
    paciente.prontuarios.push({ data, texto });
    salvar();
    document.getElementById('conteudoAbaPaciente').innerHTML = conteudoAbaPaciente(id, 1);
  }
}

function editarProntuario(id, idx) {
  const paciente = dados.pacientes.find(p => p.id === id);
  const pr = paciente.prontuarios[idx];
  const data = prompt('Data:', pr.data);
  const texto = prompt('Texto:', pr.texto);
  if (data && texto) {
    paciente.prontuarios[idx] = { data, texto };
    salvar();
    document.getElementById('conteudoAbaPaciente').innerHTML = conteudoAbaPaciente(id, 1);
  }
}

function excluirProntuario(id, idx) {
  if (confirm('Excluir prontuário?')) {
    const paciente = dados.pacientes.find(p => p.id === id);
    paciente.prontuarios.splice(idx, 1);
    salvar();
    document.getElementById('conteudoAbaPaciente').innerHTML = conteudoAbaPaciente(id, 1);
  }
}

function imprimirProntuario(id, idx) {
  const paciente = dados.pacientes.find(p => p.id === id);
  const pr = paciente.prontuarios[idx];
  const win = window.open('');
  win.document.write(`<h1>Prontuário - ${paciente.nome}</h1><p>Data: ${pr.data}</p><p>${pr.texto}</p>`);
  win.print();
}

function gerarEvolucaoIA(id) {
  const paciente = dados.pacientes.find(p => p.id === id);
  const prontuarios = paciente.prontuarios;
  if (prontuarios.length === 0) { alert('Nenhum prontuário para análise.'); return; }
  // Simulação de análise de sentimentos
  const sentimentos = prontuarios.map(() => Math.random() * 10);
  const media = sentimentos.reduce((a,b) => a+b,0) / sentimentos.length;
  const div = document.getElementById('evolucaoIA');
  div.innerHTML = `<canvas id="evolucaoChart" height="200"></canvas><p>Média de sentimento: ${media.toFixed(1)}/10</p><p>Sugestões: Continuar acompanhamento.</p>`;
  // Destruir gráfico anterior se existir
  if (charts['evolucaoChart']) {
    charts['evolucaoChart'].destroy();
    delete charts['evolucaoChart'];
  }
  const ctx = document.getElementById('evolucaoChart');
  if (ctx) {
    charts['evolucaoChart'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: prontuarios.map((p,i) => `P${i+1}`),
        datasets: [{ label: 'Sentimento', data: sentimentos, backgroundColor: 'rgba(255,107,53,0.6)' }]
      }
    });
  }
}

function editarPaciente(id) {
  fecharModal(document.querySelector('.modal'));
  abrirModalPaciente(id);
}

function telaProfissionais() {
  return `
    <h2>Profissionais</h2>
    <button class="btn btn-primary" onclick="abrirModalProfissional()" style="width:auto; margin-bottom:20px;">Novo Profissional</button>
    <div id="listaProfissionais">
      ${dados.profissionais.map(p => `
        <div class="kpi-card" style="margin-bottom:10px;">
          <h3>${p.nome}</h3>
          <p>${p.profissao} | ${p.categoria} ${p.registro ? '- '+p.registro : ''} | ${p.telefone}</p>
          <button onclick="editarProfissional(${p.id})">Editar</button>
          <button onclick="excluirProfissional(${p.id})">Excluir</button>
        </div>
      `).join('')}
    </div>
  `;
}

function abrirModalProfissional(editId) {
  const edit = editId ? dados.profissionais.find(p => p.id === editId) : null;
  const modal = document.createElement('div');
  modal.className = 'modal'; modal.style.display = 'flex';
  modal.innerHTML = `
    <div class="modal-content">
      <h2>${edit ? 'Editar' : 'Novo'} Profissional</h2>
      <input type="text" id="profNome" placeholder="Nome" value="${edit ? edit.nome : ''}">
      <input type="text" id="profProfissao" placeholder="Profissão" value="${edit ? edit.profissao : ''}">
      <select id="profCategoria">
        <option value="Saúde" ${edit && edit.categoria === 'Saúde' ? 'selected' : ''}>Saúde</option>
        <option value="Técnico" ${edit && edit.categoria === 'Técnico' ? 'selected' : ''}>Técnico</option>
        <option value="Administrativo" ${edit && edit.categoria === 'Administrativo' ? 'selected' : ''}>Administrativo</option>
      </select>
      <input type="text" id="profRegistro" placeholder="Registro (se Saúde)" value="${edit ? edit.registro : ''}">
      <input type="date" id="profDataNasc" value="${edit ? edit.dataNasc : ''}">
      <input type="text" id="profTelefone" placeholder="Telefone" value="${edit ? edit.telefone : ''}">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="salvarProfissional(${editId || ''})">Salvar</button>
        <button class="btn btn-outline" onclick="fecharModal(this)">Cancelar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function salvarProfissional(id) {
  const nome = document.getElementById('profNome').value;
  const profissao = document.getElementById('profProfissao').value;
  const categoria = document.getElementById('profCategoria').value;
  const registro = document.getElementById('profRegistro').value;
  const dataNasc = document.getElementById('profDataNasc').value;
  const telefone = document.getElementById('profTelefone').value;
  if (!nome || !profissao || !categoria) { alert('Preencha nome, profissão e categoria.'); return; }
  if (categoria === 'Saúde' && !registro) { alert('Registro obrigatório para Saúde.'); return; }
  if (id) {
    const idx = dados.profissionais.findIndex(p => p.id === id);
    if (idx >= 0) {
      dados.profissionais[idx] = { id, nome, profissao, categoria, registro, dataNasc, telefone };
    }
  } else {
    dados.profissionais.push({ id: getProximoId(dados.profissionais), nome, profissao, categoria, registro, dataNasc, telefone });
  }
  salvar();
  fecharModal(document.querySelector('.modal'));
  renderizar('Profissionais');
}

function editarProfissional(id) { abrirModalProfissional(id); }
function excluirProfissional(id) {
  if (confirm('Excluir profissional?')) {
    dados.profissionais = dados.profissionais.filter(p => p.id !== id);
    salvar();
    renderizar('Profissionais');
  }
}

function telaFinanceiro() {
  const receitas = dados.financeiro.receitas;
  const despesas = dados.financeiro.despesas;
  return `
    <h2>Financeiro</h2>
    <div style="display:flex; gap:20px;">
      <div style="flex:1;">
        <h3>Receitas</h3>
        <button class="btn btn-secondary" onclick="abrirModalFinanceiro('receita')" style="width:auto; margin-bottom:10px;">Adicionar</button>
        ${receitas.map(r => `<div style="border:1px solid #ddd; padding:10px; margin-bottom:5px; border-radius:8px;">${r.descricao} - R$ ${r.valor.toFixed(2)} <button onclick="excluirFinanceiro('receita',${r.id})">Excluir</button></div>`).join('')}
      </div>
      <div style="flex:1;">
        <h3>Despesas</h3>
        <button class="btn btn-secondary" onclick="abrirModalFinanceiro('despesa')" style="width:auto; margin-bottom:10px;">Adicionar</button>
        ${despesas.map(d => `<div style="border:1px solid #ddd; padding:10px; margin-bottom:5px; border-radius:8px;">${d.descricao} - R$ ${d.valor.toFixed(2)} <button onclick="excluirFinanceiro('despesa',${d.id})">Excluir</button></div>`).join('')}
      </div>
    </div>
    <div style="margin-top:20px;">
      <h3>Gráfico Pareto (6 meses)</h3>
      <canvas id="chartParetoFinanceiro" height="200"></canvas>
    </div>
    <div id="iaAnalysis">
      <button class="btn btn-primary" onclick="analisarIAFinanceiro()">Análise IA</button>
      <div id="resultadoIA"></div>
    </div>
  `;
}

function abrirModalFinanceiro(tipo, editId) {
  const modal = document.createElement('div');
  modal.className = 'modal'; modal.style.display = 'flex';
  modal.innerHTML = `
    <div class="modal-content">
      <h2>${tipo === 'receita' ? 'Receita' : 'Despesa'}</h2>
      <input type="text" id="finDescricao" placeholder="Descrição">
      <input type="number" id="finValor" placeholder="Valor">
      <input type="date" id="finData">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="salvarFinanceiro('${tipo}')">Salvar</button>
        <button class="btn btn-outline" onclick="fecharModal(this)">Cancelar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function salvarFinanceiro(tipo) {
  const descricao = document.getElementById('finDescricao').value;
  const valor = parseFloat(document.getElementById('finValor').value);
  const data = document.getElementById('finData').value;
  if (!descricao || !valor || !data) { alert('Preencha todos os campos.'); return; }
  const obj = { id: getProximoId(dados.financeiro[tipo+'s']), descricao, valor, data };
  dados.financeiro[tipo+'s'].push(obj);
  salvar();
  fecharModal(document.querySelector('.modal'));
  renderizar('Financeiro');
}

function excluirFinanceiro(tipo, id) {
  if (confirm('Excluir?')) {
    dados.financeiro[tipo+'s'] = dados.financeiro[tipo+'s'].filter(i => i.id !== id);
    salvar();
    renderizar('Financeiro');
  }
}

function analisarIAFinanceiro() {
  const receitas = dados.financeiro.receitas.reduce((s, r) => s + r.valor, 0);
  const despesas = dados.financeiro.despesas.reduce((s, d) => s + d.valor, 0);
  const div = document.getElementById('resultadoIA');
  if (despesas > receitas) {
    div.innerHTML = `<p style="color:red;">Alerta: Despesas (R$ ${despesas.toFixed(2)}) superam Receitas (R$ ${receitas.toFixed(2)}).</p>`;
  } else {
    div.innerHTML = `<p style="color:green;">Situação saudável: Receitas (R$ ${receitas.toFixed(2)}) maiores que Despesas (R$ ${despesas.toFixed(2)}).</p>`;
  }
}

function telaConvites() {
  return `
    <h2>Convites</h2>
    <button class="btn btn-primary" onclick="gerarConvite()" style="width:auto; margin-bottom:20px;">Gerar Convite</button>
    <div id="listaConvites">
      ${dados.convites.map(c => `<div style="border:1px solid #ddd; padding:10px; margin-bottom:5px; border-radius:8px;">${c.email} - ${c.perfil} - Token: ${c.token}</div>`).join('')}
    </div>
  `;
}

function gerarConvite() {
  const email = prompt('Email do convidado:');
  if (!email) return;
  const perfil = prompt('Perfil (profissional, secretaria, administrador):');
  if (!['profissional','secretaria','administrador'].includes(perfil)) { alert('Perfil inválido.'); return; }
  const token = Math.random().toString(36).substr(2, 10);
  dados.convites.push({ email, perfil, token });
  salvar();
  const link = `${window.location.origin}${window.location.pathname}?screen=registro&token=${token}`;
  navigator.clipboard.writeText(link).then(() => alert('Link copiado: '+link)).catch(() => alert('Link: '+link));
  renderizar('Convites');
}

function fecharModal(el) {
  const modal = el.closest('.modal');
  if (modal) modal.remove();
}

// Inicialização
window.onload = function() {
  renderizar(sessao ? 'Dashboard' : '');
};
</script>
</body>
</html>
