<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Consultório</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        #login {
            display: flex; justify-content: center; align-items: center; height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #login form {
            background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.3);
            width: 300px;
        }
        #login h2 { margin-bottom: 20px; text-align: center; color: #333; }
        #login input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        #login button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #login button:hover { background: #5a6fd6; }
        #login .error { color: red; margin-bottom: 10px; text-align: center; }
        #main { display: none; }
        header {
            background: #333; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 24px; }
        header button { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        nav { background: #555; display: flex; gap: 0; }
        nav button {
            background: #555; color: white; border: none; padding: 12px 24px; cursor: pointer; font-size: 16px;
            transition: background 0.3s;
        }
        nav button:hover, nav button.active { background: #777; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        h2 { margin-bottom: 20px; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f8f8; }
        .btn-excluir { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-excluir:hover { background: #c0392b; }
        .modal {
            display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%;
            overflow: auto; background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background: white; margin: 10% auto; padding: 30px; width: 400px; border-radius: 8px;
            position: relative;
        }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
        .modal input, .modal select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .modal button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .cards {
            display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .card {
            background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            flex: 1; min-width: 200px; text-align: center;
        }
        .card h3 { margin-bottom: 10px; color: #555; }
        .card .valor { font-size: 28px; font-weight: bold; }
        .positivo { color: green; }
        .negativo { color: red; }
        canvas { display: block; margin: 20px auto; max-width: 300px; max-height: 300px; }
    </style>
</head>
<body>
<div id="login">
    <form id="loginForm">
        <h2>Login</h2>
        <div class="error" id="loginError"></div>
        <input type="text" id="username" placeholder="Usuário" required>
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>
</div>
<div id="main">
    <header>
        <h1>Consultório</h1>
        <button id="logoutBtn">Sair</button>
    </header>
    <nav>
        <button data-tab="agenda" class="active">Agenda</button>
        <button data-tab="financeiro">Financeiro</button>
        <button data-tab="pacientes">Pacientes</button>
        <button data-tab="profissionais">Profissionais</button>
    </nav>
    <!-- AGENDA -->
    <div id="tab-agenda" class="tab-content active">
        <button id="btnNovoAgenda" onclick="abrirModalAgenda()" style="margin-bottom:20px; padding:10px 20px; background:#667eea; color:white; border:none; border-radius:4px; cursor:pointer;">Novo Agendamento</button>
        <table id="tabelaAgenda">
            <thead><tr><th>Paciente</th><th>Profissional</th><th>Data</th><th>Hora</th><th>Ação</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <!-- FINANCEIRO -->
    <div id="tab-financeiro" class="tab-content">
        <button id="btnNovoLancamento" onclick="abrirModalFinanceiro()" style="margin-bottom:20px; padding:10px 20px; background:#667eea; color:white; border:none; border-radius:4px; cursor:pointer;">Novo Lançamento</button>
        <div class="cards" id="cardsFinanceiro">
            <div class="card"><h3>Total Receitas</h3><div class="valor" id="totalReceitas">R$ 0,00</div></div>
            <div class="card"><h3>Total Despesas</h3><div class="valor" id="totalDespesas">R$ 0,00</div></div>
            <div class="card"><h3>Saldo</h3><div class="valor" id="saldo">R$ 0,00</div></div>
        </div>
        <canvas id="pizzaChart" width="300" height="300"></canvas>
        <table id="tabelaFinanceiro" style="margin-top:20px;">
            <thead><tr><th>Descrição</th><th>Tipo</th><th>Valor (R$)</th><th>Ação</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <!-- PACIENTES -->
    <div id="tab-pacientes" class="tab-content">
        <button id="btnNovoPaciente" onclick="abrirModalPaciente()" style="margin-bottom:20px; padding:10px 20px; background:#667eea; color:white; border:none; border-radius:4px; cursor:pointer;">Novo Paciente</button>
        <table id="tabelaPacientes">
            <thead><tr><th>Nome</th><th>Telefone</th><th>Ação</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <!-- PROFISSIONAIS -->
    <div id="tab-profissionais" class="tab-content">
        <button id="btnNovoProfissional" onclick="abrirModalProfissional()" style="margin-bottom:20px; padding:10px 20px; background:#667eea; color:white; border:none; border-radius:4px; cursor:pointer;">Novo Profissional</button>
        <table id="tabelaProfissionais">
            <thead><tr><th>Nome</th><th>Especialidade</th><th>Ação</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- Modal Agenda -->
<div id="modalAgenda" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Novo Agendamento</h2>
        <form id="formAgenda">
            <input type="text" id="agPaciente" placeholder="Paciente" required>
            <input type="text" id="agProfissional" placeholder="Profissional" required>
            <input type="date" id="agData" required>
            <input type="time" id="agHora" required>
            <button type="submit">Salvar</button>
        </form>
    </div>
</div>

<!-- Modal Financeiro -->
<div id="modalFinanceiro" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Novo Lançamento</h2>
        <form id="formFinanceiro">
            <input type="text" id="finDescricao" placeholder="Descrição" required>
            <select id="finTipo" required>
                <option value="receita">Receita</option>
                <option value="despesa">Despesa</option>
            </select>
            <input type="number" id="finValor" placeholder="Valor (R$)" min="0.01" step="0.01" required>
            <button type="submit">Salvar</button>
        </form>
    </div>
</div>

<!-- Modal Paciente -->
<div id="modalPaciente" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Novo Paciente</h2>
        <form id="formPaciente">
            <input type="text" id="pacNome" placeholder="Nome" required>
            <input type="text" id="pacTelefone" placeholder="Telefone">
            <button type="submit">Salvar</button>
        </form>
    </div>
</div>

<!-- Modal Profissional -->
<div id="modalProfissional" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Novo Profissional</h2>
        <form id="formProfissional">
            <input type="text" id="proNome" placeholder="Nome" required>
            <input type="text" id="proEspecialidade" placeholder="Especialidade">
            <button type="submit">Salvar</button>
        </form>
    </div>
</div>

<script>
    // =============== LOGIN ===============
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if (user === 'admin' && pass === 'admin') {
            localStorage.setItem('loggedIn', 'true');
            mostrarPrincipal();
        } else {
            document.getElementById('loginError').textContent = 'Usuário ou senha inválidos.';
        }
    });
    document.getElementById('logoutBtn').addEventListener('click', function() {
        localStorage.removeItem('loggedIn');
        document.getElementById('main').style.display = 'none';
        document.getElementById('login').style.display = 'flex';
    });
    function mostrarPrincipal() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        carregarDados();
    }
    if (localStorage.getItem('loggedIn') === 'true') mostrarPrincipal();

    // =============== NAVEGAÇÃO ===============
    document.querySelectorAll('nav button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        });
    });

    // =============== MODAIS ===============
    function fecharModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }
    function abrirModal(modalId) {
        document.getElementById(modalId).style.display = 'block';
    }
    document.querySelectorAll('.modal .close').forEach(span => {
        span.addEventListener('click', function() { this.closest('.modal').style.display = 'none'; });
    });
    window.addEventListener('click', function(e) {
        if (e.target.classList.contains('modal')) e.target.style.display = 'none';
    });

    // =============== AGENDA ===============
    let agenda = JSON.parse(localStorage.getItem('agenda')) || [];

    function abrirModalAgenda() { abrirModal('modalAgenda'); document.getElementById('formAgenda').reset(); }
    document.getElementById('formAgenda').addEventListener('submit', function(e) {
        e.preventDefault();
        const item = {
            id: Date.now(),
            paciente: document.getElementById('agPaciente').value,
            profissional: document.getElementById('agProfissional').value,
            data: document.getElementById('agData').value,
            hora: document.getElementById('agHora').value
        };
        agenda.push(item);
        localStorage.setItem('agenda', JSON.stringify(agenda));
        renderAgenda();
        fecharModal('modalAgenda');
    });

    function renderAgenda() {
        const tbody = document.querySelector('#tabelaAgenda tbody');
        tbody.innerHTML = '';
        agenda.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.paciente}</td><td>${item.profissional}</td><td>${item.data}</td><td>${item.hora}</td><td><button class="btn-excluir" onclick="excluirAgenda(${item.id})">Excluir</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function excluirAgenda(id) {
        agenda = agenda.filter(a => a.id !== id);
        localStorage.setItem('agenda', JSON.stringify(agenda));
        renderAgenda();
    }

    // =============== FINANCEIRO ===============
    let financeiro = JSON.parse(localStorage.getItem('financeiro')) || [];

    function abrirModalFinanceiro() { abrirModal('modalFinanceiro'); document.getElementById('formFinanceiro').reset(); }
    document.getElementById('formFinanceiro').addEventListener('submit', function(e) {
        e.preventDefault();
        const item = {
            id: Date.now(),
            descricao: document.getElementById('finDescricao').value,
            tipo: document.getElementById('finTipo').value,
            valor: parseFloat(document.getElementById('finValor').value)
        };
        financeiro.push(item);
        localStorage.setItem('financeiro', JSON.stringify(financeiro));
        renderFinanceiro();
        atualizarCards();
        desenharGrafico();
        fecharModal('modalFinanceiro');
    });

    function renderFinanceiro() {
        const tbody = document.querySelector('#tabelaFinanceiro tbody');
        tbody.innerHTML = '';
        financeiro.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.descricao}</td><td>${item.tipo === 'receita' ? 'Receita' : 'Despesa'}</td><td>R$ ${item.valor.toFixed(2)}</td><td><button class="btn-excluir" onclick="excluirFinanceiro(${item.id})">Excluir</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function excluirFinanceiro(id) {
        financeiro = financeiro.filter(f => f.id !== id);
        localStorage.setItem('financeiro', JSON.stringify(financeiro));
        renderFinanceiro();
        atualizarCards();
        desenharGrafico();
    }

    function atualizarCards() {
        let totalReceitas = 0, totalDespesas = 0;
        financeiro.forEach(item => {
            if (item.tipo === 'receita') totalReceitas += item.valor;
            else totalDespesas += item.valor;
        });
        const saldo = totalReceitas - totalDespesas;
        document.getElementById('totalReceitas').textContent = 'R$ ' + totalReceitas.toFixed(2);
        document.getElementById('totalDespesas').textContent = 'R$ ' + totalDespesas.toFixed(2);
        const saldoEl = document.getElementById('saldo');
        saldoEl.textContent = 'R$ ' + saldo.toFixed(2);
        saldoEl.className = 'valor ' + (saldo >= 0 ? 'positivo' : 'negativo');
    }

    function desenharGrafico() {
        const canvas = document.getElementById('pizzaChart');
        const ctx = canvas.getContext('2d');
        const largura = canvas.width, altura = canvas.height;
        ctx.clearRect(0, 0, largura, altura);
        let receita = 0, despesa = 0;
        financeiro.forEach(item => {
            if (item.tipo === 'receita') receita += item.valor;
            else despesa += item.valor;
        });
        const total = receita + despesa;
        if (total === 0) {
            ctx.fillStyle = '#ccc';
            ctx.beginPath();
            ctx.arc(largura/2, altura/2, 120, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#666';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Sem dados', largura/2, altura/2);
            return;
        }
        const raio = 120;
        const centroX = largura/2, centroY = altura/2;
        // Desenha receita (verde)
        const angReceita = (receita / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(centroX, centroY);
        ctx.arc(centroX, centroY, raio, -Math.PI/2, -Math.PI/2 + angReceita);
        ctx.closePath();
        ctx.fillStyle = '#27ae60';
        ctx.fill();
        // Desenha despesa (vermelho)
        if (despesa > 0) {
            ctx.beginPath();
            ctx.moveTo(centroX, centroY);
            ctx.arc(centroX, centroY, raio, -Math.PI/2 + angReceita, -Math.PI/2 + Math.PI*2);
            ctx.closePath();
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
        }
        // Legenda
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(20, 20, 20, 20);
        ctx.fillStyle = '#000';
        ctx.font = '14px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('Receita', 45, 35);
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(20, 45, 20, 20);
        ctx.fillStyle = '#000';
        ctx.fillText('Despesa', 45, 60);
    }

    // =============== PACIENTES ===============
    let pacientes = JSON.parse(localStorage.getItem('pacientes')) || [];

    function abrirModalPaciente() { abrirModal('modalPaciente'); document.getElementById('formPaciente').reset(); }
    document.getElementById('formPaciente').addEventListener('submit', function(e) {
        e.preventDefault();
        const item = {
            id: Date.now(),
            nome: document.getElementById('pacNome').value,
            telefone: document.getElementById('pacTelefone').value
        };
        pacientes.push(item);
        localStorage.setItem('pacientes', JSON.stringify(pacientes));
        renderPacientes();
        fecharModal('modalPaciente');
    });
    function renderPacientes() {
        const tbody = document.querySelector('#tabelaPacientes tbody');
        tbody.innerHTML = '';
        pacientes.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${p.nome}</td><td>${p.telefone || ''}</td><td><button class="btn-excluir" onclick="excluirPaciente(${p.id})">Excluir</button></td>`;
            tbody.appendChild(tr);
        });
    }
    function excluirPaciente(id) {
        pacientes = pacientes.filter(p => p.id !== id);
        localStorage.setItem('pacientes', JSON.stringify(pacientes));
        renderPacientes();
    }

    // =============== PROFISSIONAIS ===============
    let profissionais = JSON.parse(localStorage.getItem('profissionais')) || [];

    function abrirModalProfissional() { abrirModal('modalProfissional'); document.getElementById('formProfissional').reset(); }
    document.getElementById('formProfissional').addEventListener('submit', function(e) {
        e.preventDefault();
        const item = {
            id: Date.now(),
            nome: document.getElementById('proNome').value,
            especialidade: document.getElementById('proEspecialidade').value
        };
        profissionais.push(item);
        localStorage.setItem('profissionais', JSON.stringify(profissionais));
        renderProfissionais();
        fecharModal('modalProfissional');
    });
    function renderProfissionais() {
        const tbody = document.querySelector('#tabelaProfissionais tbody');
        tbody.innerHTML = '';
        profissionais.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${p.nome}</td><td>${p.especialidade || ''}</td><td><button class="btn-excluir" onclick="excluirProfissional(${p.id})">Excluir</button></td>`;
            tbody.appendChild(tr);
        });
    }
    function excluirProfissional(id) {
        profissionais = profissionais.filter(p => p.id !== id);
        localStorage.setItem('profissionais', JSON.stringify(profissionais));
        renderProfissionais();
    }

    // =============== CARREGAR DADOS INICIAIS ===============
    function carregarDados() {
        renderAgenda();
        renderFinanceiro();
        atualizarCards();
        desenharGrafico();
        renderPacientes();
        renderProfissionais();
    }
</script>
</body>
</html>
