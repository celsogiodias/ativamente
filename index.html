<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Odontologia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f6f9; padding: 30px; }
        .container { max-width: 1200px; margin: auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 30px; }
        h1 { color: #00204A; font-weight: 700; margin-bottom: 25px; }
        .top-bar { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .filter-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filter-group label { font-weight: 600; color: #00204A; }
        select, input[type="text"] { padding: 8px 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        select:focus, input[type="text"]:focus { border-color: #008080; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #FF6B35; color: #fff; }
        .btn-primary:hover { background: #e55a2b; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-teal { background: #008080; color: #fff; }
        .btn-teal:hover { background: #006666; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 30px; }
        .calendar-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-header h2 { font-size: 22px; color: #00204A; }
        .calendar-header button { background: none; border: none; font-size: 24px; cursor: pointer; color: #008080; }
        .day-name { text-align: center; font-weight: 700; color: #00204A; padding: 10px 0; }
        .day { background: #f8f9fa; border-radius: 12px; padding: 8px; min-height: 90px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .day:hover { border-color: #FF6B35; }
        .day.today { background: #e8f4f8; border-color: #008080; }
        .day.other-month { opacity: 0.4; }
        .day-number { font-weight: 700; font-size: 16px; color: #00204A; margin-bottom: 4px; }
        .event-badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; margin: 2px 0; color: #fff; display: inline-block; width: 100%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge-confirmado { background: #28a745; }
        .badge-nao-confirmado { background: #dc3545; }
        .badge-agendado { background: #6c757d; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #00204A; color: #fff; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f1f1f1; }
        .actions button { margin: 0 4px; padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: #FF6B35; color: #fff; }
        .btn-delete { background: #dc3545; color: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-content h2 { color: #00204A; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; color: #00204A; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #008080; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        @media (max-width: 768px) {
            .calendar { grid-template-columns: repeat(7, 1fr); gap: 4px; }
            .day { min-height: 70px; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="container" id="agenda-app">
    <h1>📅 Agenda</h1>
    <div class="top-bar">
        <div class="filter-group">
            <label for="filter-professional">Filtrar por profissional:</label>
            <select id="filter-professional">
                <option value="">Todos</option>
            </select>
        </div>
        <button class="btn btn-primary" id="btn-new-appointment">+ Novo Agendamento</button>
    </div>
    <div class="calendar" id="calendar">
        <!-- Header gerado via JS -->
    </div>
    <h2 style="color:#00204A; margin-top:30px;">📋 Lista de Agendamentos</h2>
    <div class="table-responsive">
        <table id="appointments-table">
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Profissional</th>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="appointments-tbody"></tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal-appointment">
    <div class="modal-content">
        <h2 id="modal-title">Novo Agendamento</h2>
        <form id="form-appointment">
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label for="paciente">Paciente *</label>
                <input type="text" id="paciente" placeholder="Nome do paciente" required>
            </div>
            <div class="form-group">
                <label for="profissional">Profissional *</label>
                <input type="text" id="profissional" placeholder="Nome do profissional" required>
            </div>
            <div class="form-group">
                <label for="data">Data *</label>
                <input type="date" id="data" required>
            </div>
            <div class="form-group">
                <label for="hora">Hora *</label>
                <input type="time" id="hora" required>
            </div>
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status">
                    <option value="Agendado">Agendado</option>
                    <option value="Confirmado">Confirmado</option>
                    <option value="Não confirmado">Não confirmado</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
                <button type="submit" class="btn btn-teal" id="btn-save">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script>
    let appointments = JSON.parse(localStorage.getItem('agenda_appointments')) || [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let editingId = null;

    const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

    function saveAppointments() {
        localStorage.setItem('agenda_appointments', JSON.stringify(appointments));
    }

    function generateId() {
        return '_' + Math.random().toString(36).substr(2, 9);
    }

    function getFilteredAppointments() {
        const filter = document.getElementById('filter-professional').value;
        if (!filter) return appointments;
        return appointments.filter(a => a.profissional === filter);
    }

    function updateProfessionalFilter() {
        const select = document.getElementById('filter-professional');
        const distinct = [...new Set(appointments.map(a => a.profissional))];
        const current = select.value;
        select.innerHTML = '<option value="">Todos</option>';
        distinct.forEach(prof => {
            const opt = document.createElement('option');
            opt.value = prof;
            opt.textContent = prof;
            select.appendChild(opt);
        });
        if (distinct.includes(current)) select.value = current;
        else select.value = '';
    }

    function renderCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = '';
        const header = document.createElement('div');
        header.className = 'calendar-header';
        header.innerHTML = `
            <button onclick="changeMonth(-1)">❮</button>
            <h2>${months[currentMonth]} ${currentYear}</h2>
            <button onclick="changeMonth(1)">❯</button>
        `;
        container.appendChild(header);
        dayNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'day-name';
            div.textContent = name;
            container.appendChild(div);
        });
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const today = new Date();
        const filtered = getFilteredAppointments();
        for (let i = 0; i < firstDay; i++) {
            const div = document.createElement('div');
            div.className = 'day other-month';
            container.appendChild(div);
        }
        for (let day = 1; day <= daysInMonth; day++) {
            const div = document.createElement('div');
            div.className = 'day';
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === day) {
                div.classList.add('today');
            }
            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = day;
            div.appendChild(dayNumber);
            const dayEvents = filtered.filter(a => a.data === dateStr);
            dayEvents.forEach(ev => {
                const badge = document.createElement('div');
                badge.className = 'event-badge';
                if (ev.status === 'Confirmado') badge.classList.add('badge-confirmado');
                else if (ev.status === 'Não confirmado') badge.classList.add('badge-nao-confirmado');
                else badge.classList.add('badge-agendado');
                badge.textContent = `${ev.paciente} ${ev.hora}`;
                div.appendChild(badge);
            });
            container.appendChild(div);
        }
        const remaining = 7 - ((firstDay + daysInMonth) % 7 || 7);
        for (let i = 0; i < remaining; i++) {
            const div = document.createElement('div');
            div.className = 'day other-month';
            container.appendChild(div);
        }
    }

    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
    }

    function renderTable() {
        const tbody = document.getElementById('appointments-tbody');
        tbody.innerHTML = '';
        const filtered = getFilteredAppointments();
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">Nenhum agendamento encontrado.</td></tr>';
            return;
        }
        filtered.forEach(app => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${app.paciente}</td>
                <td>${app.profissional}</td>
                <td>${app.data}</td>
                <td>${app.hora}</td>
                <td><span class="event-badge ${app.status === 'Confirmado' ? 'badge-confirmado' : app.status === 'Não confirmado' ? 'badge-nao-confirmado' : 'badge-agendado'}">${app.status}</span></td>
                <td class="actions">
                    <button class="btn-edit" onclick="editAppointment('${app.id}')">Editar</button>
                    <button class="btn-delete" onclick="deleteAppointment('${app.id}')">Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function openModal() {
        document.getElementById('modal-appointment').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-appointment').style.display = 'none';
        document.getElementById('form-appointment').reset();
        document.getElementById('edit-id').value = '';
        editingId = null;
        document.getElementById('modal-title').textContent = 'Novo Agendamento';
    }

    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal-appointment')) closeModal();
    });

    document.getElementById('form-appointment').addEventListener('submit', (e) => {
        e.preventDefault();
        const paciente = document.getElementById('paciente').value.trim();
        const profissional = document.getElementById('profissional').value.trim();
        const data = document.getElementById('data').value;
        const hora = document.getElementById('hora').value;
        const status = document.getElementById('status').value;
        if (!paciente || !profissional || !data || !hora) {
            alert('Preencha todos os campos obrigatórios.');
            return;
        }
        if (editingId) {
            const index = appointments.findIndex(a => a.id === editingId);
            if (index !== -1) {
                appointments[index] = { ...appointments[index], paciente, profissional, data, hora, status };
            }
        } else {
            const newApp = {
                id: generateId(),
                paciente,
                profissional,
                data,
                hora,
                status
            };
            appointments.push(newApp);
        }
        saveAppointments();
        closeModal();
        updateProfessionalFilter();
        renderCalendar();
        renderTable();
    });

    function editAppointment(id) {
        const app = appointments.find(a => a.id === id);
        if (!app) return;
        editingId = id;
        document.getElementById('edit-id').value = id;
        document.getElementById('paciente').value = app.paciente;
        document.getElementById('profissional').value = app.profissional;
        document.getElementById('data').value = app.data;
        document.getElementById('hora').value = app.hora;
        document.getElementById('status').value = app.status;
        document.getElementById('modal-title').textContent = 'Editar Agendamento';
        openModal();
    }

    function deleteAppointment(id) {
        if (!confirm('Tem certeza que deseja excluir este agendamento?')) return;
        appointments = appointments.filter(a => a.id !== id);
        saveAppointments();
        updateProfessionalFilter();
        renderCalendar();
        renderTable();
    }

    document.getElementById('btn-new-appointment').addEventListener('click', () => {
        editingId = null;
        document.getElementById('modal-title').textContent = 'Novo Agendamento';
        openModal();
    });

    document.getElementById('filter-professional').addEventListener('change', () => {
        renderCalendar();
        renderTable();
    });

    // Initialize
    updateProfessionalFilter();
    renderCalendar();
    renderTable();
</script>
</body>
</html>
