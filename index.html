<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body { background:#f5f5f5; color:#333; }
#app { max-width:1200px; margin:20px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
h1 { text-align:center; margin-bottom:20px; }
.login { max-width:400px; margin:50px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
.login input { display:block; width:100%; margin:10px 0; padding:8px; border:1px solid #ccc; border-radius:4px; }
.login button { width:100%; padding:10px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer; }
.login button:hover { background:#0056b3; }
.menu { display:flex; justify-content:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.menu button { padding:10px 20px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer; }
.menu button:hover { background:#0056b3; }
.menu button.active { background:#0056b3; }
.section { display:none; }
.section.active { display:block; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { border:1px solid #ddd; padding:8px; text-align:left; }
th { background-color:#f2f2f2; }
form { display:flex; flex-direction:column; gap:10px; max-width:500px; margin:20px 0; }
input, select, textarea { padding:8px; border:1px solid #ccc; border-radius:4px; }
button { padding:8px 16px; background:#28a745; color:#fff; border:none; border-radius:4px; cursor:pointer; }
button:hover { background:#218838; }
button.danger { background:#dc3545; }
button.danger:hover { background:#c82333; }
.tabs { display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap; }
.tab-btn { padding:8px 16px; background:#e9ecef; border:1px solid #ced4da; border-radius:4px 4px 0 0; cursor:pointer; }
.tab-btn.active { background:#fff; border-bottom:2px solid #007bff; }
.tab-content { display:none; border:1px solid #ddd; padding:15px; background:#fff; }
.tab-content.active { display:block; }
.evolucao-item { border:1px solid #ddd; padding:10px; margin:10px 0; border-radius:4px; background:#fafafa; }
.evolucao-item .data { font-size:0.9em; color:#666; }
.evolucao-item .texto { margin:5px 0; }
.evolucao-item .analise { margin-top:10px; padding:8px; background:#e7f3fe; border-left:4px solid #007bff; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// --- Data management ---
let data = JSON.parse(localStorage.getItem('clinicaData')) || {
  users: [{ username: 'admin', password: 'admin', role: 'admin' }],
  professionals: [],
  patients: [],
  appointments: [],
  settings: { clinicaName: 'Minha Clínica' },
  prontuarios: {} // key: patientId_professionalId
};

function saveData() {
  localStorage.setItem('clinicaData', JSON.stringify(data));
}

let currentUser = null;
let currentSection = 'login';

// --- Render ---
function render() {
  const app = document.getElementById('app');
  if (!currentUser) {
    app.innerHTML = renderLogin();
    return;
  }
  app.innerHTML = renderMain();
  document.querySelectorAll('.menu button').forEach(btn => {
    btn.addEventListener('click', () => showSection(btn.dataset.section));
  });
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.remove('active');
    if (sec.id === currentSection) sec.classList.add('active');
  });
  // Render section specific
  if (currentSection === 'professionals') renderProfessionals();
  if (currentSection === 'patients') renderPatients();
  if (currentSection === 'appointments') renderAppointments();
  if (currentSection === 'prontuario') renderProntuario();
  if (currentSection === 'settings') renderSettings();
}

function renderLogin() {
  return `
    <div class="login">
      <h2>Login</h2>
      <input type="text" id="username" placeholder="Usuário" autocomplete="off">
      <input type="password" id="password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
    </div>
  `;
}

function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const user = data.users.find(u => u.username === username && u.password === password);
  if (user) {
    currentUser = user;
    currentSection = 'patients';
    render();
  } else {
    alert('Usuário ou senha inválidos.');
  }
}

function renderMain() {
  const isAdmin = currentUser.role === 'admin';
  return `
    <h1>${data.settings.clinicaName}</h1>
    <div class="menu">
      <button data-section="patients" class="${currentSection === 'patients' ? 'active' : ''}">Pacientes</button>
      ${isAdmin ? '<button data-section="professionals" class="' + (currentSection === 'professionals' ? 'active' : '') + '">Profissionais</button>' : ''}
      ${isAdmin ? '<button data-section="appointments" class="' + (currentSection === 'appointments' ? 'active' : '') + '">Agenda</button>' : ''}
      <button data-section="prontuario" class="${currentSection === 'prontuario' ? 'active' : ''}">Prontuário</button>
      ${isAdmin ? '<button data-section="settings" class="' + (currentSection === 'settings' ? 'active' : '') + '">Configurações</button>' : ''}
      <button onclick="logout()" style="background:#dc3545;">Sair</button>
    </div>
    <div id="patients" class="section ${currentSection === 'patients' ? 'active' : ''}">
      <h2>Pacientes</h2>
      <div id="patients-content"></div>
    </div>
    <div id="professionals" class="section ${currentSection === 'professionals' ? 'active' : ''}">
      <h2>Profissionais</h2>
      <div id="professionals-content"></div>
    </div>
    <div id="appointments" class="section ${currentSection === 'appointments' ? 'active' : ''}">
      <h2>Agenda</h2>
      <div id="appointments-content"></div>
    </div>
    <div id="prontuario" class="section ${currentSection === 'prontuario' ? 'active' : ''}">
      <h2>Prontuário</h2>
      <div id="prontuario-content"></div>
    </div>
    <div id="settings" class="section ${currentSection === 'settings' ? 'active' : ''}">
      <h2>Configurações</h2>
      <div id="settings-content"></div>
    </div>
  `;
}

function showSection(section) {
  currentSection = section;
  render();
}

function logout() {
  currentUser = null;
  render();
}

// --- Professionals ---
function renderProfessionals() {
  const container = document.getElementById('professionals-content');
  let html = `
    <h3>Cadastrar Profissional</h3>
    <form id="professional-form">
      <input type="text" id="prof-name" placeholder="Nome" required>
      <input type="text" id="prof-doc" placeholder="Registro Profissional" required>
      <input type="text" id="prof-cpf" placeholder="CPF" required>
      <input type="text" id="prof-phone" placeholder="Telefone">
      <input type="text" id="prof-specialty" placeholder="Especialidade">
      <input type="password" id="prof-password" placeholder="Senha (para login)" required>
      <button type="submit">Salvar</button>
    </form>
    <h3>Lista de Profissionais</h3>
    <table>
      <thead><tr><th>Nome</th><th>Registro Prof.</th><th>CPF</th><th>Telefone</th><th>Especialidade</th><th>Ações</th></tr></thead>
      <tbody id="prof-table-body">
  `;
  data.professionals.forEach((prof, index) => {
    html += `<tr><td>${prof.name}</td><td>${prof.doc}</td><td>${prof.cpf}</td><td>${prof.phone || ''}</td><td>${prof.specialty || ''}</td><td><button class="danger" onclick="deleteProfessional(${index})">Excluir</button></td></tr>`;
  });
  html += `</tbody></table>`;
  container.innerHTML = html;
  document.getElementById('professional-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('prof-name').value;
    const doc = document.getElementById('prof-doc').value;
    const cpf = document.getElementById('prof-cpf').value;
    const phone = document.getElementById('prof-phone').value;
    const specialty = document.getElementById('prof-specialty').value;
    const password = document.getElementById('prof-password').value;
    if (name && doc && cpf && password) {
      data.professionals.push({ name, doc, cpf, phone, specialty, password });
      // Also add user for login
      if (!data.users.find(u => u.username === cpf)) {
        data.users.push({ username: cpf, password, role: 'professional' });
      }
      saveData();
      renderProfessionals();
      document.getElementById('professional-form').reset();
    } else {
      alert('Preencha todos os campos obrigatórios.');
    }
  });
}

function deleteProfessional(index) {
  if (confirm('Excluir profissional?')) {
    const prof = data.professionals[index];
    // Remove user
    data.users = data.users.filter(u => u.username !== prof.cpf);
    data.professionals.splice(index, 1);
    saveData();
    renderProfessionals();
  }
}

// --- Patients (without Documento/Registro Prof.) ---
function renderPatients() {
  const container = document.getElementById('patients-content');
  let html = `
    <h3>Cadastrar Paciente</h3>
    <form id="patient-form">
      <input type="text" id="pat-name" placeholder="Nome" required>
      <input type="text" id="pat-cpf" placeholder="CPF" required>
      <input type="text" id="pat-phone" placeholder="Telefone">
      <input type="text" id="pat-address" placeholder="Endereço">
      <input type="date" id="pat-dob" placeholder="Data de Nascimento" required>
      <div>
        <label><input type="checkbox" id="pat-menor" onchange="toggleResponsavel()"> Menor de idade</label>
      </div>
      <div id="responsavel-field" style="display:none;">
        <input type="text" id="pat-responsavel" placeholder="Responsável">
      </div>
      <button type="submit">Salvar</button>
    </form>
    <h3>Lista de Pacientes</h3>
    <table>
      <thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Endereço</th><th>Data Nasc.</th><th>Menor/Responsável</th><th>Ações</th></tr></thead>
      <tbody id="pat-table-body">
  `;
  data.patients.forEach((pat, index) => {
    const menor = pat.menor ? `Sim (Resp: ${pat.responsavel})` : 'Não';
    html += `<tr><td>${pat.name}</td><td>${pat.cpf}</td><td>${pat.phone || ''}</td><td>${pat.address || ''}</td><td>${pat.dob}</td><td>${menor}</td><td><button class="danger" onclick="deletePatient(${index})">Excluir</button></td></tr>`;
  });
  html += `</tbody></table>`;
  container.innerHTML = html;
  document.getElementById('patient-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('pat-name').value;
    const cpf = document.getElementById('pat-cpf').value;
    const phone = document.getElementById('pat-phone').value;
    const address = document.getElementById('pat-address').value;
    const dob = document.getElementById('pat-dob').value;
    const menor = document.getElementById('pat-menor').checked;
    const responsavel = menor ? document.getElementById('pat-responsavel').value : '';
    if (name && cpf && dob) {
      data.patients.push({ name, cpf, phone, address, dob, menor, responsavel });
      saveData();
      renderPatients();
      document.getElementById('patient-form').reset();
      document.getElementById('responsavel-field').style.display = 'none';
    } else {
      alert('Preencha todos os campos obrigatórios.');
    }
  });
}

function toggleResponsavel() {
  const checkbox = document.getElementById('pat-menor');
  const field = document.getElementById('responsavel-field');
  field.style.display = checkbox.checked ? 'block' : 'none';
}

function deletePatient(index) {
  if (confirm('Excluir paciente?')) {
    data.patients.splice(index, 1);
    saveData();
    renderPatients();
  }
}

// --- Appointments (Agenda) ---
function renderAppointments() {
  const container = document.getElementById('appointments-content');
  let html = `
    <h3>Agendar Consulta</h3>
    <form id="appointment-form">
      <select id="app-pat" required><option value="">Selecione Paciente</option></select>
      <select id="app-prof" required><option value="">Selecione Profissional</option></select>
      <input type="datetime-local" id="app-datetime" required>
      <input type="text" id="app-notes" placeholder="Observações">
      <button type="submit">Agendar</button>
    </form>
    <h3>Consultas Agendadas</h3>
    <table>
      <thead><tr><th>Paciente</th><th>Profissional</th><th>Data/Hora</th><th>Observações</th><th>Ações</th></tr></thead>
      <tbody id="app-table-body">
  `;
  data.appointments.forEach((app, index) => {
    const patient = data.patients.find(p => p.cpf === app.patientCpf);
    const professional = data.professionals.find(p => p.cpf === app.professionalCpf);
    const patName = patient ? patient.name : 'Desconhecido';
    const profName = professional ? professional.name : 'Desconhecido';
    html += `<tr><td>${patName}</td><td>${profName}</td><td>${app.datetime}</td><td>${app.notes || ''}</td><td><button class="danger" onclick="deleteAppointment(${index})">Excluir</button></td></tr>`;
  });
  html += `</tbody></table>`;
  container.innerHTML = html;
  // Populate selects
  const patSelect = document.getElementById('app-pat');
  const profSelect = document.getElementById('app-prof');
  data.patients.forEach(p => {
    patSelect.innerHTML += `<option value="${p.cpf}">${p.name} - ${p.cpf}</option>`;
  });
  data.professionals.forEach(p => {
    profSelect.innerHTML += `<option value="${p.cpf}">${p.name} - ${p.cpf}</option>`;
  });
  document.getElementById('appointment-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const patientCpf = document.getElementById('app-pat').value;
    const professionalCpf = document.getElementById('app-prof').value;
    const datetime = document.getElementById('app-datetime').value;
    const notes = document.getElementById('app-notes').value;
    if (patientCpf && professionalCpf && datetime) {
      data.appointments.push({ patientCpf, professionalCpf, datetime, notes });
      saveData();
      renderAppointments();
      document.getElementById('appointment-form').reset();
    } else {
      alert('Preencha todos os campos obrigatórios.');
    }
  });
}

function deleteAppointment(index) {
  if (confirm('Excluir agendamento?')) {
    data.appointments.splice(index, 1);
    saveData();
    renderAppointments();
  }
}

// --- Prontuário (Medical Record) ---
function renderProntuario() {
  const container = document.getElementById('prontuario-content');
  let html = `
    <h3>Selecionar Paciente e Profissional</h3>
    <form id="prontuario-select-form">
      <select id="pront-pat" required><option value="">Selecione Paciente</option></select>
      <select id="pront-prof" required><option value="">Selecione Profissional</option></select>
      <button type="submit">Abrir Prontuário</button>
    </form>
    <div id="prontuario-tabs" style="display:none;">
      <div class="tabs" id="tab-buttons"></div>
      <div id="tab-contents"></div>
    </div>
  `;
  container.innerHTML = html;
  // Populate selects
  const patSelect = document.getElementById('pront-pat');
  const profSelect = document.getElementById('pront-prof');
  data.patients.forEach(p => {
    patSelect.innerHTML += `<option value="${p.cpf}">${p.name} - ${p.cpf}</option>`;
  });
  data.professionals.forEach(p => {
    profSelect.innerHTML += `<option value="${p.cpf}">${p.name} - ${p.cpf}</option>`;
  });
  document.getElementById('prontuario-select-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const patCpf = document.getElementById('pront-pat').value;
    const profCpf = document.getElementById('pront-prof').value;
    if (patCpf && profCpf) {
      openProntuario(patCpf, profCpf);
    } else {
      alert('Selecione paciente e profissional.');
    }
  });
}

function openProntuario(patientCpf, professionalCpf) {
  const key = `${patientCpf}_${professionalCpf}`;
  if (!data.prontuarios[key]) {
    data.prontuarios[key] = {
      anamnese: '',
      atestados: '',
      laudos: '',
      declaracoes: '',
      anexos: '',
      evolucoes: [] // array of {datetime, text, analise}
    };
    saveData();
  }
  const pront = data.prontuarios[key];
  const tabsContainer = document.getElementById('prontuario-tabs');
  const tabButtons = document.getElementById('tab-buttons');
  const tabContents = document.getElementById('tab-contents');
  tabsContainer.style.display = 'block';
  const tabNames = ['Anamnese', 'Atestados', 'Laudos', 'Declarações', 'Anexos', 'Evolução'];
  let buttonsHtml = '';
  let contentsHtml = '';
  tabNames.forEach((name, i) => {
    const active = i === 0 ? 'active' : '';
    buttonsHtml += `<button class="tab-btn ${active}" data-tab="${i}">${name}</button>`;
    let content = '';
    if (name === 'Evolução') {
      content = renderEvolucaoTab(pront);
    } else {
      const fieldMap = { 'Anamnese': 'anamnese', 'Atestados': 'atestados', 'Laudos': 'laudos', 'Declarações': 'declaracoes', 'Anexos': 'anexos' };
      const field = fieldMap[name];
      content = `
        <textarea id="tab-textarea-${i}" style="width:100%;height:200px;">${pront[field] || ''}</textarea>
        <button onclick="saveTabContent('${key}', '${field}', ${i})">Salvar</button>
      `;
    }
    contentsHtml += `<div class="tab-content ${active}" data-tab="${i}">${content}</div>`;
  });
  tabButtons.innerHTML = buttonsHtml;
  tabContents.innerHTML = contentsHtml;
  // Add tab switching events
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      const tabIndex = btn.dataset.tab;
      document.querySelector(`.tab-content[data-tab="${tabIndex}"]`).classList.add('active');
    });
  });
}

function saveTabContent(key, field, tabIndex) {
  const content = document.getElementById(`tab-textarea-${tabIndex}`).value;
  data.prontuarios[key][field] = content;
  saveData();
  alert('Salvo com sucesso!');
}

function renderEvolucaoTab(pront) {
  let html = `
    <h4>Nova Anotação</h4>
    <form id="evolucao-form">
      <input type="hidden" id="evol-datetime" value="${new Date().toISOString().slice(0,16)}">
      <textarea id="evol-text" placeholder="Texto da anotação" style="width:100%;height:150px;" required></textarea>
      <button type="submit">Salvar Evolução</button>
    </form>
    <h4>Linha do Tempo</h4>
    <div id="evolucao-list">
  `;
  // Sort evolutions by datetime descending
  const evols = [...pront.evolucoes].sort((a,b) => new Date(b.datetime) - new Date(a.datetime));
  evols.forEach(ev => {
    const dataHora = new Date(ev.datetime).toLocaleString('pt-BR');
    html += `
      <div class="evolucao-item">
        <div class="data">${dataHora}</div>
        <div class="texto">${ev.text}</div>
        <div class="analise"><strong>Análise IA:</strong> ${ev.analise || 'Análise não disponível'}</div>
      </div>
    `;
  });
  html += `</div>`;
  // Need to bind form after render
  setTimeout(() => {
    document.getElementById('evolucao-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const datetime = document.getElementById('evol-datetime').value;
      const text = document.getElementById('evol-text').value;
      if (text) {
        const analise = gerarAnaliseIA(text);
        pront.evolucoes.push({ datetime, text, analise });
        saveData();
        // Re-render tab
        const key = Object.keys(data.prontuarios).find(k => data.prontuarios[k] === pront);
        openProntuario(key.split('_')[0], key.split('_')[1]);
      }
    });
  }, 0);
  return html;
}

function gerarAnaliseIA(texto) {
  const palavrasChave = {
    melhora: ['melhora', 'melhorou', 'melhorando', 'progresso', 'evolução positiva'],
    progresso: ['progresso', 'avançou', 'avanço', 'evolução', 'desenvolvimento'],
    dificuldade: ['dificuldade', 'dificuldades', 'problema', 'problemas', 'resistência'],
    resistencia: ['resistência', 'resistente', 'teimoso', 'não colabora']
  };
  let resumo = 'O paciente apresenta ';
  const lower = texto.toLowerCase();
  let hasPositivo = false;
  let hasNegativo = false;
  if (palavrasChave.melhora.some(p => lower.includes(p))) {
    resumo += 'sinais de melhora e progresso no tratamento. ';
    hasPositivo = true;
  }
  if (palavrasChave.progresso.some(p => lower.includes(p))) {
    resumo += 'Há evidências de progresso significativo. ';
    hasPositivo = true;
  }
  if (palavrasChave.dificuldade.some(p => lower.includes(p))) {
    resumo += 'No entanto, foram relatadas dificuldades que necessitam atenção. ';
    hasNegativo = true;
  }
  if (palavrasChave.resistencia.some(p => lower.includes(p))) {
    resumo += 'Observa-se resistência por parte do paciente, sendo necessário reforço na abordagem. ';
    hasNegativo = true;
  }
  if (!hasPositivo && !hasNegativo) {
    resumo = 'A evolução segue dentro do esperado, sem indicadores relevantes de mudança. Continuar monitoramento.';
  } else if (hasPositivo && !hasNegativo) {
    resumo += 'Manter conduta atual.';
  } else if (!hasPositivo && hasNegativo) {
    resumo += 'Reavaliar estratégias terapêuticas.';
  } else {
    resumo += 'Balancear intervenções para potencializar progressos e minimizar obstáculos.';
  }
  return resumo;
}

// --- Settings ---
function renderSettings() {
  const container = document.getElementById('settings-content');
  container.innerHTML = `
    <h3>Configurações da Clínica</h3>
    <form id="settings-form">
      <label>Nome da Clínica:</label>
      <input type="text" id="settings-name" value="${data.settings.clinicaName}">
      <button type="submit">Salvar</button>
    </form>
  `;
  document.getElementById('settings-form').addEventListener('submit', (e) => {
    e.preventDefault();
    data.settings.clinicaName = document.getElementById('settings-name').value;
    saveData();
    render();
  });
}

// Initial render
render();
</script>
</body>
</html>
