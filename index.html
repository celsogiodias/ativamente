<script>

/* =========================================
   BANCO DE DADOS LOCAL
========================================= */

let pacientes = [
    {
        nome:"Maria Souza",
        nascimento:"1995-05-10",
        telefone:"(11) 99999-9999",
        profissional:"Dra. Ana Paula",
        valor:"250"
    }
];

let profissionais = [
    {
        nome:"Dra. Ana Paula",
        especialidade:"Psicóloga Clínica",
        telefone:"(11) 98888-8888"
    },
    {
        nome:"Dr. Lucas",
        especialidade:"Neuropsicólogo",
        telefone:"(11) 97777-7777"
    }
];

let agenda = [
    {
        paciente:"Maria Souza",
        profissional:"Dra. Ana Paula",
        data:"27/05/2026",
        hora:"09:00",
        sala:"Sala 1",
        status:"Confirmado"
    }
];

/* =========================================
   KPI DINÂMICO
========================================= */

function atualizarKPIs(){

    // PACIENTES
    document.getElementById("kpiPacientes").innerText =
        pacientes.length;

    // PROFISSIONAIS
    document.getElementById("kpiProfissionais").innerText =
        profissionais.length;

    // AGENDA
    document.getElementById("kpiAgenda").innerText =
        agenda.length;

}

/* =========================================
   RENDER PROFISSIONAIS
========================================= */

function renderProfissionais(){

    const tbody =
        document.getElementById("profissionaisTable");

    tbody.innerHTML = "";

    profissionais.forEach((prof,index)=>{

        tbody.innerHTML += `
            <tr>

                <td>${prof.nome}</td>

                <td>${prof.especialidade}</td>

                <td>${prof.telefone}</td>

                <td>

                    <button
                        class="btn-warning"
                        onclick="editarProfissional(${index})"
                    >
                        Editar
                    </button>

                    <button
                        class="btn-danger"
                        onclick="excluirProfissional(${index})"
                    >
                        Excluir
                    </button>

                </td>

            </tr>
        `;

    });

}

/* =========================================
   ADICIONAR PROFISSIONAL
========================================= */

function incluirProfissional(){

    const nome =
        prompt("Nome do profissional:");

    if(!nome) return;

    const especialidade =
        prompt("Especialidade:");

    const telefone =
        prompt("Telefone:");

    profissionais.push({

        nome,
        especialidade,
        telefone

    });

    renderProfissionais();
    atualizarKPIs();

    alert("Profissional adicionado!");

}

/* =========================================
   EDITAR PROFISSIONAL
========================================= */

function editarProfissional(index){

    const profissional =
        profissionais[index];

    const novoNome =
        prompt(
            "Editar nome:",
            profissional.nome
        );

    if(!novoNome) return;

    profissional.nome = novoNome;

    profissional.especialidade =
        prompt(
            "Especialidade:",
            profissional.especialidade
        );

    profissional.telefone =
        prompt(
            "Telefone:",
            profissional.telefone
        );

    renderProfissionais();

    alert("Profissional atualizado!");

}

/* =========================================
   EXCLUIR PROFISSIONAL
========================================= */

function excluirProfissional(index){

    const confirmar =
        confirm(
            "Deseja excluir profissional?"
        );

    if(confirmar){

        profissionais.splice(index,1);

        renderProfissionais();
        atualizarKPIs();

        alert("Profissional removido!");

    }

}

/* =========================================
   PACIENTES
========================================= */

function incluirPaciente(){

    const nome =
        prompt("Nome do paciente:");

    if(!nome) return;

    const nascimento =
        prompt("Nascimento:");

    const telefone =
        prompt("Telefone:");

    const profissional =
        prompt("Profissional:");

    const valor =
        prompt("Valor:");

    pacientes.push({

        nome,
        nascimento,
        telefone,
        profissional,
        valor

    });

    atualizarKPIs();

    alert("Paciente cadastrado!");

}

function editarPaciente(){

    alert(
        "Selecione o paciente pela tabela futura."
    );

}

function excluirPaciente(){

    const confirmar =
        confirm("Deseja excluir paciente?");

    if(confirmar){

        pacientes.pop();

        atualizarKPIs();

        alert("Paciente removido!");

    }

}

/* =========================================
   AGENDA
========================================= */

function incluirAgenda(){

    const paciente =
        prompt("Paciente:");

    const profissional =
        prompt("Profissional:");

    const data =
        prompt("Data:");

    const hora =
        prompt("Hora:");

    const sala =
        prompt("Sala:");

    agenda.push({

        paciente,
        profissional,
        data,
        hora,
        sala,
        status:"Agendado"

    });

    renderAgenda();
    atualizarKPIs();

    alert("Agendamento criado!");

}

function renderAgenda(){

    const tbody =
        document.getElementById("agendaTable");

    tbody.innerHTML = "";

    agenda.forEach((item,index)=>{

        let statusClass = "";

        if(item.status === "Confirmado"){

            statusClass = "confirmado";

        }

        else if(item.status === "Cancelado"){

            statusClass = "cancelado";

        }

        else{

            statusClass = "agendado";

        }

        tbody.innerHTML += `

            <tr>

                <td>${item.paciente}</td>

                <td>${item.profissional}</td>

                <td>${item.data}</td>

                <td>${item.hora}</td>

                <td>${item.sala}</td>

                <td>

                    <span class="status ${statusClass}">
                        ${item.status}
                    </span>

                </td>

                <td>

                    <button
                        class="btn-primary"
                        onclick="confirmarConsulta(${index})"
                    >
                        Confirmar
                    </button>

                    <button
                        class="btn-danger"
                        onclick="cancelarConsulta(${index})"
                    >
                        Cancelar
                    </button>

                </td>

            </tr>

        `;

    });

}

/* =========================================
   CONFIRMAR CONSULTA
========================================= */

function confirmarConsulta(index){

    agenda[index].status =
        "Confirmado";

    renderAgenda();

    alert(
        "Consulta confirmada!"
    );

}

/* =========================================
   CANCELAR CONSULTA
========================================= */

function cancelarConsulta(index){

    agenda[index].status =
        "Cancelado";

    renderAgenda();

    alert(
        "Consulta cancelada!"
    );

}

/* =========================================
   IMPRESSÃO
========================================= */

function imprimirModulo(nome){

    alert(
        "Imprimindo módulo: " + nome
    );

    window.print();

}

/* =========================================
   IA FINANCEIRA
========================================= */

function gerarAnaliseFinanceira(){

    const insight = `
        80% da receita da clínica vem
        de 20% dos pacientes recorrentes.
    `;

    document.getElementById(
        "financeInsight"
    ).innerText = insight;

}

/* =========================================
   IA GESTÃO
========================================= */

function gerarInsightsIA(){

    const insights = [

        "3 pacientes com faltas recorrentes.",
        "2 pacientes inadimplentes.",
        "Taxa de confirmação acima de 90%.",
        "Profissionais com excelente desempenho."

    ];

    const lista =
        document.getElementById("listaInsights");

    lista.innerHTML = "";

    insights.forEach(item=>{

        lista.innerHTML += `
            <li>${item}</li>
        `;

    });

}

/* =========================================
   INICIALIZAÇÃO
========================================= */

window.onload = function(){

    atualizarKPIs();

    renderProfissionais();

    renderAgenda();

    gerarAnaliseFinanceira();

    gerarInsightsIA();

};

</script>
