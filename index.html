<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIVAMENTE+ CLINIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; }
        .hidden { display: none !important; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .btn-orange { background: #ff7d00; color: white; }
        .btn-teal { background: #00a9a9; color: white; }
        .btn-navy { background: #1a3a5e; color: white; }
        .btn-outline { background: transparent; border: 2px solid #1a3a5e; color: #1a3a5e; }
        .btn-danger { background: #dc3545; color: white; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        label { font-weight: 500; margin-top: 10px; display: block; }
        h1, h2, h3 { color: #1a3a5e; }
        .flex { display: flex; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 20px; }
        #app { display: flex; min-height: 100vh; }
        #sidebar { width: 250px; background: #1a3a5e; color: white; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #sidebar h2 { color: #ff7d00; }
        #sidebar a { color: white; text-decoration: none; padding: 10px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        #sidebar a:hover, #sidebar a.active { background: #ff7d00; }
        #main { flex: 1; padding: 20px; overflow-y: auto; }
        #topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 12px; padding: 30px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close { font-size: 24px; cursor: pointer; }
        .drawer { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: white; box-shadow: -2px 0 8px rgba(0,0,0,0.2); transition: right 0.3s; z-index: 1001; overflow-y: auto; padding: 20px; }
        .drawer.open { right: 0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
        .calendar-day { border: 1px solid #ddd; padding: 10px; min-height: 80px; cursor: pointer; background: white; border-radius: 4px; }
        .calendar-day.header { background: #1a3a5e; color: white; font-weight: 600; text-align: center; min-height: auto; }
        .calendar-day.today { background: #ff7d00; color: white; }
        .calendar-day .event { font-size: 12px; padding: 2px 4px; margin-top: 2px; border-radius: 4px; color: white; }
        .event-confirmed { background: #28a745; }
        .event-canceled { background: #dc3545; }
        .event-pending { background: #6c757d; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; cursor: pointer; border-radius: 8px; background: #eee; }
        .tab.active { background: #1a3a5e; color: white; }
        @media (max-width: 768px) {
            #sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; justify-content: center; }
            #app { flex-direction: column; }
            .drawer { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
const APP = {
    db: { 
        users: [], 
        patients: [], 
        professionals: [], 
        appointments: [], 
        transactions: [], 
        clinic: { name: '', cnpj: '', address: '', phone: '' }, 
        schedule: [] 
    },
    currentUser: null,
    currentView: 'dashboard',
    currentPatient: null,
    calendarMonth: new Date().getMonth(),
    calendarYear: new Date().getFullYear(),
    editedAppointment: null,

    init() {
        this.loadData();
        const storedUser = localStorage.getItem('loggedUser');
        if (storedUser) {
            try {
                this.currentUser = JSON.parse(storedUser);
            } catch (e) {
                console.error('Erro ao parsear usuário salvo:', e);
                this.currentUser = null;
            }
        }
        if (this.currentUser) {
            this.renderApp();
        } else {
            this.renderLogin();
        }
    },

    loadData() {
        const stored = localStorage.getItem('ativamenteDB');
        if (stored) {
            try {
                this.db = JSON.parse(stored);
                // Garantir que todos os arrays existam
                this.db.users = this.db.users || [];
                this.db.patients = this.db.patients || [];
                this.db.professionals = this.db.professionals || [];
                this.db.appointments = this.db.appointments || [];
                this.db.transactions = this.db.transactions || [];
                this.db.clinic = this.db.clinic || { name: '', cnpj: '', address: '', phone: '' };
                this.db.schedule = this.db.schedule || [];
            } catch (e) {
                console.error('Erro ao carregar dados do localStorage:', e);
                this.initDefaults();
            }
        } else {
            this.initDefaults();
        }
    },

    initDefaults() {
        this.db = {
            users: [
                { id: 1, name: 'Admin', email: 'admin@clinica.com', password: 'admin123', role: 'Admin' },
                { id: 2, name: 'Psicologo', email: 'psi@clinica.com', password: 'psi123', role: 'Psicologo' }
            ],
            patients: [],
            professionals: [],
            appointments: [],
            transactions: [],
            clinic: { name: 'ATIVAMENTE+ CLINIC', cnpj: '', address: '', phone: '' },
            schedule: ['08:00','09:00','10:00','11:00','13:00','14:00','15:00','16:00']
        };
        this.saveData();
    },

    saveData() {
        try {
            localStorage.setItem('ativamenteDB', JSON.stringify(this.db));
        } catch (e) {
            console.error('Erro ao salvar dados:', e);
        }
    },

    renderLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f7fc;">
                <div class="card" style="width:400px;">
                    <h2 style="text-align:center;color:#1a3a5e;">ATIVAMENTE+ CLINIC</h2>
                    <p style="text-align:center;color:#666;">Faça login</p>
                    <form id="loginForm">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                        <label>Senha</label>
                        <input type="password" id="loginPassword" required>
                        <button type="submit" class="btn btn-orange" style="width:100%;margin-top:20px;">Entrar</button>
                    </form>
                    <p style="text-align:center;margin-top:15px;">Não tem conta? <a href="#" id="goToRegister">Registre-se</a></p>
                </div>
            </div>
        `;
        const form = document.getElementById('loginForm');
        if (form) {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail')?.value?.trim() || '';
                const password = document.getElementById('loginPassword')?.value?.trim() || '';
                if (!email || !password) {
                    alert('Por favor, preencha todos os campos');
                    return;
                }
                const user = this.db.users?.find(u => u.email === email && u.password === password);
                if (user) {
                    this.currentUser = user;
                    localStorage.setItem('loggedUser', JSON.stringify(this.currentUser));
                    this.renderApp();
                } else {
                    alert('Credenciais inválidas');
                }
            });
        }
    },

    renderRegister() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f7fc;">
                <div class="card" style="width:400px;">
                    <h2 style="text-align:center;color:#1a3a5e;">Registro</h2>
                    <form id="registerForm">
                        <label>Nome</label>
                        <input type="text" id="regName" required>
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                        <label>Senha</label>
                        <input type="password" id="regPassword" required>
                        <label>Função</label>
                        <select id="regRole">
                            <option>Admin</option>
                            <option>Psicologo</option>
                            <option>Fonoaudiologo</option>
                            <option>Fisioterapeuta</option>
                            <option>Medico</option>
                            <option>Terapeuta Ocupacional</option>
                            <option>Nutricionista</option>
                            <option>Outro</option>
                        </select>
                        <button type="submit" class="btn btn-teal" style="width:100%;margin-top:20px;">Registrar</button>
                    </form>
                    <p style="text-align:center;margin-top:15px;">Já tem conta? <a href="#" id="goToLogin">Login</a></p>
                </div>
            </div>
        `;
        const form = document.getElementById('registerForm');
        if (form) {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('regName')?.value?.trim() || '';
                const email = document.getElementById('regEmail')?.value?.trim() || '';
                const password = document.getElementById('regPassword')?.value?.trim() || '';
                const role = document.getElementById('regRole')?.value || '';
                if (!name || !email || !password || !role) {
                    alert('Por favor, preencha todos os campos');
                    return;
                }
                const exists = this.db.users?.some(u => u.email === email);
                if (exists) {
                    alert('Email já cadastrado');
                    return;
                }
                const newUser = { 
                    id: Date.now(), 
                    name, 
                    email, 
                    password, 
                    role 
                };
                this.db.users.push(newUser);
                this.saveData();
                alert('Registrado com sucesso! Faça login.');
                this.renderLogin();
            });
        }
        document.getElementById('goToLogin')?.addEventListener('click', (e) => {
            e.preventDefault();
            this.renderLogin();
        });
    },

    renderApp() {
        const isAdmin = this.currentUser?.role === 'Admin';
        document.getElementById('app').innerHTML = `
            <div id="sidebar">
                <h2>ATIVAMENTE+</h2>
                <span style="color:#ff7d00;">Olá, ${this.currentUser?.name || 'Usuário'}</span>
                <a class="menu-item active" data-view="dashboard">Dashboard</a>
                <a class="menu-item" data-view="agenda">Agenda</a>
                <a class="menu-item" data-view="pacientes">Pacientes</a>
                ${isAdmin ? '<a class="menu-item" data-view="profissionais">Profissionais</a>' : ''}
                ${isAdmin ? '<a class="menu-item" data-view="financeiro">Financeiro</a>' : ''}
                ${isAdmin ? '<a class="menu-item" data-view="configuracoes">Configurações</a>' : ''}
                <a href="#" id="logoutBtn" style="margin-top:auto;color:#ff7d00;">Sair</a>
            </div>
            <div id="main">
                <div id="topbar">
                    <h1 id="viewTitle">Dashboard</h1>
                </div>
                <div id="content"></div>
            </div>
        `;
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                this.currentView = item.dataset.view;
                this.renderView();
            });
        });
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('loggedUser');
            this.currentUser = null;
            this.renderLogin();
        });
        this.renderView();
    },

    renderView() {
        const viewTitle = document.getElementById('viewTitle');
        const content = document.getElementById('content');
        if (!viewTitle || !content) return;
        switch(this.currentView) {
            case 'dashboard':
                viewTitle.textContent = 'Dashboard';
                this.renderDashboard(content);
                break;
            case 'agenda':
                viewTitle.textContent = 'Agenda';
                this.renderAgenda(content);
                break;
            case 'pacientes':
                viewTitle.textContent = 'Pacientes';
                this.renderPacientes(content);
                break;
            case 'profissionais':
                viewTitle.textContent = 'Profissionais';
                this.renderProfissionais(content);
                break;
            case 'financeiro':
                viewTitle.textContent = 'Financeiro';
                this.renderFinanceiro(content);
                break;
            case 'configuracoes':
                viewTitle.textContent = 'Configurações';
                this.renderConfiguracoes(content);
                break;
            default:
                content.innerHTML = '<p>Selecione uma opção.</p>';
        }
    },

    renderDashboard(container) {
        if (!container) return;
        const patients = this.db.patients?.length || 0;
        const appointments = this.db.appointments?.length || 0;
        const professionals = this.db.professionals?.length || 0;
        const receitas = this.db.transactions?.filter(t => t.type === 'receita')?.reduce((s,t) => s + (t.value || 0), 0) || 0;
        const despesas = this.db.transactions?.filter(t => t.type === 'despesa')?.reduce((s,t) => s + (t.value || 0), 0) || 0;
        container.innerHTML = `
            <div class="grid">
                <div class="card"><h3>Total Pacientes</h3><p>${patients}</p></div>
                <div class="card"><h3>Total Consultas</h3><p>${appointments}</p></div>
                <div class="card"><h3>Total Profissionais</h3><p>${professionals}</p></div>
                <div class="card"><h3>Receitas</h3><p>R$ ${receitas.toFixed(2)}</p></div>
                <div class="card"><h3>Despesas</h3><p>R$ ${despesas.toFixed(2)}</p></div>
            </div>
            <div class="card">
                <h3>Consultas por Mês</h3>
                <canvas id="chartConsultas" width="400" height="200"></canvas>
            </div>
        `;
        const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const counts = Array(12).fill(0);
        this.db.appointments?.forEach(a => {
            const m = new Date(a.date)?.getMonth();
            if (m !== undefined && m !== null && !isNaN(m)) {
                counts[m] = (counts[m] || 0) + 1;
            }
        });
        const canvas = document.getElementById('chartConsultas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const barWidth = 30;
            const gap = 10;
            const startX = 30;
            const maxVal = Math.max(...counts,1);
            counts.forEach((val,i) => {
                const x = startX + i * (barWidth + gap);
                const h = (val / maxVal) * 150;
                ctx.fillStyle = '#ff7d00';
                ctx.fillRect(x, 180 - h, barWidth, h);
                ctx.fillStyle = '#1a3a5e';
                ctx.fillText(months[i], x, 195);
                ctx.fillText(val, x, 170 - h);
            });
        }
    },

    renderAgenda(container) {
        if (!container) return;
        const month = this.calendarMonth;
        const year = this.calendarYear;
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        let html = `
            <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:20px;">
                <button class="btn btn-outline" id="prevMonth">&lt; Anterior</button>
                <h2>${monthNames[month]} ${year}</h2>
                <button class="btn btn-outline" id="nextMonth">Próximo &gt;</button>
            </div>
            <div class="calendar-grid">
                <div class="calendar-day header">Dom</div>
                <div class="calendar-day header">Seg</div>
                <div class="calendar-day header">Ter</div>
                <div class="calendar-day header">Qua</div>
                <div class="calendar-day header">Qui</div>
                <div class="calendar-day header">Sex</div>
                <div class="calendar-day header">Sáb</div>
        `;
        for (let i = 0; i < firstDay; i++) {
            html += '<div class="calendar-day"></div>';
        }
        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const events = this.db.appointments?.filter(a => a.date === dateStr) || [];
            let eventsHtml = '';
            events.forEach(e => {
                const patient = this.db.patients?.find(p => p.id === e.patientId);
                const name = patient ? patient.name : 'Desconhecido';
                const statusClass = e.status === 'confirmed' ? 'event-confirmed' : e.status === 'canceled' ? 'event-canceled' : 'event-pending';
                eventsHtml += `<div class="event ${statusClass}">${e.time} ${name}</div>`;
            });
            html += `<div class="calendar-day ${isToday ? 'today' : ''}" data-date="${dateStr}">${day}${eventsHtml}</div>`;
        }
        html += '</div>';
        container.innerHTML = html;
        document.querySelectorAll('.calendar-day:not(.header)').forEach(day => {
            day.addEventListener('click', () => {
                const date = day.dataset.date;
                if (date) this.openAppointmentModal(date);
            });
        });
        document.getElementById('prevMonth')?.addEventListener('click', () => {
            this.calendarMonth--;
            if (this.calendarMonth < 0) { this.calendarMonth = 11; this.calendarYear--; }
            this.renderAgenda(container);
        });
        document.getElementById('nextMonth')?.addEventListener('click', () => {
            this.calendarMonth++;
            if (this.calendarMonth > 11) { this.calendarMonth = 0; this.calendarYear++; }
            this.renderAgenda(container);
        });
    },

    openAppointmentModal(date, editAppointment = null) {
        const isEdit = editAppointment !== null;
        const title = isEdit ? 'Editar Consulta' : 'Nova Consulta';
        const patients = this.db.patients?.map(p => `<option value="${p.id}">${p.name}</option>`).join('') || '<option value="">Nenhum paciente</option>';
        const professionals = this.db.professionals?.map(p => `<option value="${p.id}">${p.name}</option>`).join('') || '<option value="">Nenhum profissional</option>';
        const times = this.db.schedule?.map(t => `<option value="${t}">${t}</option>`).join('') || '<option value="">Nenhum horário</option>';
        const statuses = ['confirmed','canceled','pending'].map(s => `<option value="${s}" ${editAppointment && editAppointment.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('');
        const payments = ['Pix','Dinheiro','Cartao'].map(p => `<option value="${p}" ${editAppointment && editAppointment.payment === p ? 'selected' : ''}>${p}</option>`).join('');
        const modalHtml = `
            <div class="modal" id="appointmentModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>${title}</h3>
                        <span class="close" onclick="APP.closeModal('appointmentModal')">&times;</span>
                    </div>
                    <form id="appointmentForm">
                        <label>Paciente</label>
                        <select id="appPatient">${patients}</select>
                        <label>Profissional</label>
                        <select id="appProfessional" required>${professionals}</select>
                        <label>Data</label>
                        <input type="date" id="appDate" value="${editAppointment ? editAppointment.date : date}" required>
                        <label>Hora</label>
                        <select id="appTime">${times}</select>
                        <label>Status</label>
                        <select id="appStatus">${statuses}</select>
                        <label>Valor</label>
                        <input type="number" id="appValue" step="0.01" value="${editAppointment ? editAppointment.value : ''}">
                        <label>Forma de Pagamento</label>
                        <select id="appPayment">${payments}</select>
                        <label><input type="checkbox" id="appRecurring" ${editAppointment && editAppointment.recurring ? 'checked' : ''}> Recorrente Semanal</label>
                        <button type="submit" class="btn btn-teal" style="margin-top:20px;">Salvar</button>
                        ${isEdit ? `<button type="button" class="btn btn-danger" onclick="APP.deleteAppointment(${editAppointment.id})">Excluir</button>` : ''}
                    </form>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const form = document.getElementById('appointmentForm');
        if (form) {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const patientId = parseInt(document.getElementById('appPatient')?.value) || 0;
                const professionalId = parseInt(document.getElementById('appProfessional')?.value) || 0;
                const dateVal = document.getElementById('appDate')?.value || '';
                const timeVal = document.getElementById('appTime')?.value || '';
                const statusVal = document.getElementById('appStatus')?.value || '';
                const valueVal = parseFloat(document.getElementById('appValue')?.value) || 0;
                const paymentVal = document.getElementById('appPayment')?.value || '';
                const recurringVal = document.getElementById('appRecurring')?.checked || false;
                if (!patientId || !professionalId || !dateVal || !timeVal) {
                    alert('Por favor, preencha todos os campos obrigatórios');
                    return;
                }
                const data = {
                    patientId,
                    professionalId,
                    date: dateVal,
                    time: timeVal,
                    status: statusVal,
                    value: valueVal,
                    payment: paymentVal,
                    recurring: recurringVal,
                    createdBy: this.currentUser?.id || 0
                };
                if (isEdit) {
                    const idx = this.db.appointments?.findIndex(a => a.id === editAppointment.id);
                    if (idx !== -1) {
                        this.db.appointments[idx] = { ...this.db.appointments[idx], ...data };
                    }
                } else {
                    data.id = Date.now();
                    this.db.appointments.push(data);
                }
                this.saveData();
                this.closeModal('appointmentModal');
                this.renderView();
            });
        }
    },

    deleteAppointment(id) {
        if (!confirm('Excluir consulta?')) return;
        const appointment = this.db.appointments?.find(a => a.id === id);
        if (!appointment) return;
        if (appointment.createdBy !== this.currentUser?.id && this.currentUser?.role !== 'Admin') {
            alert('Você não tem permissão para excluir esta consulta.');
            return;
        }
        this.db.appointments = this.db.appointments?.filter(a => a.id !== id) || [];
        this.saveData();
        this.closeModal('appointmentModal');
        this.renderView();
    },

    closeModal(id) {
        const modal = document.getElementById(id);
        if (modal) modal.remove();
    },

    renderPacientes(container) {
        if (!container) return;
        const isAdmin = this.currentUser?.role === 'Admin';
        let patients = this.db.patients || [];
        if (!isAdmin) {
            patients = patients.filter(p => p.professionalId === this.currentUser?.id);
        }
        let html = `
            <button class="btn btn-orange" id="newPatientBtn">Novo Paciente</button>
            <table class="card" style="width:100%;border-collapse:collapse;margin-top:20px;">
                <thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Ações</th></tr></thead>
                <tbody>
        `;
        patients.forEach(p => {
            html += `<tr><td>${p.name}</td><td>${p.cpf}</td><td>${p.phone}</td><td><button class="btn btn-teal" onclick="APP.openPatientDrawer(${p.id})">Detalhes</button></td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
        document.getElementById('newPatientBtn')?.addEventListener('click', () => this.openPatientForm(null));
    },

    openPatientDrawer(patientId) {
        const patient = this.db.patients?.find(p => p.id === patientId);
        if (!patient) return;
        this.currentPatient = patient;

            <div class="tabs">

                <span class="tab" data-tab="prontuarios">Prontuarios</span>

                ${isPsychologist ? '<span class="tab" data-tab="documentos">Documentos</span>' : ''}
                <span class="tab" data-tab="pagamentos">Pagamentos</span>
                <span class="tab" data-tab="anexos">Anexos</span>

            </div>
            <div id="tabContent"></div>
        `;

            <div class="drawer open" id="patientDrawer">
                <div class="modal-header">
                    <h3>${patient.name}</h3>
                    <span class="close" onclick="APP.closeDrawer('patientDrawer')">&times;</span>
                </div>

        `;
        document.body.insertAdjacentHTML('beforeend', drawerHtml);
        this.renderPatientTab('dados');
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                this.renderPatientTab(tab.dataset.tab);
            });
        });

    renderPatientTab(tab) {
        const patient = this.currentPatient;
        if (!patient) return;
        const container = document.getElementById('tabContent');
        if (!container) return;
        let html = '';
        switch(tab) {
            case 'dados':
                html = `
                    <p><strong>Nome:</strong> ${patient.name}</p>
                    <p><strong>CPF:</strong> ${patient.cpf}</p>
                    <p><strong>Data Nascimento:</strong> ${patient.birth}</p>
                    <p><strong>Telefone:</strong> ${patient.phone}</p>
                    <p><strong>Email:</strong> ${patient.email}</p>
                    <p><strong>Endereço:</strong> ${patient.address}</p>
                    ${patient.guardian ? `<p><strong>Responsável:</strong> ${patient.guardian}</p>` : ''}
                    <button class="btn btn-teal" onclick="APP.openPatientForm(${patient.id})">Editar</button>
                `;
                break;
            case 'historico':
                html = `<textarea id="historyField" rows="6" onchange="APP.updatePatientField('history', this.value)">${patient.history || ''}</textarea>`;
                break;
            case 'prontuarios':
                html = `<textarea id="recordsField" rows="6" onchange="APP.updatePatientField('records', this.value)">${patient.records || ''}</textarea>`;
                break;
            case 'evolucao':
                html = this.renderEvolucao(patient);
                break;
            case 'documentos':
                html = this.renderDocumentos(patient);
                break;
            case 'pagamentos':
                html = this.renderPagamentos(patient);
                break;
            case 'anexos':
                html = this.renderAnexos(patient);
                break;
            case 'observacoes':
                html = `<textarea id="observationsField" rows="6" onchange="APP.updatePatientField('observations', this.value)">${patient.observations || ''}</textarea>`;
                break;
        }
        container.innerHTML = html;
    },

    updatePatientField(field, value) {
        const patient = this.currentPatient;
        if (patient) {
            patient[field] = value;
            const idx = this.db.patients?.findIndex(p => p.id === patient.id);
            if (idx !== -1) {
                this.db.patients[idx] = patient;
                this.saveData();
            }
        }
    },

    renderEvolucao(patient) {
        const evolutions = patient.evolutions || [];
        let html = `
            <h4>Evoluções</h4>
            <canvas id="evolutionChart" width="400" height="200"></canvas>
            <form id="evolutionForm" style="margin-top:20px;">
                <label>Data</label>
                <input type="date" id="evoDate" required>
                <label>Score (0-100)</label>
                <input type="number" id="evoScore" min="0" max="100" required>
                <label>Resumo</label>
                <textarea id="evoSummary" rows="3"></textarea>
                <button type="submit" class="btn btn-teal">Adicionar</button>
            </form>
            <ul>
        `;
        evolutions.forEach(e => {
            html += `<li>${e.date} - Score: ${e.score} - ${e.summary}</li>`;
        });
        html += '</ul>';
        setTimeout(() => {
            const canvas = document.getElementById('evolutionChart');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if (evolutions.length > 0) {
                    const sorted = evolutions.sort((a,b) => new Date(a.date) - new Date(b.date));
                    const scores = sorted.map(e => e.score);
                    const dates = sorted.map(e => e.date.slice(5));
                    ctx.beginPath();
                    ctx.strokeStyle = '#00a9a9';
                    ctx.lineWidth = 2;
                    scores.forEach((s,i) => {
                        const x = 30 + i * 30;
                        const y = 180 - (s / 100) * 150;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                    ctx.stroke();
                    ctx.fillStyle = '#1a3a5e';
                    scores.forEach((s,i) => {
                        const x = 30 + i * 30;
                        const y = 180 - (s / 100) * 150;
                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillText(s, x-5, y-10);
                        if (dates[i]) ctx.fillText(dates[i], x-10, 195);
                    });
                }
            }
        }, 0);
        document.getElementById('evolutionForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const dateVal = document.getElementById('evoDate')?.value || '';
            const scoreVal = parseInt(document.getElementById('evoScore')?.value) || 0;
            const summaryVal = document.getElementById('evoSummary')?.value || '';
            if (!dateVal || isNaN(scoreVal)) {
                alert('Por favor, preencha data e score válidos');
                return;
            }
            if (!patient.evolutions) patient.evolutions = [];
            patient.evolutions.push({ date: dateVal, score: scoreVal, summary: summaryVal });
            const idx = this.db.patients?.findIndex(p => p.id === patient.id);
            if (idx !== -1) {
                this.db.patients[idx] = patient;
                this.saveData();
            }
            this.renderPatientTab('evolucao');
        });
        return html;
    },

    renderDocumentos(patient) {

        const documentos = patient.documents || [];

    renderFinanceiro(container) {
        if (!container) return;
        if (this.currentUser?.role !== 'Admin') {
            container.innerHTML = '<p>Acesso restrito.</p>';
            return;
        }
        const receitas = this.db.transactions?.filter(t => t.type === 'receita')?.reduce((s,t) => s + (t.value || 0), 0) || 0;
        const despesas = this.db.transactions?.filter(t => t.type === 'despesa')?.reduce((s,t) => s + (t.value || 0), 0) || 0;
        let html = `
            <div class="grid">
                <div class="card"><h3>Receitas</h3><p>R$ ${receitas.toFixed(2)}</p></div>
                <div class="card"><h3>Despesas</h3><p>R$ ${despesas.toFixed(2)}</p></div>
            </div>
            <button class="btn btn-orange" id="newTransBtn">Nova Transação</button>
            <button class="btn btn-navy" id="aiAnalysisBtn">Análise IA</button>
            <div class="card" style="margin-top:20px;">
                <h3>Despesas por Tipo (Pareto)</h3>
                <canvas id="paretoChart" width="400" height="200"></canvas>
            </div>
            <table class="card" style="width:100%;margin-top:20px;border-collapse:collapse;">
                <thead><tr><th>Descrição</th><th>Valor</th><th>Data</th><th>Tipo</th><th>Ações</th></tr></thead>
                <tbody>
        `;
        this.db.transactions?.forEach(t => {
            html += `<tr><td>${t.description}</td><td>R$ ${t.value.toFixed(2)}</td><td>${t.date}</td><td>${t.type}</td><td><button class="btn btn-danger" onclick="APP.deleteTransaction(${t.id})">Excluir</button></td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
        document.getElementById('newTransBtn')?.addEventListener('click', () => this.openTransactionForm(null));
        document.getElementById('aiAnalysisBtn')?.addEventListener('click', () => {
            const balance = receitas - despesas;
            const msg = balance >= 0 ? `Saldo positivo de R$${balance.toFixed(2)}. Continue assim!` : `Saldo negativo de R$${Math.abs(balance).toFixed(2)}. Corte despesas!`;
            alert(msg);
        });
        setTimeout(() => {
            const canvas = document.getElementById('paretoChart');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,canvas.width,canvas.height);
                const despesasAgg = {};
                this.db.transactions?.filter(t => t.type === 'despesa')?.forEach(t => {
                    const desc = t.description;
                    const val = t.value || 0;
                    despesasAgg[desc] = (despesasAgg[desc] || 0) + val;
                });
                const sorted = Object.entries(despesasAgg).sort((a,b) => b[1] - a[1]);
                const labels = sorted.map(s => s[0]);
                const values = sorted.map(s => s[1]);
                const maxVal = Math.max(...values,1);
                const barWidth = 50;
                labels.forEach((label,i) => {
                    const x = 30 + i * 60;
                    const h = (values[i] / maxVal) * 150;
                    ctx.fillStyle = '#ff7d00';
                    ctx.fillRect(x, 180 - h, barWidth, h);
                    ctx.fillStyle = '#1a3a5e';
                    ctx.fillText(label.substring(0,5), x, 195);
                    ctx.fillText(values[i].toFixed(0), x, 170 - h);
                });
            }
        }, 0);
    },

        const isEdit = transId !== null;
        const trans = isEdit ? this.db.transactions?.find(t => t.id === transId) : null;
        const title = isEdit ? 'Editar Transação' : 'Nova Transação';
        const modalHtml = `

                    </div>
                    <form id="transForm">
                        <label>Tipo</label>
                        <select id="transType">
                            <option value="receita" ${trans && trans.type === 'receita' ? 'selected' : ''}>Receita</option>
                            <option value="despesa" ${trans && trans.type === 'despesa' ? 'selected' : ''}>Despesa</option>
                        </select>
                        <label>Descrição</label>
                        <input type="text" id="transDesc" value="${trans ? trans.description : ''}" required>
                        <label>Valor</label>
                        <input type="number" id="transValue" step="0.01" value="${trans ? trans.value : ''}" required>
                        <label>Data</label>
                        <input type="date" id="transDate" value="${trans ? trans.date : ''}" required>
                        <button type="submit" class="btn btn-teal" style="margin-top:20px;">Salvar</button>
                    </form>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const form = document.getElementById('transForm');
        if (form) {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const typeVal = document.getElementById('transType')?.value || '';
                const descVal = document.getElementById('transDesc')?.value?.trim() || '';
                const valueVal = parseFloat(document.getElementById('transValue')?.value) || 0;
                const dateVal = document.getElementById('transDate')?.value || '';
                if (!typeVal || !descVal || isNaN(valueVal) || !dateVal) {
                    alert('Por favor, preencha todos os campos da transação');
                    return;
                }
                const data = {
                    type: typeVal,
                    description: descVal,
                    value: valueVal,
                    date: dateVal
                };
                if (isEdit) {
                    const idx = this.db.transactions?.findIndex(t => t.id === trans.id);
                    if (idx !== -1) {
                        this.db.transactions[idx] = { ...this.db.transactions[idx], ...data };
                    }
                } else {
                    data.id = Date.now();
                    this.db.transactions.push(data);
                }
                this.saveData();
                this.closeModal('transModal');
                this.renderView();
            });
        }
    },

    deleteTransaction(id) {
        if (!confirm('Excluir transação?')) return;
        this.db.transactions = this.db.transactions?.filter(t => t.id !== id) || [];
        this.saveData();
        this.renderView();
    },

    renderConfiguracoes(container) {
        if (!container) return;
        if (this.currentUser?.role !== 'Admin') {
            container.innerHTML = '<p>Acesso restrito.</p>';
            return;
        }
        const clinic = this.db.clinic || {};
        let scheduleHtml = '';
        this.db.schedule?.forEach((time, i) => {
            scheduleHtml += `<div class="flex"><input type="time" value="${time}" onchange="APP.updateSchedule(${i}, this.value)"><button class="btn btn-danger" onclick="APP.removeSchedule(${i})">Remover</button></div>`;
        });
        let html = `
            <div class="card">
                <h3>Dados da Clínica</h3>
                <form id="clinicForm">
                    <label>Nome</label>
                    <input type="text" id="clinicName" value="${clinic.name || ''}">
                    <label>CNPJ</label>
                    <input type="text" id="clinicCnpj" value="${clinic.cnpj || ''}">
                    <label>Endereço</label>
                    <input type="text" id="clinicAddress" value="${clinic.address || ''}">
                    <label>Telefone</label>
                    <input type="text" id="clinicPhone" value="${clinic.phone || ''}">
                    <button type="submit" class="btn btn-teal" style="margin-top:20px;">Salvar</button>
                </form>
            </div>
            <div class="card">
                <h3>Horários de Atendimento</h3>
                ${scheduleHtml}
                <button class="btn btn-orange" onclick="APP.addSchedule()">Adicionar Horário</button>
            </div>
            <button class="btn btn-navy" onclick="APP.loadFakeData()">Carregar Dados Fictícios</button>
        `;
        container.innerHTML = html;
        document.getElementById('clinicForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const nameVal = document.getElementById('clinicName')?.value?.trim() || '';
            const cnpjVal = document.getElementById('clinicCnpj')?.value?.trim() || '';
            const addressVal = document.getElementById('clinicAddress')?.value?.trim() || '';
            const phoneVal = document.getElementById('clinicPhone')?.value?.trim() || '';
            this.db.clinic = {
                name: nameVal,
                cnpj: cnpjVal,
                address: addressVal,
                phone: phoneVal
            };
            this.saveData();
            alert('Dados salvos!');
        });
    },

    updateSchedule(index, value) {
        if (this.db.schedule) {
            this.db.schedule[index] = value;
            this.saveData();
        }
    },

    removeSchedule(index) {
        if (this.db.schedule) {
            this.db.schedule.splice(index, 1);
            this.saveData();
            this.renderView();
        }
    },

    addSchedule() {
        if (this.db.schedule) {
            this.db.schedule.push('12:00');
            this.saveData();
            this.renderView();
        }
    },

    loadFakeData() {
        const patients = [
            { id: Date.now()+1, name: 'Fulano', cpf: '333.333.333-33', birth: '1995-03-10', phone: '(11) 96666-3333', email: 'fulano@email.com', address: 'Rua C, 300', guardian: '', professionalId: 1, history: '', records: '', evolutions: [], documents: [], payments: [], attachments: [], observations: '' },
            { id: Date.now()+2, name: 'Ciclana', cpf: '444.444.444-44', birth: '2000-12-25', phone: '(11) 95555-4444', email: 'ciclana@email.com', address: 'Rua D, 400', guardian: '', professionalId: 2, history: '', records: '', evolutions: [], documents: [], payments: [], attachments: [], observations: '' }
        ];
        this.db.patients.push(...patients);
        const appointments = [
            { id: Date.now()+3, patientId: patients[0].id, professionalId: 1, date: '2025-05-10', time: '09:00', status: 'confirmed', value: 200, payment: 'Cartao', recurring: false, createdBy: 1 },
            { id: Date.now()+4, patientId: patients[1].id, professionalId: 2, date: '2025-05-12', time: '15:00', status: 'pending', value: 180, payment: 'Pix', recurring: false, createdBy: 2 }
        ];
        this.db.appointments.push(...appointments);
        const transactions = [
            { id: Date.now()+5, type: 'receita', description: 'Consulta Ciclana', value: 180, date: '2025-05-12' },
            { id: Date.now()+6, type: 'despesa', description: 'Material', value: 500, date: '2025-05-10' }
        ];
        this.db.transactions.push(...transactions);
        this.saveData();
        alert('Dados fictícios carregados!');
        this.renderView();
    }
};

document.addEventListener('DOMContentLoaded', () => {
    APP.init();
});
</script>
</body>
</html>
