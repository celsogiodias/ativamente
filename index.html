<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ativamente+ Clinic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #f4f7fc; display: flex; height: 100vh; }
    .sidebar { width: 260px; background: #002D5B; color: white; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
    .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #FF8C00; padding-bottom: 10px; }
    .sidebar button { background: none; border: none; color: white; padding: 12px 10px; text-align: left; cursor: pointer; border-radius: 8px; margin-bottom: 5px; font-size: 0.95rem; transition: background 0.3s; }
    .sidebar button:hover { background: #1a4a7a; }
    .sidebar button.active { background: #FF8C00; color: #002D5B; font-weight: bold; }
    .sidebar .logout { margin-top: auto; background: #dc3545; text-align: center; }
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header h1 { color: #002D5B; }
    .header .user-info { color: #555; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #002D5B; color: white; }
    tr:hover { background: #f0f8ff; }
    .btn { background: #20B2AA; color: white; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .btn-primary { background: #FF8C00; }
    .btn-danger { background: #dc3545; }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
    .drawer { position: fixed; top: 0; right: -100%; width: 500px; max-width: 90vw; height: 100%; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.3); transition: right 0.4s; z-index: 1000; overflow-y: auto; padding: 30px; }
    .drawer.open { right: 0; }
    .drawer .close-btn { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; float: right; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 5px; color: #333; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
    textarea { min-height: 80px; }
    .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-buttons button { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 6px; }
    .tab-buttons button.active { background: #002D5B; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .evolution-results { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 15px; }
    .chart-container { display: flex; align-items: flex-end; gap: 5px; height: 150px; padding: 10px 0; }
    .chart-bar { width: 20px; background: #20B2AA; border-radius: 4px 4px 0 0; transition: height 0.5s; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>Ativamente+ Clinic</h2>
    <button onclick="showView('dashboard')" id="btnDashboard" class="active">📊 Dashboard</button>
    <button onclick="showView('patients')" id="btnPatients">👥 Pacientes</button>
    <button onclick="showView('appointments')" id="btnAppointments">📅 Agendamentos</button>
    <button onclick="showView('financial')" id="btnFinancial">💰 Financeiro</button>
    <button onclick="showView('professionals')" id="btnProfessionals">👨‍⚕️ Profissionais</button>
    <button onclick="showView('settings')" id="btnSettings">⚙️ Configurações</button>
    <button class="logout" onclick="logout()">🚪 Sair</button>
  </div>

  <!-- Main Content -->
  <div class="main" id="mainContent">
    <div class="header">
      <h1 id="viewTitle">Dashboard</h1>
      <div class="user-info">Logado como: <span id="userName"></span> (<span id="userRole"></span>)</div>
    </div>
    <div id="viewContainer"></div>
  </div>

  <!-- Drawer -->
  <div class="drawer" id="drawer">
    <button class="close-btn" onclick="closeDrawer()">Fechar</button>
    <div id="drawerContent"></div>
  </div>

  <script>
    // ==================== DADOS INICIAIS ====================
    const STORAGE_KEYS = {
      professionals: 'ativamenteprofissionais',
      patients: 'ativamentepacientes',
      appointments: 'ativamenteagendamentos',
      transactions: 'ativamentetransacoes',
      currentUser: 'ativamenteuser'
    };

    function getData(key) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : [];
    }

    function setData(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    // Inicializar profissionais padrão
    if (!localStorage.getItem(STORAGE_KEYS.professionals)) {
      const profs = [
        { id: 1, name: 'Admin Geral', role: 'admin', email: 'admin@clinic.com', password: 'admin123' },
        { id: 2, name: 'Dr. João Silva', role: 'psicologo', email: 'joao@clinic.com', password: '123' },
        { id: 3, name: 'Fga. Maria Santos', role: 'fonoaudiologo', email: 'maria@clinic.com', password: '123' },
        { id: 4, name: 'Ft. Carlos Lima', role: 'fisioterapeuta', email: 'carlos@clinic.com', password: '123' },
        { id: 5, name: 'Dr. Ana Costa', role: 'medico', email: 'ana@clinic.com', password: '123' },
        { id: 6, name: 'Secretária Paula', role: 'secretaria', email: 'paula@clinic.com', password: '123' },
        { id: 7, name: 'TO. Renata', role: 'to', email: 'renata@clinic.com', password: '123' }
      ];
      setData(STORAGE_KEYS.professionals, profs);
    }

    // ==================== USUÁRIO LOGADO ====================
    let currentUser = JSON.parse(localStorage.getItem(STORAGE_KEYS.currentUser) || 'null');

    function login(email, password) {
      const profs = getData(STORAGE_KEYS.professionals);
      const user = profs.find(p => p.email === email && p.password === password);
      if (user) {
        currentUser = user;
        localStorage.setItem(STORAGE_KEYS.currentUser, JSON.stringify(user));
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userRole').textContent = user.role;
        showView('dashboard');
      } else {
        alert('Credenciais inválidas!');
      }
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem(STORAGE_KEYS.currentUser);
      document.getElementById('mainContent').innerHTML = `
        <div style="max-width:400px; margin:100px auto;">
          <h2>Login</h2>
          <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:10px; margin:10px 0;">
          <input type="password" id="loginPassword" placeholder="Senha" style="width:100%; padding:10px; margin:10px 0;">
          <button onclick="login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)" class="btn" style="width:100%;">Entrar</button>
        </div>
      `;
    }

    // Se não logado, mostra tela de login
    if (!currentUser) {
      logout();
    } else {
      document.getElementById('userName').textContent = currentUser.name;
      document.getElementById('userRole').textContent = currentUser.role;
    }

    // ==================== PERMISSÕES ====================
    const rolePermissions = {
      admin: ['dashboard', 'patients', 'appointments', 'financial', 'professionals', 'settings'],
      psicologo: ['dashboard', 'patients', 'appointments'],
      fonoaudiologo: ['dashboard', 'patients', 'appointments'],
      fisioterapeuta: ['dashboard', 'patients', 'appointments'],
      medico: ['dashboard', 'patients', 'appointments'],
      secretaria: ['dashboard', 'patients', 'appointments'],
      to: ['dashboard', 'patients', 'appointments']
    };

    // Abas de documentos por role (para abas dentro do drawer do paciente)
    const roleDocumentTabs = {
      admin: ['Prontuários', 'Evolução', 'Declaração', 'Atestado', 'Relatório', 'RelMult', 'Laudo', 'Parecer'],
      psicologo: ['Prontuários', 'Evolução', 'Declaração', 'Atestado', 'Relatório', 'RelMult', 'Laudo', 'Parecer'],
      fonoaudiologo: ['Prontuários', 'Evolução', 'Relatório', 'RelMult', 'Laudo', 'Parecer'],
      fisioterapeuta: ['Prontuários', 'Evolução', 'Relatório', 'RelMult'],
      medico: ['Prontuários', 'Evolução', 'Atestado', 'Relatório', 'Laudo', 'Parecer'],
      secretaria: ['Prontuários'],
      to: ['Prontuários', 'Evolução', 'Relatório', 'RelMult']
    };

    function canView(view) {
      if (!currentUser) return false;
      return rolePermissions[currentUser.role]?.includes(view);
    }

    // ==================== NAVEGAÇÃO ====================
    function showView(view) {
      if (!canView(view) && view !== 'login') {
        alert('Você não tem permissão para acessar esta seção.');
        return;
      }
      // Atualizar botão ativo
      document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn' + view.charAt(0).toUpperCase() + view.slice(1))?.classList.add('active');
      document.getElementById('viewTitle').textContent = view.charAt(0).toUpperCase() + view.slice(1);
      const container = document.getElementById('viewContainer');
      switch(view) {
        case 'dashboard': renderDashboard(container); break;
        case 'patients': renderPatients(container); break;
        case 'appointments': renderAppointments(container); break;
        case 'financial': renderFinancial(container); break;
        case 'professionals': renderProfessionals(container); break;
        case 'settings': renderSettings(container); break;
        default: container.innerHTML = '<p>Seção em desenvolvimento.</p>';
      }
    }

    // ==================== DASHBOARD ====================
    function renderDashboard(container) {
      const patients = getData(STORAGE_KEYS.patients);
      const appointments = getData(STORAGE_KEYS.appointments);
      const totalPatients = patients.length;
      const totalAppointments = appointments.length;
      container.innerHTML = `
        <div class="card">
          <h3>Resumo</h3>
          <p>Total de pacientes: ${totalPatients}</p>
          <p>Total de agendamentos: ${totalAppointments}</p>
        </div>
      `;
    }

    // ==================== PACIENTES ====================
    function renderPatients(container) {
      const patients = getData(STORAGE_KEYS.patients);
      const professionals = getData(STORAGE_KEYS.professionals);
      // Filtrar por profissional se não for admin/secretaria
      let filteredPatients = patients;
      if (currentUser.role !== 'admin' && currentUser.role !== 'secretaria') {
        filteredPatients = patients.filter(p => p.assignedProfessionalId === currentUser.id);
      }
      container.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3>Lista de Pacientes</h3>
          <button class="btn btn-primary" onclick="showNewPatientForm()">Novo Paciente</button>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>Idade</th><th>Responsável</th><th>Profissional</th><th>Ações</th></tr></thead>
          <tbody>
            ${filteredPatients.map(p => `
              <tr>
                <td>${p.name}</td>
                <td>${p.age}</td>
                <td>${p.responsible || '-'}</td>
                <td>${professionals.find(prof => prof.id === p.assignedProfessionalId)?.name || 'N/A'}</td>
                <td>
                  <button class="btn btn-sm" onclick="openPatientDrawer(${p.id})">Abrir</button>
                  <button class="btn btn-sm btn-danger" onclick="deletePatient(${p.id})">Excluir</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function showNewPatientForm() {
      const drawer = document.getElementById('drawer');
      const content = document.getElementById('drawerContent');
      const professionals = getData(STORAGE_KEYS.professionals);
      // Apenas profissionais com permissão de atendimento (não secretaria) para atribuir
      const atendimentoProfs = professionals.filter(p => p.role !== 'secretaria' && p.role !== 'admin');
      content.innerHTML = `
        <h2>Novo Paciente</h2>
        <form id="newPatientForm">
          <div class="form-group">
            <label>Nome completo *</label>
            <input type="text" id="pName" required>
          </div>
          <div class="form-group">
            <label>Idade</label>
            <input type="number" id="pAge">
          </div>
          <div class="form-group">
            <label>Responsável Legal</label>
            <input type="text" id="pResponsible">
          </div>
          <div class="form-group">
            <label>Profissional Responsável *</label>
            <select id="pAssignedProfessional">
              <option value="">Selecione...</option>
              ${atendimentoProfs.map(p => `<option value="${p.id}">${p.name} (${p.role})</option>`).join('')}
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
      `;
      drawer.classList.add('open');
      document.getElementById('newPatientForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('pName').value.trim();
        const age = parseInt(document.getElementById('pAge').value) || 0;
        const responsible = document.getElementById('pResponsible').value.trim();
        const assignedProfessionalId = parseInt(document.getElementById('pAssignedProfessional').value);
        if (!name || !assignedProfessionalId) { alert('Preencha nome e profissional!'); return; }
        const patients = getData(STORAGE_KEYS.patients);
        const newPatient = {
          id: Date.now(),
          name,
          age,
          responsible,
          assignedProfessionalId,
          medicalRecords: [],
          createdAt: new Date().toISOString()
        };
        patients.push(newPatient);
        setData(STORAGE_KEYS.patients, patients);
        closeDrawer();
        showView('patients');
      });
    }

    function openPatientDrawer(patientId) {
      const drawer = document.getElementById('drawer');
      const content = document.getElementById('drawerContent');
      const patients = getData(STORAGE_KEYS.patients);
      const patient = patients.find(p => p.id === patientId);
      if (!patient) return;
      const professionals = getData(STORAGE_KEYS.professionals);
      const prof = professionals.find(p => p.id === patient.assignedProfessionalId);
      // Abas permitidas para o rol atual
      const allowedTabs = roleDocumentTabs[currentUser.role] || [];
      content.innerHTML = `
        <h2>${patient.name}</h2>
        <p><strong>Idade:</strong> ${patient.age}</p>
        <p><strong>Responsável Legal:</strong> ${patient.responsible || '-'}</p>
        <p><strong>Profissional:</strong> ${prof ? prof.name : 'N/A'}</p>
        <hr>
        <div class="tab-buttons" id="patientTabs">
          ${allowedTabs.map(tab => `<button onclick="showPatientTab('${tab}', ${patientId})" class="${tab === 'Prontuários' ? 'active' : ''}">${tab}</button>`).join('')}
        </div>
        <div id="patientTabContent" class="tab-content active"></div>
      `;
      drawer.classList.add('open');
      // Mostrar primeira aba
      showPatientTab('Prontuários', patientId);
    }

    function showPatientTab(tabName, patientId) {
      // Atualizar abas
      document.querySelectorAll('#patientTabs button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      const content = document.getElementById('patientTabContent');
      const patients = getData(STORAGE_KEYS.patients);
      const patient = patients.find(p => p.id === patientId);
      if (!patient) return;
      switch(tabName) {
        case 'Prontuários': renderMedicalRecords(content, patient); break;
        case 'Evolução': renderEvolution(content, patient); break;
        case 'Declaração': content.innerHTML = '<p>Declaração (a implementar)</p>'; break;
        case 'Atestado': content.innerHTML = '<p>Atestado (a implementar)</p>'; break;
        case 'Relatório': content.innerHTML = '<p>Relatório (a implementar)</p>'; break;
        case 'RelMult': content.innerHTML = '<p>Relatório Multidisciplinar (a implementar)</p>'; break;
        case 'Laudo': content.innerHTML = '<p>Laudo (a implementar)</p>'; break;
        case 'Parecer': content.innerHTML = '<p>Parecer (a implementar)</p>'; break;
        default: content.innerHTML = '<p>Aba não encontrada.</p>';
      }
    }

    // ==================== PRONTUÁRIOS ====================
    function renderMedicalRecords(container, patient) {
      if (!patient.medicalRecords) patient.medicalRecords = [];
      container.innerHTML = `
        <h3>Prontuários</h3>
        <form id="medicalRecordForm" style="margin-bottom:20px;">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="mrDate" required>
          </div>
          <div class="form-group">
            <label>Descrição</label>
            <textarea id="mrDescription" required></textarea>
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea id="mrObservations"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Adicionar Prontuário</button>
        </form>
        <div id="medicalRecordsList">
          ${patient.medicalRecords.sort((a, b) => new Date(b.date) - new Date(a.date)).map(rec => `
            <div style="background:#f9f9f9; padding:10px; margin-bottom:8px; border-radius:6px;">
              <strong>${rec.date}</strong> - ${rec.description.substring(0, 50)}...
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('medicalRecordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const date = document.getElementById('mrDate').value;
        const description = document.getElementById('mrDescription').value.trim();
        const observations = document.getElementById('mrObservations').value.trim();
        if (!date || !description) { alert('Preencha data e descrição!'); return; }
        const patients = getData(STORAGE_KEYS.patients);
        const pat = patients.find(p => p.id === patient.id);
        if (!pat.medicalRecords) pat.medicalRecords = [];
        pat.medicalRecords.push({
          id: Date.now(),
          date,
          description,
          observations,
          createdAt: new Date().toISOString()
        });
        setData(STORAGE_KEYS.patients, patients);
        renderMedicalRecords(container, pat);
      });
    }

    // ==================== EVOLUÇÃO (IA) ====================
    function renderEvolution(container, patient) {
      container.innerHTML = `
        <h3>Evolução Clínica</h3>
        <button class="btn" onclick="analyzeEvolution(${patient.id})">Analisar Evolução</button>
        <div id="evolutionResults" class="evolution-results"></div>
      `;
    }

    function analyzeEvolution(patientId) {
      const patients = getData(STORAGE_KEYS.patients);
      const patient = patients.find(p => p.id === patientId);
      if (!patient || !patient.medicalRecords || patient.medicalRecords.length === 0) {
        document.getElementById('evolutionResults').innerHTML = '<p>Nenhum prontuário encontrado para análise.</p>';
        return;
      }
      const records = patient.medicalRecords.sort((a, b) => new Date(a.date) - new Date(b.date));
      // Análise por palavras-chave
      let improvements = 0, worsenings = 0, stable = 0;
      const keywords = {
        melhora: ['melhora', 'melhorou', 'progresso', 'avanço', 'positivo'],
        piora: ['piora', 'piorou', 'regressão', 'negativo', 'agravamento'],
        estavel: ['estável', 'estavel', 'sem alterações', 'mantém', 'inalterado']
      };
      records.forEach(rec => {
        const text = (rec.description + ' ' + rec.observations).toLowerCase();
        if (keywords.melhora.some(k => text.includes(k))) improvements++;
        if (keywords.piora.some(k => text.includes(k))) worsenings++;
        if (keywords.estavel.some(k => text.includes(k))) stable++;
      });
      // Gerar resumo
      let summary = 'Com base na análise dos prontuários: ';
      if (improvements > worsenings) summary += 'observa-se evolução positiva, com melhora significativa.';
      else if (worsenings > improvements) summary += 'nota-se piora no quadro clínico.';
      else summary += 'o quadro clínico permanece estável.';
      if (stable > 0) summary += ' Houve períodos de estabilidade.';
      // Gráfico de frequência (simulado por mês)
      const freqMap = {};
      records.forEach(rec => {
        const month = rec.date.substring(0, 7);
        freqMap[month] = (freqMap[month] || 0) + 1;
      });
      const months = Object.keys(freqMap).sort();
      const maxFreq = Math.max(...Object.values(freqMap), 1);
      // Sugestões
      let suggestions = 'Sugestões para plano terapêutico: ';
      if (improvements > worsenings) suggestions += 'Manter as intervenções atuais e reforçar estratégias que vêm gerando progresso.';
      else if (worsenings > improvements) suggestions += 'Reavaliar a abordagem terapêutica, considerar novas técnicas e encaminhamentos.';
      else suggestions += 'Continuar o acompanhamento regular, monitorando possíveis mudanças.';
      if (stable > 0) suggestions += ' Intensificar atividades para estimular melhora.';
      // Exibir
      const results = document.getElementById('evolutionResults');
      results.innerHTML = `
        <h4>Resumo da Evolução</h4>
        <p>${summary}</p>
        <h4>Frequência de Consultas ao Longo do Tempo</h4>
        <div class="chart-container">
          ${months.map(m => {
            const height = (freqMap[m] / maxFreq) * 150;
            return `<div style="height:${height}px;" class="chart-bar" title="${m}: ${freqMap[m]} consulta(s)"></div>`;
          }).join('')}
        </div>
        <p style="text-align:center; color:#777; font-size:0.85rem;">${months.join(' - ')}</p>
        <h4>Sugestões para Plano Terapêutico</h4>
        <p>${suggestions}</p>
      `;
    }

    // ==================== EXCLUIR PACIENTE (com agendamentos) ====================
    function deletePatient(patientId) {
      if (!confirm('Tem certeza que deseja excluir este paciente? Todos os agendamentos vinculados serão removidos.')) return;
      let patients = getData(STORAGE_KEYS.patients);
      let appointments = getData(STORAGE_KEYS.appointments);
      patients = patients.filter(p => p.id !== patientId);
      appointments = appointments.filter(a => a.patientId !== patientId);
      setData(STORAGE_KEYS.patients, patients);
      setData(STORAGE_KEYS.appointments, appointments);
      showView('patients');
    }

    // ==================== AGENDAMENTOS ====================
    function renderAppointments(container) {
      const appointments = getData(STORAGE_KEYS.appointments);
      const patients = getData(STORAGE_KEYS.patients);
      const professionals = getData(STORAGE_KEYS.professionals);
      // Filtrar por profissional logado (exceto admin/secretaria)
      let filtered = appointments;
      if (currentUser.role !== 'admin' && currentUser.role !== 'secretaria') {
        filtered = appointments.filter(a => a.professionalId === currentUser.id);
      }
      container.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3>Agendamentos</h3>
          <button class="btn btn-primary" onclick="showNewAppointmentForm()">Novo Agendamento</button>
        </div>
        <table>
          <thead><tr><th>Paciente</th><th>Data</th><th>Hora</th><th>Profissional</th><th>Valor</th><th>Pagamento</th><th>Confirmado</th><th>Ações</th></tr></thead>
          <tbody>
            ${filtered.map(a => {
              const pat = patients.find(p => p.id === a.patientId);
              const prof = professionals.find(p => p.id === a.professionalId);
              return `<tr>
                <td>${pat ? pat.name : 'Desconhecido'}</td>
                <td>${a.date}</td>
                <td>${a.time}</td>
                <td>${prof ? prof.name : 'N/A'}</td>
                <td>R$ ${a.value || '0'}</td>
                <td>${a.paymentMethod || '-'}</td>
                <td>${a.paymentConfirmed ? '✅' : '❌'}</td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteAppointment(${a.id})">Excluir</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function showNewAppointmentForm() {
      const drawer = document.getElementById('drawer');
      const content = document.getElementById('drawerContent');
      const patients = getData(STORAGE_KEYS.patients);
      const professionals = getData(STORAGE_KEYS.professionals);
      const atendimentoProfs = professionals.filter(p => p.role !== 'secretaria' && p.role !== 'admin');
      content.innerHTML = `
        <h2>Novo Agendamento</h2>
        <form id="newAppointmentForm">
          <div class="form-group">
            <label>Paciente *</label>
            <select id="aPatient" required>
              <option value="">Selecione...</option>
              ${patients.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Profissional *</label>
            <select id="aProfessional" required>
              <option value="">Selecione...</option>
              ${atendimentoProfs.map(p => `<option value="${p.id}">${p.name} (${p.role})</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="aDate" required>
          </div>
          <div class="form-group">
            <label>Horário</label>
            <input type="time" id="aTime" required>
          </div>
          <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" step="0.01" id="aValue">
          </div>
          <div class="form-group">
            <label>Forma de Pagamento</label>
            <select id="aPaymentMethod">
              <option value="">Selecione...</option>
              <option value="Pix">Pix</option>
              <option value="Dinheiro">Dinheiro</option>
              <option value="Cartão">Cartão</option>
            </select>
          </div>
          <div class="form-group">
            <label><input type="checkbox" id="aPaymentConfirmed"> Pagamento Confirmado</label>
          </div>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
      `;
      drawer.classList.add('open');
      document.getElementById('newAppointmentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const patientId = parseInt(document.getElementById('aPatient').value);
        const professionalId = parseInt(document.getElementById('aProfessional').value);
        const date = document.getElementById('aDate').value;
        const time = document.getElementById('aTime').value;
        const value = parseFloat(document.getElementById('aValue').value) || 0;
        const paymentMethod = document.getElementById('aPaymentMethod').value;
        const paymentConfirmed = document.getElementById('aPaymentConfirmed').checked;
        if (!patientId || !professionalId || !date || !time) { alert('Preencha todos os campos obrigatórios!'); return; }
        const appointments = getData(STORAGE_KEYS.appointments);
        appointments.push({
          id: Date.now(),
          patientId,
          professionalId,
          date,
          time,
          value,
          paymentMethod,
          paymentConfirmed,
          status: 'Agendado',
          createdAt: new Date().toISOString()
        });
        setData(STORAGE_KEYS.appointments, appointments);
        closeDrawer();
        showView('appointments');
      });
    }

    function deleteAppointment(id) {
      if (!confirm('Excluir este agendamento?')) return;
      let appointments = getData(STORAGE_KEYS.appointments);
      appointments = appointments.filter(a => a.id !== id);
      setData(STORAGE_KEYS.appointments, appointments);
      showView('appointments');
    }

    // ==================== FINANCEIRO ====================
    function renderFinancial(container) {
      // Apenas admin
      if (currentUser.role !== 'admin') {
        container.innerHTML = '<p>Acesso restrito ao administrador.</p>';
        return;
      }
      const transactions = getData(STORAGE_KEYS.transactions);
      container.innerHTML = `
        <h3>Financeiro</h3>
        <table>
          <thead><tr><th>Descrição</th><th>Valor</th><th>Data</th></tr></thead>
          <tbody>
            ${transactions.map(t => `<tr><td>${t.description}</td><td>R$ ${t.value}</td><td>${t.date}</td></tr>`).join('')}
          </tbody>
        </table>
        <button class="btn" onclick="showNewTransactionForm()">Nova Transação</button>
      `;
    }

    function showNewTransactionForm() {
      const drawer = document.getElementById('drawer');
      const content = document.getElementById('drawerContent');
      content.innerHTML = `
        <h2>Nova Transação</h2>
        <form id="transactionForm">
          <div class="form-group">
            <label>Descrição</label>
            <input type="text" id="tDesc" required>
          </div>
          <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" step="0.01" id="tValor" required>
          </div>
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="tDate" required>
          </div>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
      `;
      drawer.classList.add('open');
      document.getElementById('transactionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const description = document.getElementById('tDesc').value.trim();
        const value = parseFloat(document.getElementById('tValor').value);
        const date = document.getElementById('tDate').value;
        if (!description || !value || !date) { alert('Preencha todos os campos!'); return; }
        const transactions = getData(STORAGE_KEYS.transactions);
        transactions.push({ id: Date.now(), description, value, date });
        setData(STORAGE_KEYS.transactions, transactions);
        closeDrawer();
        showView('financial');
      });
    }

    // ==================== PROFISSIONAIS ====================
    function renderProfessionals(container) {
      const professionals = getData(STORAGE_KEYS.professionals);
      container.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3>Profissionais</h3>
          <button class="btn btn-primary" onclick="showNewProfessionalForm()">Novo Profissional</button>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>Email</th><th>Função</th><th>Ações</th></tr></thead>
          <tbody>
            ${professionals.map(p => `<tr><td>${p.name}</td><td>${p.email}</td><td>${p.role}</td><td><button class="btn btn-sm btn-danger" onclick="deleteProfessional(${p.id})">Excluir</button></td></tr>`).join('')}
          </tbody>
        </table>
      `;
    }

    function showNewProfessionalForm() {
      const drawer = document.getElementById('drawer');
      const content = document.getElementById('drawerContent');
      content.innerHTML = `
        <h2>Novo Profissional</h2>
        <form id="newProfForm">
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="profName" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="profEmail" required>
          </div>
          <div class="form-group">
            <label>Senha *</label>
            <input type="password" id="profPassword" required>
          </div>
          <div class="form-group">
            <label>Função</label>
            <select id="profRole">
              <option value="admin">Admin</option>
              <option value="psicologo">Psicólogo</option>
              <option value="fonoaudiologo">Fonoaudiólogo</option>
              <option value="fisioterapeuta">Fisioterapeuta</option>
              <option value="medico">Médico</option>
              <option value="secretaria">Secretária</option>
              <option value="to">Terapeuta Ocupacional</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
      `;
      drawer.classList.add('open');
      document.getElementById('newProfForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('profName').value.trim();
        const email = document.getElementById('profEmail').value.trim();
        const password = document.getElementById('profPassword').value;
        const role = document.getElementById('profRole').value;
        if (!name || !email || !password) { alert('Preencha todos os campos!'); return; }
        const professionals = getData(STORAGE_KEYS.professionals);
        if (professionals.find(p => p.email === email)) { alert('Email já cadastrado!'); return; }
        professionals.push({ id: Date.now(), name, email, password, role });
        setData(STORAGE_KEYS.professionals, professionals);
        closeDrawer();
        showView('professionals');
      });
    }

    function deleteProfessional(id) {
      if (!confirm('Excluir profissional?')) return;
      let professionals = getData(STORAGE_KEYS.professionals);
      professionals = professionals.filter(p => p.id !== id);
      setData(STORAGE_KEYS.professionals, professionals);
      showView('professionals');
    }

    // ==================== CONFIGURAÇÕES ====================
    function renderSettings(container) {
      container.innerHTML = `
        <h3>Configurações</h3>
        <p>Em breve...</p>
      `;
    }

    // ==================== DRAWER ====================
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
    }

    // Fechar drawer ao clicar fora
    document.addEventListener('click', function(e) {
      const drawer = document.getElementById('drawer');
      if (drawer.classList.contains('open') && !drawer.contains(e.target) && !e.target.closest('.btn')) {
        closeDrawer();
      }
    });

    // Inicializar view
    if (currentUser) {
      showView('dashboard');
    }
  </script>
</body>
</html>
