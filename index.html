            <th>Nome</th>

    </tbody>

</table>

<!-- ========================================= -->
<!-- BOTÃO AGENDA -->
<!-- ========================================= -->

<button
    class="btn-primary"
    onclick="incluirAgenda()"

    onclick="incluirPaciente()"
>

</button>

<button

    onclick="editarPaciente()"
>
    Editar
</button>

<button
    class="btn-danger"
    onclick="excluirPaciente()"
>

</button>

<!-- ========================================= -->
<!-- BOTÃO PROFISSIONAIS -->
<!-- ========================================= -->

    class="btn-primary"
    onclick="incluirProfissional()"
>
    Incluir
</button>

<!-- BOTÃO IMPRIMIR -->
<!-- ========================================= -->

<button
    class="btn-secondary"
    onclick="imprimirModulo()"
>
    Imprimir
</button>

<!-- E COLE ESTE COMPLETO -->
<!-- ========================================= -->

<script>

/* =========================================
   DADOS
========================================= */

let pacientes = [

    {
        nome:"Maria Souza"
    }

];

let profissionais = [

    {
        nome:"Dra. Ana Paula",
        especialidade:"Psicóloga Clínica",
        telefone:"(11) 99999-9999"
    }

];

let agenda = [

    {
        paciente:"Maria Souza",
        profissional:"Dra. Ana Paula",
        data:"27/05/2026",
        hora:"09:00",
        sala:"Sala 1",
        status:"Confirmado"
    }

];

/* =========================================
   KPI
========================================= */

function atualizarKPIs(){

    const agendaKPI =
        document.getElementById("kpiAgenda");

    const pacientesKPI =
        document.getElementById("kpiPacientes");

    const profissionaisKPI =
        document.getElementById("kpiProfissionais");

    if(agendaKPI){

        agendaKPI.innerText =
            agenda.length;

    }

    if(pacientesKPI){

        pacientesKPI.innerText =
            pacientes.length;

    }

    if(profissionaisKPI){

        profissionaisKPI.innerText =
            profissionais.length;

    }

}

/* =========================================
   PROFISSIONAIS
========================================= */

function renderProfissionais(){

    const tabela =
        document.getElementById(
            "profissionaisTable"
        );

    if(!tabela) return;

    tabela.innerHTML = "";

    profissionais.forEach((prof,index)=>{

        tabela.innerHTML += `

            <tr>

                <td>${prof.nome}</td>

                <td>${prof.especialidade}</td>

                <td>${prof.telefone}</td>

                <td>

                    <button
                        class="btn-warning"
                        onclick="editarProfissional(${index})"
                    >
                        Editar
                    </button>

                    <button
                        class="btn-danger"
                        onclick="excluirProfissional(${index})"
                    >
                        Excluir
                    </button>

                </td>

            </tr>

        `;

    });

}

function incluirProfissional(){

    const nome =
        prompt("Nome:");

    if(!nome) return;

    const especialidade =
        prompt("Especialidade:");

    const telefone =
        prompt("Telefone:");

    profissionais.push({

        nome,
        especialidade,
        telefone

    });

    renderProfissionais();
    atualizarKPIs();

}

function editarProfissional(index){

    const prof =
        profissionais[index];

    const novoNome =
        prompt(
            "Editar nome:",
            prof.nome
        );

    if(!novoNome) return;

    prof.nome = novoNome;

    prof.especialidade =
        prompt(
            "Especialidade:",
            prof.especialidade
        );

    prof.telefone =
        prompt(
            "Telefone:",
            prof.telefone
        );

    renderProfissionais();

}

function excluirProfissional(index){

    const confirmar =
        confirm(
            "Excluir profissional?"
        );

    if(confirmar){

        profissionais.splice(index,1);

        renderProfissionais();
        atualizarKPIs();

    }

}

/* =========================================
   AGENDA
========================================= */

function renderAgenda(){

    const tabela =
        document.getElementById(
            "agendaTable"
        );

    if(!tabela) return;

    tabela.innerHTML = "";

    agenda.forEach((item,index)=>{

        let classe = "agendado";

        if(item.status === "Confirmado"){

            classe = "confirmado";

        }

        if(item.status === "Cancelado"){

            classe = "cancelado";

        }

        tabela.innerHTML += `

            <tr>

                <td>${item.paciente}</td>

                <td>${item.profissional}</td>

                <td>${item.data}</td>

                <td>${item.hora}</td>

                <td>${item.sala}</td>

                <td>

                    <span class="status ${classe}">
                        ${item.status}
                    </span>

                </td>

                <td>

                    <button
                        class="btn-primary"
                        onclick="confirmarConsulta(${index})"
                    >
                        Confirmar
                    </button>

                    <button
                        class="btn-danger"
                        onclick="cancelarConsulta(${index})"
                    >
                        Cancelar
                    </button>

                </td>

            </tr>

        `;

    });

}

function incluirAgenda(){

    const paciente =
        prompt("Paciente:");

    if(!paciente) return;

    const profissional =
        prompt("Profissional:");

    const data =
        prompt("Data:");

    const hora =
        prompt("Hora:");

    const sala =
        prompt("Sala:");

    agenda.push({

        paciente,
        profissional,
        data,
        hora,
        sala,
        status:"Agendado"

    });

    renderAgenda();
    atualizarKPIs();

}

function confirmarConsulta(index){

    agenda[index].status =
        "Confirmado";

    renderAgenda();

}

function cancelarConsulta(index){

    agenda[index].status =
        "Cancelado";

    renderAgenda();

}

/* =========================================
   PACIENTES
========================================= */

function incluirPaciente(){

    const nome =
        prompt("Nome paciente:");

    if(!nome) return;

    pacientes.push({

        nome

    });

    atualizarKPIs();

}

function editarPaciente(){

    if(pacientes.length === 0){

        alert("Nenhum paciente.");

        return;

    }

    const novoNome =
        prompt(
            "Editar paciente:",
            pacientes[0].nome
        );

    if(novoNome){

        pacientes[0].nome =
            novoNome;

        atualizarKPIs();

    }

}

function excluirPaciente(){

    const confirmar =
        confirm("Excluir último paciente?");

    if(confirmar){

        pacientes.pop();

        atualizarKPIs();

    }

}

/* =========================================
   IMPRESSÃO
========================================= */

function imprimirModulo(){

    window.print();

}

/* =========================================
   IA
========================================= */

function gerarInsightsIA(){

    console.log(
        "IA iniciada com sucesso."
    );

}

/* =========================================
   LOAD
========================================= */

window.onload = function(){

    atualizarKPIs();

    renderProfissionais();

    renderAgenda();

    gerarInsightsIA();

};

</script>
