<div id="professionals-tab">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        #professionals-tab {
            font-family: 'Poppins', sans-serif;
            color: #00204A;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .pro-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .pro-header h2 {
            color: #00204A;
            margin: 0;
            font-weight: 600;
        }
        .pro-btn-new {
            background-color: #FF6B35;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0, 32, 74, 0.2);
        }
        .pro-btn-new:hover {
            background-color: #e55a2b;
            transform: translateY(-2px);
        }
        .pro-table-wrap {
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 32, 74, 0.12);
            padding: 10px;
        }
        .pro-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        .pro-table th {
            background-color: #00204A;
            color: white;
            padding: 14px 12px;
            text-align: left;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .pro-table td {
            padding: 12px;
            border-bottom: 1px solid #e8edf4;
            font-size: 14px;
        }
        .pro-table tr:last-child td {
            border-bottom: none;
        }
        .pro-table tr:hover {
            background-color: #f0f5ff;
        }
        .pro-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .pro-btn-edit, .pro-btn-delete {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 13px;
            transition: opacity 0.2s;
            color: white;
        }
        .pro-btn-edit {
            background-color: #008080;
        }
        .pro-btn-delete {
            background-color: #FF6B35;
        }
        .pro-btn-edit:hover, .pro-btn-delete:hover {
            opacity: 0.85;
        }
        /* Modal */
        .pro-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 32, 74, 0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .pro-modal-overlay.active {
            display: flex;
        }
        .pro-modal {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 32, 74, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .pro-modal h3 {
            margin-top: 0;
            color: #00204A;
            font-weight: 600;
        }
        .pro-form-group {
            margin-bottom: 18px;
        }
        .pro-form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #00204A;
            font-size: 14px;
        }
        .pro-form-group input, .pro-form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #dce2ec;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .pro-form-group input:focus, .pro-form-group select:focus {
            outline: none;
            border-color: #008080;
        }
        .pro-form-group .error {
            border-color: #FF6B35;
        }
        .pro-form-group .error-msg {
            color: #FF6B35;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        .pro-form-group .error-msg.show {
            display: block;
        }
        .pro-modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .pro-btn-save, .pro-btn-cancel {
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 15px;
            transition: transform 0.2s, background-color 0.3s;
        }
        .pro-btn-save {
            background-color: #008080;
            color: white;
        }
        .pro-btn-save:hover {
            background-color: #006666;
            transform: translateY(-2px);
        }
        .pro-btn-cancel {
            background-color: #e8edf4;
            color: #00204A;
        }
        .pro-btn-cancel:hover {
            background-color: #d0d9e8;
        }
        @media (max-width: 600px) {
            .pro-header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .pro-btn-new {
                width: 100%;
                text-align: center;
            }
            .pro-modal {
                padding: 20px;
            }
        }
    </style>

    <div class="pro-header">
        <h2>Profissionais</h2>
        <button class="pro-btn-new" id="proBtnNew">+ Novo Profissional</button>
    </div>

    <div class="pro-table-wrap">
        <table class="pro-table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Registro</th>
                    <th>Telefone</th>
                    <th>Data Nasc</th>
                    <th>Especialidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="proTableBody">
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div class="pro-modal-overlay" id="proModalOverlay">
        <div class="pro-modal">
            <h3 id="proModalTitle">Novo Profissional</h3>
            <form id="proForm">
                <div class="pro-form-group">
                    <label for="proNome">Nome completo *</label>
                    <input type="text" id="proNome" required>
                    <div class="error-msg" id="proNomeError">O campo Nome é obrigatório.</div>
                </div>
                <div class="pro-form-group">
                    <label for="proRegistro">Registro profissional</label>
                    <input type="text" id="proRegistro" placeholder="Ex: CRP, CREFITO...">
                </div>
                <div class="pro-form-group">
                    <label for="proTelefone">Telefone</label>
                    <input type="text" id="proTelefone" placeholder="(11) 99999-8888">
                </div>
                <div class="pro-form-group">
                    <label for="proDataNasc">Data de Nascimento</label>
                    <input type="date" id="proDataNasc">
                </div>
                <div class="pro-form-group">
                    <label for="proEspecialidade">Especialidade *</label>
                    <select id="proEspecialidade" required>
                        <option value="">Selecione...</option>
                        <option value="Psicologia">Psicologia</option>
                        <option value="Fisioterapia">Fisioterapia</option>
                        <option value="Fonoaudiologia">Fonoaudiologia</option>
                        <option value="TO">TO</option>
                        <option value="Nutrição">Nutrição</option>
                        <option value="Educação Física">Educação Física</option>
                        <option value="Medicina">Medicina</option>
                        <option value="Enfermagem">Enfermagem</option>
                        <option value="Outra">Outra</option>
                    </select>
                    <div class="error-msg" id="proEspError">O campo Especialidade é obrigatório.</div>
                </div>
                <div class="pro-modal-actions">
                    <button type="button" class="pro-btn-cancel" id="proBtnCancel">Cancelar</button>
                    <button type="submit" class="pro-btn-save" id="proBtnSave">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // ---- localStorage key ----
            const STORAGE_KEY = 'profissionais';

            // ---- DOM references ----
            const tbody = document.getElementById('proTableBody');
            const overlay = document.getElementById('proModalOverlay');
            const form = document.getElementById('proForm');
            const modalTitle = document.getElementById('proModalTitle');
            const btnNew = document.getElementById('proBtnNew');
            const btnCancel = document.getElementById('proBtnCancel');
            const inputNome = document.getElementById('proNome');
            const inputRegistro = document.getElementById('proRegistro');
            const inputTelefone = document.getElementById('proTelefone');
            const inputDataNasc = document.getElementById('proDataNasc');
            const selectEsp = document.getElementById('proEspecialidade');
            const nomeError = document.getElementById('proNomeError');
            const espError = document.getElementById('proEspError');

            let editIndex = null; // null = criação, number = edição

            // ---- Load from localStorage ----
            function loadProfissionais() {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            }

            function saveProfissionais(list) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            }

            // ---- Render table ----
            function renderTable() {
                const list = loadProfissionais();
                tbody.innerHTML = '';
                list.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.nome}</td>
                        <td>${item.registro}</td>
                        <td>${item.telefone}</td>
                        <td>${item.dataNasc}</td>
                        <td>${item.especialidade}</td>
                        <td class="pro-actions">
                            <button class="pro-btn-edit" data-index="${index}">Editar</button>
                            <button class="pro-btn-delete" data-index="${index}">Excluir</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // attach event listeners for edit and delete
                document.querySelectorAll('.pro-btn-edit').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        openEditModal(idx);
                    });
                });
                document.querySelectorAll('.pro-btn-delete').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        confirmDelete(idx);
                    });
                });
            }

            // ---- Open modal for create ----
            function openCreateModal() {
                editIndex = null;
                modalTitle.textContent = 'Novo Profissional';
                form.reset();
                clearErrors();
                overlay.classList.add('active');
            }

            // ---- Open modal for edit ----
            function openEditModal(index) {
                const list = loadProfissionais();
                const item = list[index];
                if (!item) return;
                editIndex = index;
                modalTitle.textContent = 'Editar Profissional';
                inputNome.value = item.nome;
                inputRegistro.value = item.registro;
                inputTelefone.value = item.telefone;
                inputDataNasc.value = item.dataNasc;
                selectEsp.value = item.especialidade;
                clearErrors();
                overlay.classList.add('active');
            }

            // ---- Close modal ----
            function closeModal() {
                overlay.classList.remove('active');
                editIndex = null;
            }

            // ---- Clear error messages ----
            function clearErrors() {
                inputNome.classList.remove('error');
                selectEsp.classList.remove('error');
                nomeError.classList.remove('show');
                espError.classList.remove('show');
            }

            // ---- Validate form ----
            function validateForm() {
                let valid = true;
                clearErrors();
                if (!inputNome.value.trim()) {
                    inputNome.classList.add('error');
                    nomeError.classList.add('show');
                    valid = false;
                }
                if (!selectEsp.value) {
                    selectEsp.classList.add('error');
                    espError.classList.add('show');
                    valid = false;
                }
                return valid;
            }

            // ---- Save (create or update) ----
            function saveProfissional(event) {
                event.preventDefault();
                if (!validateForm()) return;

                const list = loadProfissionais();
                const profissional = {
                    nome: inputNome.value.trim(),
                    registro: inputRegistro.value.trim(),
                    telefone: inputTelefone.value.trim(),
                    dataNasc: inputDataNasc.value,
                    especialidade: selectEsp.value
                };

                if (editIndex === null) {
                    list.push(profissional);
                } else {
                    list[editIndex] = profissional;
                }

                saveProfissionais(list);
                renderTable();
                closeModal();
            }

            // ---- Confirm delete ----
            function confirmDelete(index) {
                const list = loadProfissionais();
                const item = list[index];
                if (!item) return;
                const confirmMsg = `Tem certeza que deseja excluir o profissional "${item.nome}"?`;
                if (confirm(confirmMsg)) {
                    list.splice(index, 1);
                    saveProfissionais(list);
                    renderTable();
                }
            }

            // ---- Event listeners ----
            btnNew.addEventListener('click', openCreateModal);
            btnCancel.addEventListener('click', closeModal);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeModal();
            });
            form.addEventListener('submit', saveProfissional);

            // initial render
            renderTable();
        })();
    </script>
</div>
