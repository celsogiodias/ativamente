<!-- ========================================= -->

<script>

/* =========================================
   BANCO DE DADOS
========================================= */

let pacientes = [];

let profissionais = [];

let agenda = [];

/* =========================================
   KPI
========================================= */

function atualizarKPIs(){

    document.getElementById(
        "kpiAgenda"
    ).innerText = agenda.length;

    document.getElementById(
        "kpiPacientes"
    ).innerText = pacientes.length;

    document.getElementById(
        "kpiProfissionais"
    ).innerText = profissionais.length;

}

/* =========================================
   PACIENTES
========================================= */

function renderPacientes(){

    const tabela =
        document.getElementById(
            "pacientesTable"
        );

    tabela.innerHTML = "";

    pacientes.forEach((p,index)=>{

        tabela.innerHTML += `

            <tr>

                <td>${p.nome}</td>

                <td>${p.documento}</td>

                <td>${p.telefone}</td>

                <td>${p.nascimento}</td>

                <td>

                    <button
                        class="btn-warning"
                        onclick="editarPaciente(${index})"
                    >
                        Editar
                    </button>

                    <button
                        class="btn-danger"
                        onclick="removerPaciente(${index})"
                    >
                        Excluir
                    </button>

                </td>

            </tr>

        `;

    });

}

function incluirPaciente(){

    const nome =
        prompt("Nome do paciente:");

    if(!nome) return;

    const documento =
        prompt("CPF ou RG:");

    const telefone =
        prompt("Telefone:");

    const nascimento =
        prompt(
            "Nascimento (somente números):"
        );

    let responsavel = null;

    const menor =
        confirm(
            "Paciente é menor de idade?"
        );

    if(menor){

        responsavel = {

            nome:
                prompt(
                    "Nome do responsável:"
                ),

            documento:
                prompt(
                    "Documento do responsável:"
                ),

            telefone:
                prompt(
                    "Telefone do responsável:"
                ),

            vinculo:
                prompt(
                    "Vínculo:"
                )

        };

    }

    pacientes.push({

        nome,
        documento,
        telefone,
        nascimento,
        responsavel

    });

    renderPacientes();

    atualizarKPIs();

}

function editarPaciente(index){

    const novoNome =
        prompt(
            "Editar nome:",
            pacientes[index].nome
        );

    if(!novoNome) return;

    pacientes[index].nome =
        novoNome;

    renderPacientes();

}

function removerPaciente(index){

    if(confirm("Excluir paciente?")){

        pacientes.splice(index,1);

        renderPacientes();

        atualizarKPIs();

    }

}

/* =========================================
   PROFISSIONAIS
========================================= */

function renderProfissionais(){

    const tabela =
        document.getElementById(
            "profissionaisTable"
        );

    tabela.innerHTML = "";

    profissionais.forEach((p,index)=>{

        tabela.innerHTML += `

            <tr>

                <td>${p.nome}</td>

                <td>${p.documento}</td>

                <td>${p.areaSaude}</td>

                <td>${p.nascimento}</td>

                <td>

                    <button
                        class="btn-warning"
                        onclick="editarProfissional(${index})"
                    >
                        Editar
                    </button>

                    <button
                        class="btn-danger"
                        onclick="removerProfissional(${index})"
                    >
                        Excluir
                    </button>

                </td>

            </tr>

        `;

    });

}

function incluirProfissional(){

    const nome =
        prompt("Nome:");

    if(!nome) return;

    const documento =
        prompt(
            "Documento profissional (CRP/CRM/etc):"
        );

    const areaSaude =
        confirm(
            "É profissional da saúde?"
        ) ? "Sim" : "Não";

    const nascimento =
        prompt(
            "Nascimento (somente números):"
        );

    profissionais.push({

        nome,
        documento,
        areaSaude,
        nascimento

    });

    renderProfissionais();

    atualizarKPIs();

}

function editarProfissional(index){

    const novoNome =
        prompt(
            "Editar nome:",
            profissionais[index].nome
        );

    if(!novoNome) return;

    profissionais[index].nome =
        novoNome;

    renderProfissionais();

}

function removerProfissional(index){

    if(confirm("Excluir profissional?")){

        profissionais.splice(index,1);

        renderProfissionais();

        atualizarKPIs();

    }

}

/* =========================================
   AUTOCOMPLETE
========================================= */

function sugerirPaciente(nome){

    return pacientes.filter(p=>

        p.nome.toLowerCase()
        .includes(nome.toLowerCase())

    );

}

function sugerirProfissional(nome){

    return profissionais.filter(p=>

        p.nome.toLowerCase()
        .includes(nome.toLowerCase())

    );

}

/* =========================================
   AGENDA
========================================= */

function renderAgenda(){

    const tabela =
        document.getElementById(
            "agendaTable"
        );

    tabela.innerHTML = "";

    agenda.forEach((a,index)=>{

        let classe =
            "agendado";

        if(a.status === "Confirmado"){

            classe =
                "confirmado";

        }

        if(a.status === "Cancelado"){

            classe =
                "cancelado";

        }

        tabela.innerHTML += `

            <tr>

                <td>${a.paciente}</td>

                <td>${a.profissional}</td>

                <td>${a.data}</td>

                <td>${a.hora}</td>

                <td>${a.valor}</td>

                <td>${a.pagamento}</td>

                <td>

                    <span class="status ${classe}">
                        ${a.status}
                    </span>

                </td>

                <td>

                    <button
                        class="btn-primary"
                        onclick="confirmarConsulta(${index})"
                    >
                        Confirmar
                    </button>

                    <button
                        class="btn-danger"
                        onclick="cancelarConsulta(${index})"
                    >
                        Cancelar
                    </button>

                    <button
                        class="btn-warning"
                        onclick="whatsappConsulta(${index})"
                    >
                        WhatsApp
                    </button>

                </td>

            </tr>

        `;

    });

}

function incluirAgenda(){

    const nomePaciente =
        prompt(
            "Digite paciente:"
        );

    const sugestoesPaciente =
        sugerirPaciente(nomePaciente);

    if(sugestoesPaciente.length > 0){

        alert(
            "Sugestões:\n" +
            sugestoesPaciente
            .map(p=>p.nome)
            .join("\n")
        );

    }

    const nomeProfissional =
        prompt(
            "Digite profissional:"
        );

    const sugestoesProf =
        sugerirProfissional(nomeProfissional);

    if(sugestoesProf.length > 0){

        alert(
            "Sugestões:\n" +
            sugestoesProf
            .map(p=>p.nome)
            .join("\n")
        );

    }

    const data =
        prompt(
            "Data (somente números):"
        );

    const hora =
        prompt(
            "Hora (somente números):"
        );

    const valor =
        prompt(
            "Valor pagamento:"
        );

    const pagamento =
        prompt(
            "Forma pagamento:\nDinheiro\nPix\nCartão\nBoleto"
        );

    agenda.push({

        paciente:nomePaciente,

        profissional:nomeProfissional,

        data,

        hora,

        valor,

        pagamento,

        status:"Agendado"

    });

    renderAgenda();

    atualizarKPIs();

}

function confirmarConsulta(index){

    agenda[index].status =
        "Confirmado";

    renderAgenda();

}

function cancelarConsulta(index){

    agenda[index].status =
        "Cancelado";

    renderAgenda();

}

/* =========================================
   WHATSAPP
========================================= */

function whatsappConsulta(index){

    const consulta =
        agenda[index];

    const mensagem =

`Olá ${consulta.paciente},

Sua consulta está agendada.

📅 Data: ${consulta.data}
⏰ Hora: ${consulta.hora}
👨‍⚕️ Profissional: ${consulta.profissional}

Responda:
1 para CONFIRMAR
2 para REAGENDAR`;

    const numero =
        prompt(
            "Digite telefone WhatsApp:"
        );

    const url =

`https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`;

    window.open(
        url,
        "_blank"
    );

}

/* =========================================
   FINANCEIRO
========================================= */

function abrirFinanceiro(){

    alert(
        "Financeiro carregado com sucesso."
    );

}

/* =========================================
   GESTÃO
========================================= */

function abrirGestao(){

    alert(
        "Gestão carregada com sucesso."
    );

}

/* =========================================
   IA CLÍNICA
========================================= */

function abrirIA(){

    alert(
        "IA Clínica carregada com sucesso."
    );

}

/* =========================================
   CONFIGURAÇÕES
========================================= */

function abrirConfiguracoes(){

    alert(
        "Configurações carregadas."
    );

}

/* =========================================
   LOAD
========================================= */

window.onload = function(){

    atualizarKPIs();

    renderPacientes();

    renderProfissionais();

    renderAgenda();

};

</script>

</body>
</html>
