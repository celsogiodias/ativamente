<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativamente+ Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #f5f7fa; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 260px; background: #2E7D32; color: #fff; display: flex; flex-direction: column; transition: 0.3s; overflow-y: auto; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; }
.sidebar .logo { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
.sidebar .logo img { max-width: 180px; height: auto; display: block; margin: 0 auto; }
.sidebar nav { flex: 1; padding: 10px 0; }
.sidebar nav a { display: flex; align-items: center; padding: 14px 20px; color: #fff; text-decoration: none; transition: 0.2s; border-left: 3px solid transparent; }
.sidebar nav a:hover { background: rgba(255,255,255,0.15); }
.sidebar nav a.active { background: rgba(255,255,255,0.15); border-left-color: #00bcd4; }
.sidebar nav a i { width: 30px; text-align: center; }
.main-content { margin-left: 260px; flex: 1; padding: 20px; overflow-y: auto; height: 100vh; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
input, select, textarea { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); background: #fafafa; font-size: 15px; font-family: 'Poppins', sans-serif; width: 100%; margin-bottom: 10px; transition: 0.2s; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #2E7D32; box-shadow: 0 0 0 4px rgba(46,125,50,0.15); background: #fff; }
button { padding: 12px 24px; border: none; border-radius: 8px; background: #2E7D32; color: #fff; font-size: 15px; cursor: pointer; font-weight: 600; transition: 0.2s; }
button:hover { opacity: 0.9; }
.btn-danger { background: #d32f2f; }
.btn-warning { background: #f57c00; }
.btn-info { background: #00bcd4; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; }
@media(max-width: 768px) { .sidebar { width: 60px; } .sidebar .logo img { display: none; } .sidebar nav a span { display: none; } .main-content { margin-left: 60px; } .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }}
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
.modal.show { display: flex; }
.modal-content { background: #fff; padding: 30px; border-radius: 16px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
.tabs { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
.tab { padding: 8px 16px; background: #e0e0e0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.tab.active { background: #2E7D32; color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.calendar-day { border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px; min-height: 80px; cursor: pointer; }
.calendar-day .day-number { font-weight: 600; }
.calendar-day .event { background: #00bcd4; color: #fff; border-radius: 4px; padding: 2px 4px; font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>

<!-- Login Modal -->
<div id="loginModal" class="modal show">
  <div class="modal-content" style="background: linear-gradient(135deg, #1a2847, #2E7D32); color: #fff; text-align: center;">
    <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/celsogiodias%40gmail.com/png/Ativamente%2B-Clinic.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260527%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260527T021808Z&X-Amz-Expires=3600&X-Amz-Signature=fd6308090ef7ca76d340f4b6b5acaa17c71eee98193bd05b55954c6e6d04fd89&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Logo" style="max-width: 250px; margin-bottom: 20px;">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email" style="margin-top: 15px;">
    <input type="password" id="loginSenha" placeholder="Senha">
    <button id="loginBtn" style="width: 100%; background: #00bcd4;">Entrar</button>
    <p style="margin-top: 10px; font-size: 13px;">Admin: admin@ativamente.com / admin</p>
    <p><a href="#" id="esqueciSenha" style="color: #fff; text-decoration: underline;">Esqueci minha senha</a></p>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="logo">
    <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/celsogiodias%40gmail.com/png/Ativamente%2B-Clinic.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260527%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260527T021808Z&X-Amz-Expires=3600&X-Amz-Signature=fd6308090ef7ca76d340f4b6b5acaa17c71eee98193bd05b55954c6e6d04fd89&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Logo" style="max-width: 180px;">
  </div>
  <nav>
    <a href="#" data-target="dashboard" class="active"><i class="fas fa-chart-line"></i><span> Dashboard</span></a>
    <a href="#" data-target="agenda"><i class="fas fa-calendar-alt"></i><span> Agenda</span></a>
    <a href="#" data-target="pacientes"><i class="fas fa-user-injured"></i><span> Pacientes</span></a>
    <a href="#" data-target="profissionais"><i class="fas fa-user-md"></i><span> Profissionais</span></a>
    <a href="#" data-target="financeiro"><i class="fas fa-dollar-sign"></i><span> Financeiro</span></a>
    <a href="#" data-target="convites" id="menuConvites"><i class="fas fa-envelope"></i><span> Convites</span></a>
    <a href="#" data-target="configuracoes" id="menuConfig"><i class="fas fa-cog"></i><span> Configurações</span></a>
    <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span> Sair</span></a>
  </nav>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent">
  <div class="header">
    <h2 id="pageTitle">Dashboard</h2>
    <div>Usuário: <span id="currentUser"></span></div>
  </div>
  <div id="pageContent"></div>
</div>

<script>
// ========== INICIALIZAÇÃO ==========
(function initUsers() {
  let usersData = localStorage.getItem('ativamente_users');
  let users = [];
  try {
    users = JSON.parse(usersData);
    if (!Array.isArray(users)) users = [];
  } catch(e) {
    users = [];
  }
  if (!users.find(u => u.email === 'admin@ativamente.com')) {
    users.push({ id: Date.now(), nome: 'Administrador', email: 'admin@ativamente.com', senha: 'admin', role: 'admin' });
    localStorage.setItem('ativamente_users', JSON.stringify(users));
  }
})();

// ========== UTILITÁRIOS ==========
function formatarData(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function gerarId() { return Date.now() + Math.random(); }

function getUsers() { return JSON.parse(localStorage.getItem('ativamente_users') || '[]'); }
function saveUsers(u) { localStorage.setItem('ativamente_users', JSON.stringify(u)); }
function getPacientes() { return JSON.parse(localStorage.getItem('ativamente_pacientes') || '[]'); }
function savePacientes(p) { localStorage.setItem('ativamente_pacientes', JSON.stringify(p)); }
function getAgendamentos() { return JSON.parse(localStorage.getItem('ativamente_agendamentos') || '[]'); }
function saveAgendamentos(a) { localStorage.setItem('ativamente_agendamentos', JSON.stringify(a)); }
function getProfissionais() { return JSON.parse(localStorage.getItem('ativamente_profissionais') || '[]'); }
function saveProfissionais(p) { localStorage.setItem('ativamente_profissionais', JSON.stringify(p)); }
function getFinanceiro() { return JSON.parse(localStorage.getItem('ativamente_financeiro') || '[]'); }
function saveFinanceiro(f) { localStorage.setItem('ativamente_financeiro', JSON.stringify(f)); }
function getConvites() { return JSON.parse(localStorage.getItem('ativamente_convites') || '[]'); }
function saveConvites(c) { localStorage.setItem('ativamente_convites', JSON.stringify(c)); }

function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

// ========== LOGIN ==========
let currentUser = null;
const loginModal = document.getElementById('loginModal');
const loginBtn = document.getElementById('loginBtn');

function fazerLogin(email, senha) {
  const users = getUsers();
  const user = users.find(u => u.email === email && u.senha === senha);
  if (user) {
    currentUser = user;
    sessionStorage.setItem('currentUser', JSON.stringify(user));
    loginModal.classList.remove('show');
    document.getElementById('currentUser').innerText = user.nome;
    carregarPagina('dashboard');
    atualizarMenu();
  } else {
    alert('Email ou senha inválidos.');
  }
}

loginBtn.addEventListener('click', function() {
  const email = document.getElementById('loginEmail').value;
  const senha = document.getElementById('loginSenha').value;
  fazerLogin(email, senha);
});

document.getElementById('esqueciSenha').addEventListener('click', function(e) {
  e.preventDefault();
  const email = prompt('Digite seu email cadastrado:');
  if (email) {
    const users = getUsers();
    const user = users.find(u => u.email === email);
    if (user) {
      alert('Um link de recuperação foi enviado para ' + email + ' (simulação).');
    } else {
      alert('Email não encontrado.');
    }
  }
});

// Verifica se já está logado
const sessionUser = sessionStorage.getItem('currentUser');
if (sessionUser) {
  currentUser = JSON.parse(sessionUser);
  loginModal.classList.remove('show');
  document.getElementById('currentUser').innerText = currentUser.nome;
  carregarPagina('dashboard');
  atualizarMenu();
} else {
  loginModal.classList.add('show');
}

document.getElementById('logoutBtn').addEventListener('click', function() {
  sessionStorage.removeItem('currentUser');
  currentUser = null;
  location.reload();
});

// ========== PERMISSÕES ==========
function atualizarMenu() {
  if (!currentUser) return;
  const role = currentUser.role;
  document.getElementById('menuConfig').style.display = (role === 'admin') ? 'block' : 'none';
  document.getElementById('menuConvites').style.display = (role === 'admin') ? 'block' : 'none';
  // Outras permissões podem ser ajustadas
}

// ========== NAVEGAÇÃO ==========
document.querySelectorAll('.sidebar nav a[data-target]').forEach(a => {
  a.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelectorAll('.sidebar nav a').forEach(el => el.classList.remove('active'));
    this.classList.add('active');
    const page = this.getAttribute('data-target');
    carregarPagina(page);
  });
});

function carregarPagina(pagina) {
  document.getElementById('pageTitle').innerText = pagina.charAt(0).toUpperCase() + pagina.slice(1);
  const content = document.getElementById('pageContent');
  switch(pagina) {
    case 'dashboard': renderDashboard(content); break;
    case 'agenda': renderAgenda(content); break;
    case 'pacientes': renderPacientes(content); break;
    case 'profissionais': renderProfissionais(content); break;
    case 'financeiro': renderFinanceiro(content); break;
    case 'convites': renderConvites(content); break;
    case 'configuracoes': renderConfiguracoes(content); break;
    default: content.innerHTML = '<h3>Página não encontrada</h3>';
  }
}

// ========== DASHBOARD ==========
function renderDashboard(el) {
  const pacientes = getPacientes();
  const profissionais = getProfissionais();
  const agendamentos = getAgendamentos();
  const financeiro = getFinanceiro();
  const receitas = financeiro.filter(f => f.tipo === 'receita').reduce((acc, f) => acc + f.valor, 0);
  const despesas = financeiro.filter(f => f.tipo === 'despesa').reduce((acc, f) => acc + f.valor, 0);
  const saldo = receitas - despesas;
  const saude = profissionais.filter(p => p.categoria === 'Saúde').length;
  const tecnico = profissionais.filter(p => p.categoria === 'Técnico').length;
  const adminProf = profissionais.filter(p => p.categoria === 'Admin').length;
  const hoje = new Date().toISOString().split('T')[0];
  const agendamentosHoje = agendamentos.filter(a => a.data === hoje).length;
  const usuarios = getUsers().length;
  const convitesPendentes = getConvites().filter(c => !c.usado).length;
  // Ocupação (simples)
  const ocupacao = profissionais.length > 0 ? Math.round((agendamentosHoje / (profissionais.length * 3)) * 100) : 0;

  el.innerHTML = `
    <div class="grid-4">
      <div class="card"><h3>Pacientes</h3><p style="font-size:2em; color:#2E7D32;">${pacientes.length}</p></div>
      <div class="card"><h3>Profissionais (S/T/A)</h3><p style="font-size:2em; color:#2E7D32;">${saude}/${tecnico}/${adminProf}</p></div>
      <div class="card"><h3>Agendamentos Hoje</h3><p style="font-size:2em; color:#2E7D32;">${agendamentosHoje}</p></div>
      <div class="card"><h3>Receitas</h3><p style="font-size:2em; color:#2E7D32;">R$ ${receitas.toFixed(2)}</p></div>
      <div class="card"><h3>Despesas</h3><p style="font-size:2em; color:#d32f2f;">R$ ${despesas.toFixed(2)}</p></div>
      <div class="card"><h3>Saldo</h3><p style="font-size:2em; color:${saldo>=0?'#2E7D32':'#d32f2f'};">R$ ${saldo.toFixed(2)}</p></div>
      <div class="card"><h3>Gestão</h3><p>Usuários: ${usuarios}<br>Convites pendentes: ${convitesPendentes}<br>Ocupação: ${ocupacao}%</p></div>
    </div>
    <div class="card"><canvas id="dashChart" height="100"></canvas></div>
  `;
  // Gráfico de exemplo
  setTimeout(() => {
    const ctx = document.getElementById('dashChart');
    if (window.dashChart) window.dashChart.destroy();
    window.dashChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: ['Receitas', 'Despesas', 'Saldo'], datasets: [{ data: [receitas, despesas, saldo], backgroundColor: ['#2E7D32','#d32f2f','#00bcd4'] }] }
    });
  }, 100);
}

// ========== AGENDA ==========
function renderAgenda(el) {
  const pacientes = getPacientes();
  const profissionais = getProfissionais();
  const agendamentos = getAgendamentos();
  const hoje = new Date();
  const mes = hoje.getMonth();
  const ano = hoje.getFullYear();
  // Navegação
  let currentMonth = mes;
  let currentYear = ano;

  function renderCalendar(month, year) {
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    let html = '<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><button onclick="navigateMonth(-1)">&laquo; Mês anterior</button><span>${new Date(year,month).toLocaleString('pt-BR',{month:'long',year:'numeric'})}</span><button onclick="navigateMonth(1)">Próximo mês &raquo;</button></div>';
    html += '<div class="calendar">';
    const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    diasSemana.forEach(d => html += `<div style="font-weight:600; text-align:center;">${d}</div>`);
    for (let i=0; i<firstDay; i++) html += '<div></div>';
    for (let d=1; d<=daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const events = agendamentos.filter(a => a.data === dateStr);
      html += `<div class="calendar-day" onclick="abrirFormAgendamento('${dateStr}')"><div class="day-number">${d}</div>`;
      events.forEach(e => {
        const pac = pacientes.find(p => p.id === e.pacienteId);
        html += `<div class="event">${e.hora || '--:--'} ${pac ? pac.nome : '?'}</div>`;
      });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  window.navigateMonth = function(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    el.querySelector('#calContainer').innerHTML = renderCalendar(currentMonth, currentYear);
  };

  window.abrirFormAgendamento = function(data) {
    showModal('agendaModal');
    document.getElementById('agendaData').value = data;
    // Preencher selects
    const pacSelect = document.getElementById('agendaPaciente');
    pacSelect.innerHTML = '<option value="">Selecione</option>' + pacientes.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
    const profSelect = document.getElementById('agendaProfissional');
    profSelect.innerHTML = '<option value="">Selecione</option>' + profissionais.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
  };

  el.innerHTML = `
    <div class="card">
      <div style="display:flex; gap:10px; margin-bottom:10px;">
        <select id="filtroProfAgenda" onchange="filtroAgenda()">
          <option value="">Todos os profissionais</option>
          ${profissionais.map(p => `<option value="${p.id}">${p.nome}</option>`).join('')}
        </select>
      </div>
      <div id="calContainer">${renderCalendar(currentMonth, currentYear)}</div>
    </div>
    <div id="agendaModal" class="modal">
      <div class="modal-content">
        <h3>Agendamento</h3>
        <input type="date" id="agendaData">
        <input type="time" id="agendaHora">
        <select id="agendaPaciente"></select>
        <select id="agendaProfissional"></select>
        <input type="text" id="agendaObservacao" placeholder="Observação">
        <button onclick="salvarAgendamento()">Salvar</button>
        <button class="btn-danger" onclick="hideModal('agendaModal')">Cancelar</button>
      </div>
    </div>
  `;

  window.salvarAgendamento = function() {
    const data = document.getElementById('agendaData').value;
    const hora = document.getElementById('agendaHora').value;
    const pacienteId = document.getElementById('agendaPaciente').value;
    const profissionalId = document.getElementById('agendaProfissional').value;
    const observacao = document.getElementById('agendaObservacao').value;
    if (!pacienteId || !profissionalId) { alert('Paciente e profissional obrigatórios.'); return; }
    let agendamentos = getAgendamentos();
    agendamentos.push({ id: gerarId(), data, hora, pacienteId, profissionalId, observacao });
    saveAgendamentos(agendamentos);
    hideModal('agendaModal');
    carregarPagina('agenda');
  };

  window.filtroAgenda = function() {
    // recarregar calendário com filtro (não implementado completamente)
    carregarPagina('agenda');
  };
}

// ========== PACIENTES ==========
function renderPacientes(el) {
  const pacientes = getPacientes();
  let pacienteSelecionado = null;
  let abaAtiva = 'dados';

  const html = `
    <div class="card">
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        <input type="text" id="buscaPaciente" placeholder="Buscar paciente..." oninput="filtrarPacientes()">
        <button onclick="abrirCadastroPaciente()">+ Novo Paciente</button>
      </div>
      <div id="listaPacientes"></div>
    </div>
    <div class="card" id="detalhesPaciente" style="display:none;">
      <div style="display:flex; justify-content:space-between;">
        <h3 id="pacienteNome"></h3>
        <div><button onclick="editarPaciente()">Editar</button><button class="btn-danger" onclick="excluirPaciente()">Excluir</button></div>
      </div>
      <div class="tabs" id="tabsPaciente">
        <div class="tab active" data-tab="dados">Dados</div>
        <div class="tab" data-tab="prontuarios">Prontuários</div>
        <div class="tab" data-tab="evolucao">Evolução IA</div>
        <div class="tab" data-tab="declaracao">Declaração</div>
        <div class="tab" data-tab="atestado">Atestado</div>
        <div class="tab" data-tab="relatorio">Relatório</div>
        <div class="tab" data-tab="multiprofissional">Multiprofissional</div>
        <div class="tab" data-tab="laudo">Laudo</div>
        <div class="tab" data-tab="parecer">Parecer</div>
      </div>
      <div id="conteudoAba"></div>
    </div>
    <div id="cadastroPacienteModal" class="modal">
      <div class="modal-content">
        <h3>Cadastro de Paciente</h3>
        <input type="text" id="cpf" placeholder="CPF">
        <input type="text" id="nome" placeholder="Nome completo">
        <input type="date" id="dataNasc">
        <input type="text" id="telefone" placeholder="Telefone">
        <input type="email" id="emailPac" placeholder="Email">
        <input type="text" id="endereco" placeholder="Endereço">
        <select id="planoSaude"><option value="">Plano de Saúde</option><option>Unimed</option><option>Bradesco</option><option>Outro</option></select>
        <input type="text" id="contatoEmergencia" placeholder="Contato de emergência">
        <textarea id="observacoesPac" placeholder="Observações"></textarea>
        <input type="hidden" id="pacienteId">
        <button onclick="salvarPaciente()">Salvar</button>
        <button class="btn-danger" onclick="hideModal('cadastroPacienteModal')">Cancelar</button>
      </div>
    </div>
  `;
  el.innerHTML = html;

  // Eventos das tabs
  document.getElementById('tabsPaciente').addEventListener('click', function(e) {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('#tabsPaciente .tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    abaAtiva = tab.getAttribute('data-tab');
    mostrarAbaPaciente();
  });

  window.filtrarPacientes = function() {
    const termo = document.getElementById('buscaPaciente').value.toLowerCase();
    const lista = document.getElementById('listaPacientes');
    const filtrados = pacientes.filter(p => p.nome.toLowerCase().includes(termo));
    lista.innerHTML = filtrados.map(p => `<div style="cursor:pointer; padding:8px; border-bottom:1px solid #eee;" onclick="selecionarPaciente('${p.id}')">${p.nome} - ${p.cpf || 'sem CPF'}</div>`).join('');
  };

  window.selecionarPaciente = function(id) {
    pacienteSelecionado = pacientes.find(p => p.id === id);
    document.getElementById('detalhesPaciente').style.display = 'block';
    document.getElementById('pacienteNome').innerText = pacienteSelecionado.nome;
    mostrarAbaPaciente();
  };

  function mostrarAbaPaciente() {
    const container = document.getElementById('conteudoAba');
    if (!pacienteSelecionado) return;
    switch(abaAtiva) {
      case 'dados':
        container.innerHTML = `
          <p><strong>CPF:</strong> ${pacienteSelecionado.cpf || ''}</p>
          <p><strong>Nome:</strong> ${pacienteSelecionado.nome}</p>
          <p><strong>Data Nasc:</strong> ${formatarData(pacienteSelecionado.dataNasc)}</p>
          <p><strong>Telefone:</strong> ${pacienteSelecionado.telefone || ''}</p>
          <p><strong>Email:</strong> ${pacienteSelecionado.email || ''}</p>
          <p><strong>Endereço:</strong> ${pacienteSelecionado.endereco || ''}</p>
          <p><strong>Plano Saúde:</strong> ${pacienteSelecionado.planoSaude || ''}</p>
          <p><strong>Contato Emergência:</strong> ${pacienteSelecionado.contatoEmergencia || ''}</p>
          <p><strong>Observações:</strong> ${pacienteSelecionado.observacoes || ''}</p>
        `;
        break;
      case 'prontuarios':
        renderProntuarios(container);
        break;
      case 'evolucao':
        renderEvolucaoIA(container);
        break;
      case 'declaracao':
      case 'atestado':
      case 'relatorio':
      case 'multiprofissional':
      case 'laudo':
      case 'parecer':
        container.innerHTML = `<p>Funcionalidade ${abaAtiva} em desenvolvimento.</p>`;
        break;
    }
  }

  window.abrirCadastroPaciente = function() {
    document.getElementById('pacienteId').value = '';
    ['cpf','nome','dataNasc','telefone','emailPac','endereco','planoSaude','contatoEmergencia','observacoesPac'].forEach(id => document.getElementById(id).value = '');
    showModal('cadastroPacienteModal');
  };

  window.salvarPaciente = function() {
    const id = document.getElementById('pacienteId').value;
    const dados = {
      cpf: document.getElementById('cpf').value,
      nome: document.getElementById('nome').value,
      dataNasc: document.getElementById('dataNasc').value,
      telefone: document.getElementById('telefone').value,
      email: document.getElementById('emailPac').value,
      endereco: document.getElementById('endereco').value,
      planoSaude: document.getElementById('planoSaude').value,
      contatoEmergencia: document.getElementById('contatoEmergencia').value,
      observacoes: document.getElementById('observacoesPac').value
    };
    if (!dados.nome) { alert('Nome obrigatório'); return; }
    let pacientes = getPacientes();
    if (id) {
      const idx = pacientes.findIndex(p => p.id === id);
      if (idx >=0) pacientes[idx] = { ...pacientes[idx], ...dados };
    } else {
      dados.id = gerarId();
      dados.prontuarios = [];
      pacientes.push(dados);
    }
    savePacientes(pacientes);
    hideModal('cadastroPacienteModal');
    carregarPagina('pacientes');
  };

  window.editarPaciente = function() {
    if (!pacienteSelecionado) return;
    document.getElementById('pacienteId').value = pacienteSelecionado.id;
    document.getElementById('cpf').value = pacienteSelecionado.cpf || '';
    document.getElementById('nome').value = pacienteSelecionado.nome;
    document.getElementById('dataNasc').value = pacienteSelecionado.dataNasc || '';
    document.getElementById('telefone').value = pacienteSelecionado.telefone || '';
    document.getElementById('emailPac').value = pacienteSelecionado.email || '';
    document.getElementById('endereco').value = pacienteSelecionado.endereco || '';
    document.getElementById('planoSaude').value = pacienteSelecionado.planoSaude || '';
    document.getElementById('contatoEmergencia').value = pacienteSelecionado.contatoEmergencia || '';
    document.getElementById('observacoesPac').value = pacienteSelecionado.observacoes || '';
    showModal('cadastroPacienteModal');
  };

  window.excluirPaciente = function() {
    if (!pacienteSelecionado) return;
    if (confirm('Excluir paciente?')) {
      let pacientes = getPacientes();
      pacientes = pacientes.filter(p => p.id !== pacienteSelecionado.id);
      savePacientes(pacientes);
      carregarPagina('pacientes');
    }
  };

  // Inicializa lista
  window.filtrarPacientes();

  // Funções para Prontuários
  function renderProntuarios(container) {
    const prontuarios = pacienteSelecionado.prontuarios || [];
    let html = `<button onclick="abrirNovoProntuario()">+ Novo Prontuário</button><div style="margin-top:10px;">`;
    prontuarios.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(p => {
      html += `<div style="border-left:3px solid #00bcd4; padding-left:10px; margin-bottom:10px;">
        <small>${formatarData(p.data)}</small>
        <p>${p.texto || ''}</p>
        <button onclick="imprimirProntuario('${p.id}')">Imprimir</button>
        <button onclick="excluirProntuario('${p.id}')">Excluir</button>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  window.abrirNovoProntuario = function() {
    const texto = prompt('Digite o prontuário:');
    if (texto) {
      let pacientes = getPacientes();
      const paciente = pacientes.find(p => p.id === pacienteSelecionado.id);
      if (!paciente.prontuarios) paciente.prontuarios = [];
      paciente.prontuarios.push({ id: gerarId(), data: new Date().toISOString().split('T')[0], texto });
      savePacientes(pacientes);
      pacienteSelecionado = paciente;
      mostrarAbaPaciente();
    }
  };

  window.excluirProntuario = function(id) {
    if (confirm('Excluir prontuário?')) {
      let pacientes = getPacientes();
      const paciente = pacientes.find(p => p.id === pacienteSelecionado.id);
      if (paciente) {
        paciente.prontuarios = (paciente.prontuarios || []).filter(p => p.id !== id);
        savePacientes(pacientes);
        pacienteSelecionado = paciente;
        mostrarAbaPaciente();
      }
    }
  };

  window.imprimirProntuario = function(id) {
    const paciente = pacienteSelecionado;
    const prontuario = (paciente.prontuarios || []).find(p => p.id === id);
    if (prontuario) {
      const janela = window.open('', '_blank');
      janela.document.write(`<h3>Prontuário - ${paciente.nome}</h3><p>Data: ${formatarData(prontuario.data)}</p><p>${prontuario.texto}</p><button onclick="window.print()">Imprimir</button>`);
      janela.document.close();
    }
  };

  // Função Evolução IA Determinística
  function renderEvolucaoIA(container) {
    const paciente = pacienteSelecionado;
    const prontuarios = paciente.prontuarios || [];
    if (prontuarios.length === 0) {
      container.innerHTML = '<p>Nenhum prontuário para análise.</p>';
      return;
    }
    // Análise determinística
    const palavrasPositivas = ['melhora', 'progresso', 'avanço', 'bem', 'ótimo', 'evolução', 'bom', 'melhorou', 'feliz', 'calmo', 'estável', 'positivo', 'recuperação'];
    const palavrasNegativas = ['piora', 'regressão', 'dificuldade', 'problema', 'mal', 'pior', 'piorou', 'ansioso', 'triste', 'agitado', 'grave', 'negativo', 'retrocesso'];
    let totalPalavras = 0;
    let positivas = 0;
    let negativas = 0;
    const textos = prontuarios.map(p => p.texto || '').join(' ').toLowerCase();
    const words = textos.split(/\s+/);
    words.forEach(w => {
      if (palavrasPositivas.includes(w)) { positivas++; totalPalavras++; }
      else if (palavrasNegativas.includes(w)) { negativas++; totalPalavras++; }
    });
    let percentual = totalPalavras > 0 ? (positivas / totalPalavras) * 100 : 0;
    let classificacao = '';
    let sugestao = '';
    if (percentual >= 60) { classificacao = 'Progresso'; sugestao = 'Continue com o tratamento atual.'; }
    else if (percentual >= 40) { classificacao = 'Estável'; sugestao = 'Manter acompanhamento regular.'; }
    else { classificacao = 'Atenção'; sugestao = 'Reavaliar abordagem terapêutica.'; }

    container.innerHTML = `
      <p><strong>Classificação:</strong> ${classificacao}</p>
      <p><strong>Palavras Positivas:</strong> ${positivas} | <strong>Negativas:</strong> ${negativas}</p>
      <p><strong>Sugestão:</strong> ${sugestao}</p>
      <canvas id="evolucaoChart" width="200" height="200"></canvas>
    `;
    setTimeout(() => {
      const ctx = document.getElementById('evolucaoChart');
      if (window.evolucaoChart) window.evolucaoChart.destroy();
      window.evolucaoChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Positivas', 'Negativas'], datasets: [{ data: [positivas, negativas], backgroundColor: ['#2E7D32', '#d32f2f'] }] }
      });
    }, 100);
  }
}

// ========== FINANCEIRO ==========
function renderFinanceiro(el) {
  const financeiro = getFinanceiro();
  const receitas = financeiro.filter(f => f.tipo === 'receita');
  const despesas = financeiro.filter(f => f.tipo === 'despesa');
  const totalReceitas = receitas.reduce((acc, f) => acc + f.valor, 0);
  const totalDespesas = despesas.reduce((acc, f) => acc + f.valor, 0);
  const saldo = totalReceitas - totalDespesas;

  let html = `
    <div class="grid-3">
      <div class="card"><h3>Receitas</h3><p style="font-size:1.5em; color:#2E7D32;">R$ ${totalReceitas.toFixed(2)}</p></div>
      <div class="card"><h3>Despesas</h3><p style="font-size:1.5em; color:#d32f2f;">R$ ${totalDespesas.toFixed(2)}</p></div>
      <div class="card"><h3>Saldo</h3><p style="font-size:1.5em; color:${saldo>=0?'#2E7D32':'#d32f2f'};">R$ ${saldo.toFixed(2)}</p></div>
    </div>
    <div class="card">
      <button onclick="abrirNovoLancamento()">+ Novo Lançamento</button>
      <h4>Últimos 6 meses</h4>
      <canvas id="paretoChart" height="80"></canvas>
      <div id="iaAlert" style="margin-top:10px; padding:10px; border-radius:8px;"></div>
    </div>
    <div id="lancamentoModal" class="modal">
      <div class="modal-content">
        <h3>Novo Lançamento</h3>
        <select id="lancTipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
        <input type="text" id="lancDescricao" placeholder="Descrição">
        <input type="number" id="lancValor" placeholder="Valor" step="0.01">
        <input type="date" id="lancData">
        <select id="lancCategoria"><option value="">Categoria</option><option>Consultas</option><option>Exames</option><option>Salários</option><option>Aluguel</option><option>Outros</option></select>
        <button onclick="salvarLancamento()">Salvar</button>
        <button class="btn-danger" onclick="hideModal('lancamentoModal')">Cancelar</button>
      </div>
    </div>
  `;
  el.innerHTML = html;

  window.abrirNovoLancamento = function() {
    showModal('lancamentoModal');
    document.getElementById('lancTipo').value = 'receita';
    document.getElementById('lancDescricao').value = '';
    document.getElementById('lancValor').value = '';
    document.getElementById('lancData').value = new Date().toISOString().split('T')[0];
    document.getElementById('lancCategoria').value = '';
  };

  window.salvarLancamento = function() {
    const tipo = document.getElementById('lancTipo').value;
    const descricao = document.getElementById('lancDescricao').value;
    const valor = parseFloat(document.getElementById('lancValor').value);
    const data = document.getElementById('lancData').value;
    const categoria = document.getElementById('lancCategoria').value;
    if (!descricao || isNaN(valor)) { alert('Preencha descrição e valor.'); return; }
    let financeiro = getFinanceiro();
    financeiro.push({ id: gerarId(), tipo, descricao, valor, data, categoria });
    saveFinanceiro(financeiro);
    hideModal('lancamentoModal');
    carregarPagina('financeiro');
  };

  // Gráfico Pareto
  setTimeout(() => {
    const ctx = document.getElementById('paretoChart');
    if (window.paretoChart) window.paretoChart.destroy();
    const labels = [];
    const receitasData = [];
    const despesasData = [];
    for (let i=5; i>=0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const mes = d.getMonth()+1;
      const ano = d.getFullYear();
      const label = `${String(mes).padStart(2,'0')}/${ano}`;
      labels.push(label);
      const rec = financeiro.filter(f => f.tipo === 'receita' && f.data && f.data.startsWith(`${ano}-${String(mes).padStart(2,'0')}`)).reduce((acc, f) => acc + f.valor, 0);
      receitasData.push(rec);
      const desp = financeiro.filter(f => f.tipo === 'despesa' && f.data && f.data.startsWith(`${ano}-${String(mes).padStart(2,'0')}`)).reduce((acc, f) => acc + f.valor, 0);
      despesasData.push(desp);
    }
    window.paretoChart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Receitas', data: receitasData, backgroundColor: '#2E7D32' }, { label: 'Despesas', data: despesasData, backgroundColor: '#d32f2f' }] },
      options: { responsive: true }
    });
  }, 100);

  // IA Analysis
  const iaDiv = document.getElementById('iaAlert');
  if (totalDespesas > totalReceitas) {
    iaDiv.style.background = '#ffebee';
    iaDiv.innerHTML = '<strong>Alerta:</strong> Despesas excedem receitas. Revise seus gastos.';
  } else {
    iaDiv.style.background = '#e8f5e9';
    iaDiv.innerHTML = '<strong>Análise IA:</strong> Contas equilibradas.';
  }
}

function renderConvites(el) {
  const convites = getConvites();
  let html = `
    <div class="card">
      <h3>Gerar Convite</h3>
      <select id="conviteRole">
        <option value="profissional">Profissional</option>
        <option value="secretaria">Secretária</option>
        <option value="admin">Administrador</option>
      </select>
      <button onclick="gerarConvite()">Gerar Link</button>
      <div id="conviteLink" style="margin-top:10px;"></div>
    </div>
    <div class="card">
      <h3>Convites Pendentes</h3>
      ${convites.filter(c => !c.usado).map(c => `<p>Token: ${c.token} - Função: ${c.role} - <a href="#" onclick="copiarToken('${c.token}')">Copiar link</a></p>`).join('')}
    </div>
  `;
  el.innerHTML = html;

  window.gerarConvite = function() {
    const role = document.getElementById('conviteRole').value;
    const token = gerarId().toString(36) + Math.random().toString(36).substr(2);
    let convites = getConvites();
    convites.push({ token, role, usado: false });
    saveConvites(convites);
    const link = `${window.location.origin}${window.location.pathname}?convite=${token}`;
    document.getElementById('conviteLink').innerHTML = `<input type="text" value="${link}" readonly style="width:100%;"><button onclick="copiarTexto('${link}')">Copiar</button>`;
    carregarPagina('convites');
  };

  window.copiarToken = function(token) {
    const link = `${window.location.origin}${window.location.pathname}?convite=${token}`;
    navigator.clipboard.writeText(link).then(() => alert('Link copiado!'));
  };

  window.copiarTexto = function(texto) {
    navigator.clipboard.writeText(texto).then(() => alert('Copiado!'));
  };

  // Verifica convite na URL
  const urlParams = new URLSearchParams(window.location.search);
  const conviteToken = urlParams.get('convite');
  if (conviteToken) {
    const convites = getConvites();
    const convite = convites.find(c => c.token === conviteToken && !c.usado);
    if (convite) {
      const email = prompt('Digite seu email para registrar:');
      const senha = prompt('Digite sua senha:');
      if (email && senha) {
        let users = getUsers();
        if (users.find(u => u.email === email)) {
          alert('Email já cadastrado.');
        } else {
          users.push({ id: gerarId(), nome: email.split('@')[0], email, senha, role: convite.role });
          saveUsers(users);
          convite.usado = true;
          saveConvites(convites);
          alert('Registrado com sucesso! Faça login.');
          window.location.href = window.location.pathname;
        }
      }
    } else {
      alert('Convite inválido ou já usado.');
    }
  }
}

// ========== CONFIGURAÇÕES ==========
function renderConfiguracoes(el) {
  const config = JSON.parse(localStorage.getItem('ativamente_config') || '{}');
  let html = `
    <div class="card">
      <h3>Configurações da Clínica</h3>
      <label>Nome da Clínica</label>
      <input type="text" id="configNome" value="${config.nome || ''}">
      <label>Horário de Funcionamento</label>
      <input type="time" id="configHoraInicio" value="${config.horaInicio || '08:00'}">
      <input type="time" id="configHoraFim" value="${config.horaFim || '18:00'}">
      <label>Dias de Funcionamento</label>
      <div>
        ${['seg','ter','qua','qui','sex','sab','dom'].map(d => `
          <label style="display:inline-block; margin-right:10px;"><input type="checkbox" value="${d}" ${(config.dias || ['seg','ter','qua','qui','sex']).includes(d)?'checked':''}> ${d}</label>
        `).join('')}
      </div>
      <label>Cor Primária</label>
      <input type="color" id="configCor" value="${config.cor || '#2E7D32'}">
      <button onclick="salvarConfig()">Salvar</button>
    </div>
    <div class="card">
      <h3>Backup</h3>
      <button onclick="fazerBackup()">Exportar Backup</button>
      <button onclick="document.getElementById('restoreInput').click()">Restaurar Backup</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none;" onchange="restaurarBackup(event)">
    </div>
  `;
  el.innerHTML = html;

  window.salvarConfig = function() {
    const nome = document.getElementById('configNome').value;
    const horaInicio = document.getElementById('configHoraInicio').value;
    const horaFim = document.getElementById('configHoraFim').value;
    const dias = [];
    document.querySelectorAll('input[type=checkbox]:checked').forEach(cb => dias.push(cb.value));
    const cor = document.getElementById('configCor').value;
    const config = { nome, horaInicio, horaFim, dias, cor };
    localStorage.setItem('ativamente_config', JSON.stringify(config));
    // Aplicar cor se desejado
    document.querySelector('.sidebar').style.background = cor;
    alert('Configurações salvas!');
  };

  window.fazerBackup = function() {
    const backup = {
      users: getUsers(),
      pacientes: getPacientes(),
      profissionais: getProfissionais(),
      agendamentos: getAgendamentos(),
      financeiro: getFinanceiro(),
      convites: getConvites(),
      config: JSON.parse(localStorage.getItem('ativamente_config') || '{}')
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ativamente_backup.json';
    a.click();
    URL.revokeObjectURL(url);
  };

  window.restaurarBackup = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        localStorage.setItem('ativamente_users', JSON.stringify(data.users || []));
        localStorage.setItem('ativamente_pacientes', JSON.stringify(data.pacientes || []));
        localStorage.setItem('ativamente_profissionais', JSON.stringify(data.profissionais || []));
        localStorage.setItem('ativamente_agendamentos', JSON.stringify(data.agendamentos || []));
        localStorage.setItem('ativamente_financeiro', JSON.stringify(data.financeiro || []));
        localStorage.setItem('ativamente_convites', JSON.stringify(data.convites || []));
        localStorage.setItem('ativamente_config', JSON.stringify(data.config || {}));
        alert('Backup restaurado com sucesso!');
        location.reload();
      } catch(ex) {
        alert('Erro ao restaurar backup.');
      }
    };
    reader.readAsText(file);
  };
}

// ========== INICIALIZAÇÃO ==========
// Se não houver usuário logado, mostrar login
if (!currentUser) {
  document.getElementById('loginModal').classList.add('show');
}
</script>
