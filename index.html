  <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; }
        #menu { background: #333; color: #fff; padding: 10px; display: flex; gap: 15px; }
        #menu button { background: #555; color: #fff; border: none; padding: 8px 16px; cursor: pointer; }
        #menu button:hover { background: #777; }
        #conteudo { padding: 20px; }
        .module { display: none; }
        .module.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-content { background: #fff; padding: 20px; border-radius: 5px; width: 300px; }
        .modal-content label { display: block; margin-top: 10px; }
        .modal-content input { width: 100%; padding: 5px; margin-top: 5px; }
        .modal-content button { margin-top: 15px; padding: 8px 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>
    <div id="menu">
        <button onclick="showModule('agenda')">Agenda</button>
        <button onclick="showModule('profissionais')">Profissionais</button>
        <button onclick="showModule('pacientes')">Pacientes</button>
        <button onclick="showModule('documentos')">Documentos</button>
        <button onclick="showModule('financeiro')">Financeiro</button>
        <button onclick="showModule('prontuarios')">Prontuários</button>
    </div>
    <div id="conteudo">
        <!-- Módulo Agenda -->
        <div id="module-agenda" class="module">
            <h2>Agenda</h2>
            <button onclick="abrirModal()">Novo Agendamento</button>
            <div id="lista-agendamentos"></div>
            <!-- Modal -->
            <div id="modal-agendamento" class="modal">
                <div class="modal-content">
                    <h3>Novo Agendamento</h3>
                    <label>Paciente:</label>
                    <input type="text" id="input-paciente">
                    <label>Profissional:</label>
                    <input type="text" id="input-profissional">
                    <label>Data:</label>
                    <input type="date" id="input-data">
                    <label>Hora:</label>
                    <input type="time" id="input-hora">
                    <button onclick="salvarAgendamento()">Salvar</button>
                    <button onclick="fecharModal()">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Outros módulos (placeholder) -->
        <div id="module-profissionais" class="module"><h2>Profissionais</h2><p>Conteúdo...</p></div>
        <div id="module-pacientes" class="module"><h2>Pacientes</h2><p>Conteúdo...</p></div>
        <div id="module-documentos" class="module"><h2>Documentos</h2><p>Conteúdo...</p></div>
        <div id="module-financeiro" class="module"><h2>Financeiro</h2><p>Conteúdo...</p></div>
        <div id="module-prontuarios" class="module"><h2>Prontuários</h2><p>Conteúdo...</p></div>
    </div>

    <script>
        // Armazenamento dos agendamentos
        let agendamentos = JSON.parse(localStorage.getItem('agendamentos')) || [];

        // Função para mostrar módulo
        function showModule(nome) {
            // Fecha modal se estiver aberto
            fecharModal();
            // Oculta todos os módulos
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            // Mostra o módulo selecionado
            const module = document.getElementById('module-' + nome);
            if (module) {
                module.classList.add('active');
            }
            // Atualiza a lista se for agenda
            if (nome === 'agenda') {
                atualizarLista();
            }
        }

        // Abrir modal
        function abrirModal() {
            document.getElementById('modal-agendamento').classList.add('open');
            // Limpa campos
            document.getElementById('input-paciente').value = '';
            document.getElementById('input-profissional').value = '';
            document.getElementById('input-data').value = '';
            document.getElementById('input-hora').value = '';
        }

        // Fechar modal
        function fecharModal() {
            const modal = document.getElementById('modal-agendamento');
            modal.classList.remove('open');
            // Remove qualquer estado residual (se necessário)
        }

        // Salvar agendamento
        function salvarAgendamento() {
            const paciente = document.getElementById('input-paciente').value.trim();
            const profissional = document.getElementById('input-profissional').value.trim();
            const data = document.getElementById('input-data').value;
            const hora = document.getElementById('input-hora').value;

            if (!paciente || !profissional || !data || !hora) {
                alert('Preencha todos os campos!');
                return;
            }

            const novo = {
                id: Date.now(),
                paciente,
                profissional,
                data,
                hora
            };
            agendamentos.push(novo);
            localStorage.setItem('agendamentos', JSON.stringify(agendamentos));
            atualizarLista();
            fecharModal();
        }

        // Atualizar lista de agendamentos
        function atualizarLista() {
            const div = document.getElementById('lista-agendamentos');
            if (agendamentos.length === 0) {
                div.innerHTML = '<p>Nenhum agendamento.</p>';
                return;
            }
            let html = '<table><tr><th>Paciente</th><th>Profissional</th><th>Data</th><th>Hora</th><th>Ações</th></tr>';
            agendamentos.forEach(a => {
                html += `<tr><td>${a.paciente}</td><td>${a.profissional}</td><td>${a.data}</td><td>${a.hora}</td><td><button onclick="removerAgendamento(${a.id})">Excluir</button></td></tr>`;
            });
            html += '</table>';
            div.innerHTML = html;
        }

        // Remover agendamento
        function removerAgendamento(id) {
            agendamentos = agendamentos.filter(a => a.id !== id);
            localStorage.setItem('agendamentos', JSON.stringify(agendamentos));
            atualizarLista();
        }

        // Inicializar com agenda ativa
        showModule('agenda');
    </script>
</body>
</html>
