<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativamente+ Clinic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;color:#1a1a2e;min-height:100vh}
.topbar{background:linear-gradient(135deg,#1a1a2e 50%,#e67e22 50%,#20c997 100%);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.logo{font-size:1.5em;font-weight:700;background:linear-gradient(135deg,#e67e22,#20c997);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.user-area{display:flex;align-items:center;gap:12px;color:#fff}
.logout-btn{background:rgba(255,255,255,.2);color:#fff;border:1px solid #fff;padding:6px 14px;border-radius:6px;cursor:pointer}
.logout-btn:hover{background:#fff;color:#1a1a2e}
.nav{display:flex;gap:6px;padding:10px 20px;background:#fff;border-bottom:2px solid #1a1a2e;flex-wrap:wrap;overflow-x:auto}
.nav button{background:none;border:none;padding:8px 16px;cursor:pointer;border-radius:20px;transition:.3s;color:#1a1a2e;font-weight:500;white-space:nowrap}
.nav button:hover,.nav button.active{background:#1a1a2e;color:#fff}
.main{padding:20px;display:none;max-width:1400px;margin:0 auto}
.main.active{display:block}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h2{color:#1a1a2e;margin-bottom:15px}
label{display:block;margin:8px 0 4px;font-weight:600;color:#333}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:8px;font-size:1em}
button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:1em;transition:.3s}
.primary{background:linear-gradient(135deg,#e67e22,#20c997);color:#fff}
.primary:hover{opacity:.9}
.secondary{background:#1a1a2e;color:#fff}
.danger{background:#e74c3c;color:#fff}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{text-align:left;padding:10px;border-bottom:1px solid #eee}
th{background:#1a1a2e;color:#fff}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.08);text-align:center}
.kpi-card .numero{font-size:1.8em;font-weight:700;color:#1a1a2e}
.kpi-card .rotulo{font-size:.85em;color:#666;margin-top:4px}
.tabs{display:flex;gap:6px;margin-bottom:15px;flex-wrap:wrap;border-bottom:2px solid #eee;padding-bottom:8px}
.tab-btn{padding:8px 14px;cursor:pointer;border:none;background:none;font-weight:500;color:#666;border-radius:6px 6px 0 0}
.tab-btn.active{background:#1a1a2e;color:#fff;border-radius:6px}
.tab-content{display:none}
.tab-content.active{display:block}
.drawer{position:fixed;top:0;right:-520px;width:500px;max-width:100%;height:100%;background:#fff;box-shadow:-4px 0 12px rgba(0,0,0,.2);transition:right .3s;z-index:1000;overflow-y:auto;padding:20px}
.drawer.open{right:0}
.drawer-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:999;display:none}
.drawer-overlay.show{display:block}
.close-drawer{font-size:1.5em;cursor:pointer;float:right;color:#e74c3c}
.status-badge{padding:4px 10px;border-radius:12px;font-size:.8em;font-weight:600}
.status-confirmado{background:#d4edda;color:#155724}
.status-agendado{background:#e2e3e5;color:#383d41}
.status-cancelado{background:#f8d7da;color:#721c24}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.drawer{width:100%;right:-100%}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Ativamente+ Clinic</div>
  <div class="user-area">
    <span id="userName"></span>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</div>

<div class="nav" id="navBar">
  <button class="active" onclick="showTab('home')">🏠 Home</button>
  <button onclick="showTab('dashboard')">📊 Dashboard</button>
  <button onclick="showTab('agenda')">📅 Agenda</button>
  <button onclick="showTab('pacientes')">👥 Pacientes</button>
  <button onclick="showTab('profissionais')">👨‍⚕️ Profissionais</button>
  <button onclick="showTab('financeiro')">💰 Financeiro</button>
  <button onclick="showTab('gestao')">📈 Gestão</button>
  <button onclick="showTab('config')">⚙️ Config</button>
</div>

<div class="main active" id="home">
  <div class="card">
    <h2>Bem-vindo ao Ativamente+ Clinic</h2>
    <p>Sistema integrado de gestão para clínicas de psicologia. Utilize o menu acima para navegar.</p>
  </div>
</div>

<div class="main" id="dashboard">
  <div class="card"><h2>Dashboard</h2></div>
  <div class="kpi-grid" id="kpiGrid"></div>
</div>

<div class="main" id="agenda">
  <div class="card">
    <h2>Agenda</h2>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:15px;flex-wrap:wrap">
      <button class="primary" onclick="abrirModalAgenda()">+ Novo Agendamento</button>
      <span id="mesAno" style="font-weight:600;font-size:1.1em"></span>
      <button class="secondary" onclick="mesAnterior()">◀</button>
      <button class="secondary" onclick="proximoMes()">▶</button>
    </div>
    <div id="calendarioGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px"></div>
  </div>
</div>

<div class="main" id="pacientes">
  <div class="card">
    <h2>Pacientes</h2>
    <button class="primary" onclick="abrirModalPaciente()">+ Novo Paciente</button>
    <div id="pacienteList" style="margin-top:15px"></div>
  </div>
</div>

<div class="main" id="profissionais">
  <div class="card">
    <h2>Profissionais</h2>
    <button class="primary" onclick="abrirModalProfissional()">+ Novo Profissional</button>
    <div id="profissionalList" style="margin-top:15px"></div>
  </div>
</div>

<div class="main" id="financeiro">
  <div class="card">
    <h2>Financeiro</h2>
    <button class="primary" onclick="abrirModalFinanceiro()">+ Nova Transação</button>
    <div id="finResumo" style="display:flex;gap:20px;margin:15px 0;flex-wrap:wrap"></div>
    <canvas id="paretoChart" height="200" style="max-width:100%;margin:10px 0"></canvas>
    <div id="finSugestoes" style="background:#fff3e0;padding:12px;border-radius:8px;margin:10px 0"></div>
    <div id="finTable"></div>
  </div>
</div>

<div class="main" id="gestao">
  <div class="card">
    <h2>Gestão - IA de Desempenho</h2>
    <button class="primary" onclick="gerarInsights()">🔄 Gerar Insights</button>
    <div id="gestaoContent" style="margin-top:15px"></div>
  </div>
</div>

<div class="main" id="config">
  <div class="card">
    <h2>Configurações da Clínica</h2>
    <form id="configForm">
      <label>Nome da Clínica</label><input type="text" id="cfgNome" required>
      <label>CNPJ</label><input type="text" id="cfgCnpj">
      <label>Registro Profissional Jurídico</label><input type="text" id="cfgRegistro">
      <label>Endereço</label><input type="text" id="cfgEndereco">
      <label>Telefone</label><input type="text" id="cfgTelefone">
      <button type="submit" class="primary" style="margin-top:15px">Salvar</button>
    </form>
  </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="fecharDrawer()"></div>
<div class="drawer" id="pacienteDrawer"><span class="close-drawer" onclick="fecharDrawer()">✕</span><div id="drawerContent"></div></div>

<!-- Modal genérico -->
<div id="modalOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1001;align-items:center;justify-content:center" onclick="if(event.target===this)fecharModal()">
  <div style="background:#fff;border-radius:12px;padding:25px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;position:relative">
    <span style="position:absolute;top:10px;right:15px;font-size:1.5em;cursor:pointer" onclick="fecharModal()">✕</span>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ========== DADOS ==========
let db = { usuarios:[], pacientes:[], agendamentos:[], profissionais:[], transacoes:[], config:{nome:'',cnpj:'',registro:'',endereco:'',telefone:''} };
let sessao = null;
let mesAtual = new Date().getMonth();
let anoAtual = new Date().getFullYear();
let pacienteSelecionado = null;
let chartPareto = null;
let chartEvolucao = null;

function carregarDB(){
  const raw = localStorage.getItem('ativamentePlusDB');
  if(raw){ try{ db = JSON.parse(raw) }catch(e){} }
  if(!db.usuarios) db.usuarios=[];
  if(!db.pacientes) db.pacientes=[];
  if(!db.agendamentos) db.agendamentos=[];
  if(!db.profissionais) db.profissionais=[];
  if(!db.transacoes) db.transacoes=[];
  if(!db.config) db.config={nome:'',cnpj:'',registro:'',endereco:'',telefone:''};
  if(db.usuarios.length===0){
    db.usuarios.push({nome:'admin',senha:'admin',tipo:'administrador'});
    db.usuarios.push({nome:'psi',senha:'psi',tipo:'profissional'});
    db.usuarios.push({nome:'sec',senha:'sec',tipo:'secretaria'});
    salvarDB();
  }
}
function salvarDB(){ localStorage.setItem('ativamentePlusDB',JSON.stringify(db)) }

function login(nome, senha){
  const u = db.usuarios.find(x => x.nome===nome && x.senha===senha);
  if(!u){ alert('Usuário ou senha inválidos'); return false; }
  sessao = u;
  sessionStorage.setItem('sessao', JSON.stringify({nome:u.nome,tipo:u.tipo}));
  document.getElementById('userName').textContent = 'Olá, '+u.nome+' ('+u.tipo+')';
  renderAll();
  return true;
}

function logout(){ sessionStorage.removeItem('sessao'); sessao=null; location.reload(); }

function temAcesso(modulo){
  if(!sessao) return false;
  if(sessao.tipo==='administrador') return true;
  if(modulo==='financeiro' && sessao.tipo==='secretaria') return true;
  if(modulo==='agenda' && sessao.tipo==='secretaria') return true;
  if(modulo==='pacientes' && sessao.tipo==='secretaria') return true;
  if(modulo==='pacientes' && sessao.tipo==='profissional') return true;
  if(modulo==='agenda' && sessao.tipo==='profissional') return true;
  return false;
}

function pacientesPermitidos(){
  if(!sessao) return [];
  if(sessao.tipo==='administrador' || sessao.tipo==='secretaria') return db.pacientes;
  return db.pacientes.filter(p => p.profissional === sessao.nome);
}

function showTab(id){
  document.querySelectorAll('.main').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if(id==='dashboard') renderDashboard();
  if(id==='agenda') renderCalendario();
  if(id==='pacientes') renderPacientes();
  if(id==='profissionais') renderProfissionais();
  if(id==='financeiro') renderFinanceiro();
  if(id==='gestao') renderGestao();
  if(id==='config') renderConfig();
}

// ========== DASHBOARD ==========
function renderDashboard(){
  const grid = document.getElementById('kpiGrid');
  const hoje = new Date().toISOString().split('T')[0];
  const agendamentosHoje = db.agendamentos.filter(a => a.data===hoje);
  const confirmados = agendamentosHoje.filter(a => a.status==='confirmado');
  const totalPac = pacientesPermitidos().length;
  const totalProf = db.profissionais.length;
  const receitas = db.transacoes.filter(t=>t.tipo==='receita').reduce((s,t)=>s+parseFloat(t.valor||0),0);
  const despesas = db.transacoes.filter(t=>t.tipo==='despesa').reduce((s,t)=>s+parseFloat(t.valor||0),0);
  const faltas = db.agendamentos.filter(a=>a.status==='cancelado').length;

  grid.innerHTML = `
    <div class="kpi-card"><div class="numero">${agendamentosHoje.length}</div><div class="rotulo">📅 Agenda Hoje</div></div>
    <div class="kpi-card"><div class="numero">${confirmados.length}</div><div class="rotulo">✅ Confirmados</div></div>
    <div class="kpi-card"><div class="numero">${totalPac}</div><div class="rotulo">👥 Pacientes</div></div>
    <div class="kpi-card"><div class="numero">${totalProf}</div><div class="rotulo">👨‍⚕️ Profissionais</div></div>
    <div class="kpi-card"><div class="numero">R$ ${receitas.toFixed(2)}</div><div class="rotulo">💰 Receitas</div></div>
    <div class="kpi-card"><div class="numero">${faltas}</div><div class="rotulo">⚠️ Cancelamentos</div></div>
    <div class="kpi-card"><div class="numero">⚙️</div><div class="rotulo">Configurações</div></div>
  `;
}

// ========== AGENDA ==========
function renderCalendario(){
  const grid = document.getElementById('calendarioGrid');
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('mesAno').textContent = meses[mesAtual]+' '+anoAtual;
  const primeiro = new Date(anoAtual,mesAtual,1).getDay();
  const dias = new Date(anoAtual,mesAtual+1,0).getDate();
  const hoje = new Date().toISOString().split('T')[0];
  let html = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d => `<div style="background:#1a1a2e;color:#fff;padding:8px;text-align:center;font-weight:600;border-radius:4px">${d}</div>`).join('');
  for(let i=0;i<primeiro;i++) html += '<div style="min-height:60px"></div>';
  for(let d=1;d<=dias;d++){
    const dataStr = `${anoAtual}-${String(mesAtual+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ags = db.agendamentos.filter(a => a.data===dataStr);
    const ehHoje = dataStr===hoje;
    let bg = ehHoje ? '#fff3e0' : '#fff';
    let eventos = ags.map(a => {
      const cor = a.status==='confirmado'?'#d4edda':a.status==='cancelado'?'#f8d7da':'#e2e3e5';
      return `<div style="background:${cor};padding:2px 4px;margin:1px 0;border-radius:3px;font-size:.75em;cursor:pointer" onclick="abrirModalAgenda('${a.id}')">${a.hora} ${buscarPacNome(a.pacienteId)}</div>`;
    }).join('');
    html += `<div style="background:${bg};border:1px solid #ddd;padding:4px;min-height:60px;border-radius:4px;cursor:pointer" onclick="abrirModalAgenda(null,'${dataStr}')"><strong>${d}</strong>${eventos}</div>`;
  }
  grid.innerHTML = html;
}
function mesAnterior(){ mesAtual--; if(mesAtual<0){mesAtual=11;anoAtual--} renderCalendario(); }
function proximoMes(){ mesAtual++; if(mesAtual>11){mesAtual=0;anoAtual++} renderCalendario(); }

function buscarPacNome(id){ const p=db.pacientes.find(x=>x.id===id); return p?p.nombre||p.nome:'?'; }

function abrirModalAgenda(id,data){
  if(!temAcesso('agenda')){ alert('Sem permissão'); return; }
  const ag = id ? db.agendamentos.find(a=>a.id===id) : null;
  const pacientes = pacientesPermitidos();
  const profs = db.profissionais;
  const salas = [1,2];
  document.getElementById('modalContent').innerHTML = `
    <h3>${id?'Editar':'Nova'} Consulta</h3>
    <form onsubmit="salvarAgenda(event,${id||'null'})">
      <label>Paciente</label>
      <select id="fPaciente" required>${pacientes.map(p => `<option value="${p.id}" ${ag&&ag.pacienteId===p.id?'selected':''}>${p.nome||p.nombre}</option>`).join('')}</select>
      <label>Data</label>
      <input type="date" id="fData" value="${ag?ag.data:data||''}" required>
      <label>Hora</label>
      <input type="time" id="fHora" value="${ag?ag.hora:''}" required>
      <label>Sala</label>
      <select id="fSala">${salas.map(s=>`<option value="${s}" ${ag&&ag.sala==s?'selected':''}>Sala ${s}</option>`).join('')}</select>
      <label>Status</label>
      <select id="fStatus">
        <option value="agendado" ${ag&&ag.status==='agendado'?'selected':''}>🟤 Agendado</option>
        <option value="confirmado" ${ag&&ag.status==='confirmado'?'selected':''}>🟢 Confirmado</option>
        <option value="cancelado" ${ag&&ag.status==='cancelado'?'selected':''}>🔴 Cancelado</option>
      </select>
      <label>Valor (R$)</label>
      <input type="number" step="0.01" id="fValor" value="${ag?ag.valor||'':''}">
      <label>Pagamento</label>
      <select id="fPagamento">
        <option value="">Selecione</option>
        <option value="Pix" ${ag&&ag.pagamento==='Pix'?'selected':''}>Pix</option>
        <option value="Dinheiro" ${ag&&ag.pagamento==='Dinheiro'?'selected':''}>Dinheiro</option>
        <option value="Cartão" ${ag&&ag.pagamento==='Cartão'?'selected':''}>Cartão</option>
      </select>
      <button type="submit" class="primary" style="margin-top:15px">Salvar</button>
      ${id?`<button type="button" class="danger" onclick="excluirAgenda(${id})" style="margin-top:10px">Excluir</button>`:''}
    </form>
  `;
  abrirModal();
}
function salvarAgenda(e,id){
  e.preventDefault();
  const d = { pacienteId:parseInt(document.getElementById('fPaciente').value), data:document.getElementById('fData').value, hora:document.getElementById('fHora').value, sala:parseInt(document.getElementById('fSala').value), status:document.getElementById('fStatus').value, valor:parseFloat(document.getElementById('fValor').value)||0, pagamento:document.getElementById('fPagamento').value, profissional:sessao.nome };
  if(id){ const idx=db.agendamentos.findIndex(a=>a.id===id); if(idx>=0) db.agendamentos[idx]={...db.agendamentos[idx],...d}; }
  else { d.id=Date.now(); db.agendamentos.push(d); }
  salvarDB(); fecharModal(); renderCalendario();
}
function excluirAgenda(id){ if(confirm('Excluir?')){ db.agendamentos=db.agendamentos.filter(a=>a.id!==id); salvarDB(); fecharModal(); renderCalendario(); } }

// ========== PACIENTES ==========
function renderPacientes(){
  const list = document.getElementById('pacienteList');
  const ps = pacientesPermitidos();
  if(!ps.length){ list.innerHTML='<p>Nenhum paciente.</p>'; return; }
  list.innerHTML = `<table><thead><tr><th>Nome</th><th>Nascimento</th><th>Telefone</th><th>Ações</th></tr></thead><tbody>
    ${ps.map(p => `<tr><td>${p.nome||p.nombre}</td><td>${p.nasc||'-'}</td><td>${p.tel||p.telefone||'-'}</td><td><button class="secondary" onclick="abrirDrawerPaciente(${p.id})">Abrir</button> <button class="danger" onclick="excluirPaciente(${p.id})">Excluir</button></td></tr>`).join('')}
  </tbody></table>`;
}
function abrirModalPaciente(){
  if(!temAcesso('pacientes')){ alert('Sem permissão'); return; }
  document.getElementById('modalContent').innerHTML = `
    <h3>Novo Paciente</h3>
    <form onsubmit="salvarPaciente(event)">
      <label>Nome</label><input type="text" id="pNome" required>
      <label>Data Nascimento</label><input type="date" id="pNasc">
      <label>Telefone</label><input type="tel" id="pTel">
      <label>Email</label><input type="email" id="pEmail">
      <label>Responsável (se menor)</label><input type="text" id="pResp">
      <label>Valor Sessão (R$)</label><input type="number" step="0.01" id="pValor">
      <button type="submit" class="primary" style="margin-top:15px">Salvar</button>
    </form>
  `;
  abrirModal();
}
function salvarPaciente(e){
  e.preventDefault();
  db.pacientes.push({ id:Date.now(), nome:document.getElementById('pNome').value, nasc:document.getElementById('pNasc').value||'', tel:document.getElementById('pTel').value||'', email:document.getElementById('pEmail').value||'', responsavel:document.getElementById('pResp').value||'', valor:parseFloat(document.getElementById('pValor').value)||0, profissional:sessao.nome, prontuarios:[], evolucoes:[], documentos:[] });
  salvarDB(); fecharModal(); renderPacientes();
}
function excluirPaciente(id){ if(confirm('Excluir paciente?')){ db.pacientes=db.pacientes.filter(p=>p.id!==id); salvarDB(); renderPacientes(); } }

// ========== DRAWER PACIENTE ==========
function abrirDrawerPaciente(id){
  pacienteSelecionado = db.pacientes.find(p=>p.id===id);
  if(!pacienteSelecionado) return;
  const p = pacienteSelecionado;
  document.getElementById('drawerOverlay').classList.add('show');
  const drawer = document.getElementById('pacienteDrawer');
  drawer.classList.add('open');
  const isAdmin = sessao.tipo==='administrador';
  document.getElementById('drawerContent').innerHTML = `
    <h3>${p.nome||p.nombre}</h3>
    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarAba('dados')">📋 Dados</button>
      <button class="tab-btn" onclick="mostrarAba('prontuario')">📄 Prontuário</button>
      <button class="tab-btn" onclick="mostrarAba('evolucao')">📈 Evolução</button>
      <button class="tab-btn" onclick="mostrarAba('documentos')">📑 Documentos</button>
      <button class="tab-btn" onclick="mostrarAba('pagamentos')">💰 Pagamentos</button>
    </div>
    <div id="abaContent"></div>
  `;
  mostrarAba('dados');
}
function fecharDrawer(){ document.getElementById('pacienteDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('show'); pacienteSelecionado=null; }
function mostrarAba(aba){
  const p = pacienteSelecionado;
  if(!p) return;
  const div = document.getElementById('abaContent');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(aba==='dados') div.innerHTML = `
    <p><strong>Nome:</strong> ${p.nome||p.nombre}</p>
    <p><strong>Nascimento:</strong> ${p.nasc||'-'}</p>
    <p><strong>Telefone:</strong> ${p.tel||p.telefone||'-'}</p>
    <p><strong>Email:</strong> ${p.email||'-'}</p>
    <p><strong>Responsável:</strong> ${p.responsavel||'-'}</p>
    <p><strong>Valor Sessão:</strong> R$ ${(p.valor||0).toFixed(2)}</p>
    <button class="secondary" onclick="abrirModalEditarPaciente()" style="margin-top:10px">Editar</button>
  `;
  if(aba==='prontuario') div.innerHTML = `
    <form onsubmit="adicionarProntuario(event)">
      <label>Data</label><input type="date" id="prData" value="${new Date().toISOString().split('T')[0]}">
      <label>Descrição</label><textarea id="prDesc" rows="3" required></textarea>
      <button type="submit" class="primary">Adicionar</button>
    </form>
    <div id="prontList">${(p.prontuarios||[]).map(pr => `<div style="border:1px solid #ddd;padding:8px;margin:5px 0;border-radius:6px"><strong>${pr.data}</strong>: ${pr.desc}</div>`).join('')||'<p>Nenhum prontuário.</p>'}</div>
  `;
  if(aba==='evolucao') div.innerHTML = `
    <form onsubmit="adicionarEvolucao(event)">
      <label>Data</label><input type="date" id="evData" value="${new Date().toISOString().split('T')[0]}">
      <label>Nível (1-10)</label><input type="number" min="1" max="10" id="evNivel" required>
      <label>Resumo</label><textarea id="evResumo" rows="2"></textarea>
      <button type="submit" class="primary">Adicionar</button>
    </form>
    <canvas id="evChart" height="150" style="max-width:100%;margin:10px 0"></canvas>
    <div id="evList">${(p.evolucoes||[]).map(ev => `<div style="border:1px solid #ddd;padding:6px;margin:3px 0;border-radius:4px"><strong>${ev.data}</strong>: Nível ${ev.nivel} - ${ev.resumo||''}</div>`).join('')||'<p>Sem evoluções.</p>'}</div>
  `;
  if(aba==='documentos') {
    const tipos = ['Declaração','Atestado','Relatório Psicológico','Relatório Multiprofissional','Laudo','Parecer'];
    div.innerHTML = `
      <form onsubmit="adicionarDocumento(event)">
        <label>Tipo</label>
        <select id="docTipo">${tipos.map(t=>`<option>${t}</option>`).join('')}</select>
        <label>Conteúdo</label><textarea id="docConteudo" rows="3" required></textarea>
        <button type="submit" class="primary">Adicionar</button>
      </form>
      <div id="docList">${(p.documentos||[]).map(d => `<div style="border:1px solid #ddd;padding:8px;margin:5px 0;border-radius:6px"><strong>${d.tipo}</strong> - ${d.data}<br>${d.conteudo}</div>`).join('')||'<p>Sem documentos.</p>'}</div>
    `;
  }
  if(aba==='pagamentos') div.innerHTML = `
    <form onsubmit="adicionarPagamento(event)">
      <label>Data</label><input type="date" id="pgData" value="${new Date().toISOString().split('T')[0]}">
      <label>Valor (R$)</label><input type="number" step="0.01" id="pgValor" required>
      <label>Método</label>
      <select id="pgMetodo"><option>Pix</option><option>Dinheiro</option><option>Cartão</option></select>
      <button type="submit" class="primary">Adicionar</button>
    </form>
    <div id="pgList">${(p.pagamentos||[]).map(pg => `<div style="border:1px solid #ddd;padding:6px;margin:3px 0;border-radius:4px"><strong>${pg.data}</strong>: R$ ${pg.valor.toFixed(2)} (${pg.metodo})</div>`).join('')||'<p>Sem pagamentos.</p>'}</div>
  `;
  setTimeout(() => { if(aba==='evolucao') desenharGraficoEvolucao(); }, 100);
}
function adicionarProntuario(e){
  e.preventDefault();
  if(!pacienteSelecionado) return;
  if(!pacienteSelecionado.prontuarios) pacienteSelecionado.prontuarios=[];
  pacienteSelecionado.prontuarios.push({ data:document.getElementById('prData').value, desc:document.getElementById('prDesc').value });
  salvarDB(); mostrarAba('prontuario');
}
function adicionarEvolucao(e){
  e.preventDefault();
  if(!pacienteSelecionado) return;
  if(!pacienteSelecionado.evolucoes) pacienteSelecionado.evolucoes=[];
  pacienteSelecionado.evolucoes.push({ data:document.getElementById('evData').value, nivel:parseInt(document.getElementById('evNivel').value), resumo:document.getElementById('evResumo').value });
  salvarDB(); mostrarAba('evolucao');
}
function adicionarDocumento(e){
  e.preventDefault();
  if(!pacienteSelecionado) return;
  if(!pacienteSelecionado.documentos) pacienteSelecionado.documentos=[];
  pacienteSelecionado.documentos.push({ tipo:document.getElementById('docTipo').value, conteudo:document.getElementById('docConteudo').value, data:new Date().toLocaleDateString() });
  salvarDB(); mostrarAba('documentos');
}
function adicionarPagamento(e){
  e.preventDefault();
  if(!pacienteSelecionado) return;
  if(!pacienteSelecionado.pagamentos) pacienteSelecionado.pagamentos=[];
  pacienteSelecionado.pagamentos.push({ data:document.getElementById('pgData').value, valor:parseFloat(document.getElementById('pgValor').value), metodo:document.getElementById('pgMetodo').value });
  salvarDB(); mostrarAba('pagamentos');
}
function desenharGraficoEvolucao(){
  const canvas = document.getElementById('evChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const evs = (pacienteSelecionado?.evolucoes||[]).sort((a,b)=>new Date(a.data)-new Date(b.data));
  if(!evs.length){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }
  if(chartEvolucao){ chartEvolucao.destroy(); chartEvolucao=null; }
  chartEvolucao = new Chart(ctx, {
    type:'line',
    data:{ labels:evs.map(e=>e.data), datasets:[{ label:'Nível de Evolução', data:evs.map(e=>e.nivel), borderColor:'#20c997', backgroundColor:'rgba(32,201,151,.1)', tension:.3 }] },
    options:{ responsive:true, scales:{ y:{ min:1, max:10 } } }
  });
}

function abrirModalEditarPaciente(){
  const p = pacienteSelecionado;
  if(!p) return;
  document.getElementById('modalContent').innerHTML = `
    <h3>Editar Paciente</h3>
    <form onsubmit="salvarEdicaoPaciente(event)">
      <label>Nome</label><input type="text" id="pNome" value="${p.nome||p.nombre}" required>
      <label>Data Nascimento</label><input type="date" id="pNasc" value="${p.nasc||''}">
      <label>Telefone</label><input type="tel" id="pTel" value="${p.tel||p.telefone||''}">
      <label>Email</label><input type="email" id="pEmail" value="${p.email||''}">
      <label>Responsável</label><input type="text" id="pResp" value="${p.responsavel||''}">
      <label>Valor Sessão (R$)</label><input type="number" step="0.01" id="pValor" value="${p.valor||0}">
      <button type="submit" class="primary" style="margin-top:15px">Salvar</button>
    </form>
  `;
  abrirModal();
}
function salvarEdicaoPaciente(e){
  e.preventDefault();
  const idx = db.pacientes.findIndex(p => p.id===pacienteSelecionado.id);
  if(idx>=0){
    db.pacientes[idx].nome = document.getElementById('pNome').value;
    db.pacientes[idx].nasc = document.getElementById('pNasc').value||'';
    db.pacientes[idx].tel = document.getElementById('pTel').value||'';
    db.pacientes[idx].email = document.getElementById('pEmail').value||'';
    db.pacientes[idx].responsavel = document.getElementById('pResp').value||'';
    db.pacientes[idx].valor = parseFloat(document.getElementById('pValor').value)||0;
    salvarDB();
  }
  fecharModal(); fecharDrawer();
}

// ========== PROFISSIONAIS ==========
function renderProfissionais(){
  if(!temAcesso('profissionais') || sessao.tipo!=='administrador'){
    document.getElementById('profissionalList').innerHTML = '<p>Acesso restrito a administradores.</p>';
    return;
  }
  const list = document.getElementById('profissionalList');
  list.innerHTML = `<table><thead><tr><th>Nome</th><th>Tipo</th><th>Ações</th></tr></thead><tbody>
    ${db.usuarios.map(u => `<tr><td>${u.nome}</td><td>${u.tipo}</td><td><button class="danger" onclick="excluirProfissional('${u.nome}')">Excluir</button></td></tr>`).join('')}
  </tbody></table>`;
}
function abrirModalProfissional(){
  document.getElementById('modalContent').innerHTML = `
    <h3>Novo Profissional</h3>
    <form onsubmit="salvarProfissional(event)">
      <label>Nome</label><input type="text" id="prNome" required>
      <label>Tipo</label>
      <select id="prTipo">
        <option value="profissional">Profissional</option>
        <option value="secretaria">Secretária</option>
        <option value="administrador">Administrador</option>
      </select>
      <label>Senha</label><input type="text" id="prSenha" required>
      <button type="submit" class="primary" style="margin-top:15px">Cadastrar</button>
    </form>
  `;

}
function salvarProfissional(e){
  e.preventDefault();
  db.usuarios.push({ nome:document.getElementById('prNome').value, tipo:document.getElementById('prTipo').value, senha:document.getElementById('prSenha').value });
  db.profissionais.push({ nome:document.getElementById('prNome').value, tipo:document.getElementById('prTipo').value });
  salvarDB(); fecharModal(); renderProfissionais();
}
function excluirProfissional(nome){ if(confirm('Excluir?')){ db.usuarios=db.usuarios.filter(u=>u.nome!==nome); db.profissionais=db.profissionais.filter(p=>p.nome!==nome); salvarDB(); renderProfissionais(); } }

// ========== FINANCEIRO ==========
function renderFinanceiro(){
  if(!temAcesso('financeiro')){ document.getElementById('finTable').innerHTML='<p>Sem permissão</p>'; return; }
  const receitas = db.transacoes.filter(t=>t.tipo==='receita').reduce((s,t)=>s+parseFloat(t.valor||0),0);
  const despesas = db.transacoes.filter(t=>t.tipo==='despesa').reduce((s,t)=>s+parseFloat(t.valor||0),0);
  document.getElementById('finResumo').innerHTML = `
    <div class="card" style="flex:1;text-align:center"><strong>Receitas</strong><br><span style="font-size:1.5em;color:#28a745">R$ ${receitas.toFixed(2)}</span></div>
    <div class="card" style="flex:1;text-align:center"><strong>Despesas</strong><br><span style="font-size:1.5em;color:#e74c3c">R$ ${despesas.toFixed(2)}</span></div>
    <div class="card" style="flex:1;text-align:center"><strong>Saldo</strong><br><span style="font-size:1.5em;color:#1a1a2e">R$ ${(receitas-despesas).toFixed(2)}</span></div>
  `;
  // Gráfico Pareto
  const cats = {};
  db.transacoes.filter(t=>t.tipo==='despesa').forEach(t => { const d=t.descricao||t.desc||'Outros'; cats[d]=(cats[d]||0)+parseFloat(t.valor||0) });
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  if(chartPareto) chartPareto.destroy();
  if(sorted.length){
    const ctx = document.getElementById('paretoChart').getContext('2d');
    chartPareto = new Chart(ctx, {
      type:'bar',
      data:{ labels:sorted.map(s=>s[0]), datasets:[{ label:'Despesas (R$)', data:sorted.map(s=>s[1]), backgroundColor:'#e67e22' }] },
      options:{ responsive:true, plugins:{ legend:{ display:false } } }
    });
  }
  // Sugestões IA
  const totalGasto = sorted.reduce((s,i)=>s+i[1],0);
  let sugestao = '';
  if(receitas<despesas) sugestao = '🔴 Clínica com déficit. Priorize corte de despesas ou aumento de preços.';
  else if(sorted.length && sorted[0][1]/totalGasto > 0.5) sugestao = `🟡 A maior despesa (${sorted[0][0]}) representa ${(sorted[0][1]/totalGasto*100).toFixed(0)}% do total. Avalie redução.`;
  else sugestao = '🟢 Saúde financeira equilibrada. Mantenha as estratégias atuais.';
  document.getElementById('finSugestoes').innerHTML = `<strong>🤖 IA Financeira:</strong> ${sugestao}`;
  // Tabela
  document.getElementById('finTable').innerHTML = `<table><thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Tipo</th><th>Ações</th></tr></thead><tbody>
    ${db.transacoes.map(t => `<tr><td>${t.data}</td><td>${t.descricao||t.desc||'-'}</td><td>R$ ${parseFloat(t.valor||0).toFixed(2)}</td><td>${t.tipo}</td><td><button class="danger" onclick="excluirTransacao(${t.id})">Excluir</button></td></tr>`).join('')}
  </tbody></table>`;
}
function abrirModalFinanceiro(){
  document.getElementById('modalContent').innerHTML = `
    <h3>Nova Transação</h3>
    <form onsubmit="salvarTransacao(event)">
      <label>Tipo</label>
      <select id="tTipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
      <label>Descrição</label><input type="text" id="tDesc" required>
      <label>Valor (R$)</label><input type="number" step="0.01" id="tValor" required>
      <label>Data</label><input type="date" id="tData" value="${new Date().toISOString().split('T')[0]}">
      <button type="submit" class="primary" style="margin-top:15px">Salvar</button>
    </form>
  `;
  abrirModal();
}
function salvarTransacao(e){
  e.preventDefault();
  db.transacoes.push({ id:Date.now(), tipo:document.getElementById('tTipo').value, descricao:document.getElementById('tDesc').value, valor:parseFloat(document.getElementById('tValor').value), data:document.getElementById('tData').value });
  salvarDB(); fecharModal(); renderFinanceiro();
}
function excluirTransacao(id){ if(confirm('Excluir?')){ db.transacoes=db.transacoes.filter(t=>t.id!==id); salvarDB(); renderFinanceiro(); } }

// ========== GESTÃO ==========
function renderGestao(){ document.getElementById('gestaoContent').innerHTML='<p>Clique em "Gerar Insights" para analisar o desempenho da clínica.</p>'; }
function gerarInsights(){
  const totalPac = pacientesPermitidos().length;
  const totalAg = db.agendamentos.length;
  const cancelados = db.agendamentos.filter(a=>a.status==='cancelado').length;
  const inadimplentes = (db.pacientes||[]).filter(p => { const pags=p.pagamentos||[]; const tot=db.agendamentos.filter(a=>a.pacienteId===p.id).length*150; const pago=pags.reduce((s,pg)=>s+(pg.valor||0),0); return tot>0 && pago<tot; });
  const faltas = db.agendamentos.filter(a=>a.status==='cancelado').length;
  document.getElementById('gestaoContent').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:15px">
      <div class="card"><strong>Total Pacientes</strong><br><span style="font-size:1.5em">${totalPac}</span></div>
      <div class="card"><strong>Total Atendimentos</strong><br><span style="font-size:1.5em">${totalAg}</span></div>
      <div class="card"><strong>Cancelamentos</strong><br><span style="font-size:1.5em;color:#e74c3c">${cancelados}</span></div>
      <div class="card"><strong>Inadimplentes</strong><br><span style="font-size:1.5em;color:#e67e22">${inadimplentes.length}</span></div>
    </div>
    <div class="card" style="background:#fff3e0">
      <h3>🤖 IA de Gestão - Sugestões</h3>
      ${inadimplentes.length?`<p>🔴 <strong>Pacientes inadimplentes:</strong> ${inadimplentes.map(p=>p.nome||p.nombre).join(', ')}. Sugerimos envio de cobrança.</p>`:'<p>✅ Nenhum inadimplente identificado.</p>'}
      ${faltas>3?`<p>🟡 <strong>Alto índice de faltas:</strong> ${faltas} cancelamentos. Considere política de confirmação 24h antes.</p>`:'<p>✅ Taxa de faltas dentro do esperado.</p>'}
      ${totalAg<10?`<p>📈 <strong>Baixo volume de atendimentos.</strong> Sugerimos campanha de captação de pacientes.</p>`:''}
      <p>💡 Lembrete: Mantenha os prontuários atualizados para melhor acompanhamento da evolução dos pacientes.</p>
    </div>
  `;
}

  document.getElementById('cfgNome').value = c.nome||'';
  document.getElementById('cfgCnpj').value = c.cnpj||'';
  document.getElementById('cfgRegistro').value = c.registro||'';
  document.getElementById('cfgEndereco').value = c.endereco||'';

}

  e.preventDefault();
  db.config = {
    nome: document.getElementById('cfgNome').value,
    cnpj: document.getElementById('cfgCnpj').value,
    registro: document.getElementById('cfgRegistro').value,
    endereco: document.getElementById('cfgEndereco').value,
    telefone: document.getElementById('cfgTelefone').value
  };
  salvarDB();
  alert('Configurações salvas!');
});

// ========== MODAL ==========
function abrirModal(){ document.getElementById('modalOverlay').style.display='flex'; }
function fecharModal(){ document.getElementById('modalOverlay').style.display='none'; }

// ========== INICIALIZAÇÃO ==========
function renderAll(){
  carregarDB();
  const ses = sessionStorage.getItem('sessao');
  if(ses){
    const s = JSON.parse(ses);
    const u = db.usuarios.find(x=>x.nome===s.nome);
    if(u){ sessao=u; document.getElementById('userName').textContent = 'Olá, '+u.nome+' ('+u.tipo+')'; showTab('dashboard'); return; }
  }
  // Login
  const nome = prompt('Login - Digite seu nome de usuário:');
  if(nome){
    const senha = prompt('Senha:');
    if(!login(nome,senha)) logout();
  }
}
window.onload = renderAll;
</script>
