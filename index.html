<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 400px; margin: auto; }
        .hidden { display: none; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { padding: 10px 15px; margin: 5px 0; cursor: pointer; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
<div class="container">
    <h1>Sistema de Autenticação</h1>
    
    <!-- Formulário de Registro -->
    <div id="registerForm">
        <h2>Registro</h2>
        <input type="text" id="regUsername" placeholder="Usuário" required>
        <input type="password" id="regPassword" placeholder="Senha" required>
        <button onclick="register()">Registrar</button>
        <p id="registerMessage"></p>
        <p>Já tem conta? <a href="#" onclick="showLogin()">Faça login</a></p>
    </div>
    
    <!-- Formulário de Login -->
    <div id="loginForm" class="hidden">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Usuário" required>
        <input type="password" id="loginPassword" placeholder="Senha" required>
        <button onclick="login()">Entrar</button>
        <p id="loginMessage"></p>
        <p>Não tem conta? <a href="#" onclick="showRegister()">Registre-se</a></p>
    </div>
    
    <!-- Dashboard (logado) -->
    <div id="dashboard" class="hidden">
        <h2>Dashboard</h2>
        <p>Bem-vindo, <span id="currentUser"></span>!</p>
        <button onclick="logout()">Sair</button>
        <p id="logoutMessage"></p>
    </div>
</div>

<script>
    // ====== Lógica de Autenticação ======
    function getUsers() {
        try {
            return JSON.parse(sessionStorage.getItem('users')) || [];
        } catch (e) {
            return [];
        }
    }

    function saveUsers(users) {
        sessionStorage.setItem('users', JSON.stringify(users));
    }

    function getLoggedUser() {
        return sessionStorage.getItem('loggedUser');
    }

    function setLoggedUser(username) {
        if (username) {
            sessionStorage.setItem('loggedUser', username);
        } else {
            sessionStorage.removeItem('loggedUser');
        }
    }

    // ====== Funções de Interface ======
    function showLogin() {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('loginMessage').innerText = '';
        document.getElementById('registerMessage').innerText = '';
    }

    function showRegister() {
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('loginMessage').innerText = '';
        document.getElementById('registerMessage').innerText = '';
    }

    function showDashboard() {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('currentUser').innerText = getLoggedUser();
    }

    // ====== Ações do Usuário ======
    function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const messageEl = document.getElementById('registerMessage');

        if (!username || !password) {
            messageEl.innerText = 'Preencha todos os campos.';
            messageEl.className = 'error';
            return;
        }

        let users = getUsers();
        if (users.find(u => u.username === username)) {
            messageEl.innerText = 'Usuário já existe.';
            messageEl.className = 'error';
            return;
        }

        users.push({ username, password });
        saveUsers(users);
        messageEl.innerText = 'Registrado com sucesso! Faça login.';
        messageEl.className = 'success';
        document.getElementById('regUsername').value = '';
        document.getElementById('regPassword').value = '';
    }

    function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const messageEl = document.getElementById('loginMessage');

        if (!username || !password) {
            messageEl.innerText = 'Preencha todos os campos.';
            messageEl.className = 'error';
            return;
        }

        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password);

        if (!user) {
            messageEl.innerText = 'Usuário ou senha inválidos.';
            messageEl.className = 'error';
            return;
        }

        setLoggedUser(username);
        showDashboard();
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    }

    function logout() {
        setLoggedUser(null);
        document.getElementById('logoutMessage').innerText = 'Logout realizado com sucesso.';
        document.getElementById('logoutMessage').className = 'success';
        showLogin();
    }

    // ====== Inicialização ======
    (function init() {
        // Se já estiver logado, exibe dashboard
        if (getLoggedUser()) {
            showDashboard();
        } else {
            showRegister();
        }
    })();
</script>
</body>
</html>
